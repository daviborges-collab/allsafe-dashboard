<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allsafe — Painel de Sinistros</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --roxo:#5353E9;--rosa:#F7B2F5;--azul:#93ADFC;
  --dark:#210B4E;--limao:#DFF44C;--menta:#AFF9E4;
  --bg:#F4F4F4;--white:#FFFFFF;--borda:#E4E4E4;--sub:#7B7B9A;
  --radius:16px;--shadow:0 2px 12px rgba(33,11,78,.06);
  --vermelho:#E74C3C;--laranja:#F39C12;--verde:#2ECC71;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;-webkit-font-smoothing:antialiased}

/* Header */
.header{background:linear-gradient(180deg,var(--dark) 0%,#1a0940 100%);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;gap:14px;border-bottom:1px solid rgba(83,83,233,.15);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.header-left{display:flex;align-items:center;gap:12px}
.logo-img{height:32px;width:32px;border-radius:9px;object-fit:cover;box-shadow:0 2px 8px rgba(83,83,233,.35);flex-shrink:0;transition:transform .3s;background:var(--roxo);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:800}
.header-div{width:1px;height:22px;background:rgba(255,255,255,.1);flex-shrink:0}
.header h1{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.01em}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.live{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--menta)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--menta);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ts{font-size:11px;color:#7B8FA8}
.btn-sm{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:rgba(255,255,255,.45);font-size:11px;padding:5px 10px;cursor:pointer;font-family:inherit;transition:all .25s}
.btn-sm:hover{background:rgba(255,255,255,.14);color:#fff;transform:scale(1.04)}

/* Filters bar */
.filters-bar{background:var(--white);border-bottom:1px solid var(--borda);padding:10px 1.5rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:56px;z-index:99}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-group label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--sub)}
.filter-select{background:var(--bg);border:1px solid var(--borda);border-radius:8px;padding:6px 10px;font-size:11.5px;font-family:inherit;color:var(--dark);cursor:pointer;min-width:120px}
.filter-select:focus{outline:none;border-color:var(--roxo);box-shadow:0 0 0 3px rgba(83,83,233,.1)}

/* Page */
.page{max-width:1360px;margin:0 auto;padding:1.25rem 1.5rem 3rem}
.ref-badge{background:rgba(83,83,233,.06);border:1px solid rgba(83,83,233,.12);border-radius:20px;padding:7px 18px;font-size:11.5px;color:var(--roxo);font-weight:600;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px;letter-spacing:.01em}
.ref-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--roxo);flex-shrink:0}
.section-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sub);margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:16px;height:2px;background:var(--roxo);border-radius:1px}

/* KPIs */
.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi{border-radius:var(--radius);padding:1.1rem 1.2rem;position:relative;overflow:hidden;transition:transform .25s cubic-bezier(.4,0,.2,1),box-shadow .25s}
.kpi:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(33,11,78,.12)}
.kd{background:var(--dark)}.kr{background:var(--roxo)}.km{background:var(--menta)}.kw{background:var(--white);border:1px solid var(--borda)}
.ko{background:linear-gradient(135deg,#e74c3c,#c0392b)}.ky{background:linear-gradient(135deg,#f39c12,#e67e22)}
.klbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.kd .klbl{color:var(--azul)}.kr .klbl{color:var(--rosa)}.km .klbl{color:#0A6B54}.kw .klbl{color:var(--sub)}
.ko .klbl,.ky .klbl{color:rgba(255,255,255,.7)}
.kval{font-size:22px;font-weight:800;line-height:1.1;margin-bottom:3px}
.kd .kval{color:var(--limao)}.kr .kval{color:#fff}.km .kval{color:var(--dark)}.kw .kval{color:var(--dark)}
.ko .kval,.ky .kval{color:#fff}
.ksub{font-size:10px;opacity:.7}
.kd .ksub{color:#7B8FA8}.kr .ksub{color:rgba(255,255,255,.6)}.km .ksub{color:#0A6B54}.kw .ksub{color:var(--sub)}
.ko .ksub,.ky .ksub{color:rgba(255,255,255,.65)}
.kdeco{position:absolute;right:-6px;bottom:-6px;font-size:48px;opacity:.08;line-height:1;pointer-events:none}

/* Mini KPI row */
.krow-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi-mini{background:var(--white);border:1px solid var(--borda);border-radius:12px;padding:.85rem 1rem;transition:transform .2s,box-shadow .2s}
.kpi-mini:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(33,11,78,.08)}
.kpi-mini .klbl{font-size:8.5px;color:var(--sub);margin-bottom:4px}
.kpi-mini .kval{font-size:17px;color:var(--dark)}
.kpi-mini .ksub{font-size:9.5px;color:var(--sub)}

/* Grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;align-items:start}
.g2.stretch{align-items:stretch}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}

/* Cards */
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--borda);padding:1.25rem;transition:box-shadow .3s,transform .3s}
.card:hover{box-shadow:0 6px 24px rgba(33,11,78,.07);transform:translateY(-1px)}
.ctit{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ctit::before{content:'';display:inline-block;width:3px;height:12px;background:var(--roxo);border-radius:2px}

/* Objcard dark */
.objcard{background:linear-gradient(135deg,#0d0d2e 0%,#1a0940 100%);border:1px solid rgba(83,83,233,.2);border-radius:var(--radius);padding:1.25rem;transition:transform .25s,box-shadow .25s}
.objcard:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(13,13,46,.3)}
.objtit{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rosa);margin-bottom:14px}

/* Stat items */
.stat-row{display:flex;gap:0;align-items:center}
.stat-item{text-align:center;flex:1;min-width:70px}
.stat-label{font-size:8.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:5px}
.stat-val{font-size:22px;font-weight:800;line-height:1}
.stat-sub{font-size:9.5px;color:#5a5a9a;margin-top:3px}
.stat-divider{width:1px;background:rgba(255,255,255,.08);align-self:stretch;margin:0 4px}

/* Bars */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-label{font-size:11px;font-weight:600;min-width:100px;text-align:right;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:18px;background:#F0F0F4;border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bar-count{font-size:10px;font-weight:700;color:var(--sub);min-width:36px;text-align:left;margin-left:4px}

/* Chart wraps */
.chart-wrap{height:260px;position:relative;width:100%}
.chart-wrap-sm{height:200px;position:relative;width:100%}
.chart-wrap-lg{height:320px;position:relative;width:100%}
.donut-wrap{display:flex;align-items:center;justify-content:center}
.donut-wrap canvas{max-width:280px}

/* Alert items */
.alert-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;margin-bottom:6px;transition:transform .2s;font-size:12px}
.alert-item:hover{transform:translateX(4px)}
.alert-crit{background:rgba(231,76,60,.06);border:1px solid rgba(231,76,60,.15)}
.alert-warn{background:rgba(243,156,18,.06);border:1px solid rgba(243,156,18,.15)}
.alert-ok{background:rgba(46,204,113,.06);border:1px solid rgba(46,204,113,.15)}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.alert-name{font-weight:600;flex:1}
.alert-days{font-weight:800;font-size:13px}
.alert-tipo{font-size:10px;color:var(--sub);font-weight:500}

/* Messages */
.smsg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;color:var(--sub);gap:12px;font-size:14px;text-align:center}
.smsg .ico{font-size:32px}
.err{color:#C0392B}

/* Skeleton */
.skel-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.skel-card{border-radius:var(--radius);height:110px;background:linear-gradient(110deg,#E8E8EE 8%,#F5F5FA 18%,#E8E8EE 33%);background-size:200% 100%;animation:shimmer 1.6s linear infinite}
.skel-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.skel-wide{border-radius:var(--radius);height:200px;background:linear-gradient(110deg,#E8E8EE 8%,#F5F5FA 18%,#E8E8EE 33%);background-size:200% 100%;animation:shimmer 1.6s linear infinite}
.skel-tall{border-radius:var(--radius);height:300px;background:linear-gradient(110deg,#E8E8EE 8%,#F5F5FA 18%,#E8E8EE 33%);background-size:200% 100%;animation:shimmer 1.6s linear infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.krow,.krow-mini,.g2,.g3,.card,.objcard{animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both}
.krow{animation-delay:.05s}

/* Tabs */
.tab-row{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.tab-btn{background:var(--white);border:1px solid var(--borda);border-radius:20px;padding:6px 16px;font-size:11px;font-weight:600;color:var(--sub);cursor:pointer;font-family:inherit;transition:all .2s}
.tab-btn:hover{border-color:var(--roxo);color:var(--roxo)}
.tab-btn.active{background:var(--roxo);border-color:var(--roxo);color:#fff}

/* Footer btn */
.btn-salvar-rodape{display:flex;align-items:center;justify-content:center;gap:8px;margin:32px auto 0;padding:12px 28px;background:var(--dark);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:#7B8FA8;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .3s}
.btn-salvar-rodape:hover{background:#2a2a5e;color:#fff;transform:translateY(-2px);box-shadow:0 6px 20px rgba(33,11,78,.15)}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(83,83,233,.15);border-radius:3px}

/* Responsive */
@media(max-width:1024px){.krow,.krow-mini{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}.krow,.krow-mini{grid-template-columns:1fr 1fr}}
@media(max-width:600px){
  .krow,.krow-mini{grid-template-columns:1fr}
  .skel-row{grid-template-columns:1fr 1fr}
  .page{padding:.75rem .75rem 5rem}
  .header{height:auto;padding:.5rem .75rem;gap:6px;flex-wrap:wrap}
  .filters-bar{padding:8px .75rem;gap:8px;top:auto;position:relative}
  .kval{font-size:18px!important}
  .stat-val{font-size:18px!important}
  .card,.objcard{padding:.9rem}
  .chart-wrap{height:220px}
  .chart-wrap-lg{height:280px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-img">A</div>
    <div class="header-div"></div>
    <h1>Painel de Sinistros</h1>
  </div>
  <div class="header-right">
    <div class="live"><div class="live-dot"></div>Ao vivo</div>
    <span class="ts" id="ts">&mdash;</span>
    <button class="btn-sm" onclick="loadData()">&#x21bb;</button>
  </div>
</div>

<div class="filters-bar">
  <div class="filter-group">
    <label>Período</label>
    <select class="filter-select" id="filtro-mes" onchange="applyFilters()">
      <option value="todos">Todos os meses</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Regional</label>
    <select class="filter-select" id="filtro-regional" onchange="applyFilters()">
      <option value="todos">Todas</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Consultor</label>
    <select class="filter-select" id="filtro-consultor" onchange="applyFilters()">
      <option value="todos">Todos</option>
    </select>
  </div>
</div>

<div class="page">
  <div id="root">
    <div class="skel-row"><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div></div>
    <div class="skel-row"><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div></div>
    <div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div>
    <div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div>
    <div class="skel-tall"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
/* ====================================================================
   Allsafe — Painel de Sinistros
   ==================================================================== */

var SHEET_ID = '1sf4XtGg0mexaCdk458eXiy11PpJPpAV5zQT2GrDqkZc';
var GID = '0';
var NOMES_MES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var _charts = {};
var _allRows = [];
var _filteredRows = [];

/* ─── Utilities ─── */
function n(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}
function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML;}
function pv(v){if(!v)return 0;if(typeof v==='number')return v;return parseFloat(String(v).replace(/R\$\s?/g,'').replace(/\./g,'').replace(',','.').trim())||0;}
function fR(v){return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fN(v){return Math.round(v).toLocaleString('pt-BR');}
function fPct(v){return v.toFixed(1).replace('.',',')+' %';}

function destroyChart(k){if(_charts[k]){try{_charts[k].destroy();}catch(e){}delete _charts[k];}}
function destroyAllCharts(){Object.keys(_charts).forEach(destroyChart);}
function registerChart(k,c){destroyChart(k);_charts[k]=c;}

function parseCSVLine(line){
  var cols=[],inQ=false,cur='';
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch==='"'){if(inQ&&i+1<line.length&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
    else cur+=ch;
  }
  cols.push(cur.trim());return cols;
}

function parseDate(s){
  if(!s)return null;s=String(s).trim();
  var pts=s.split('/');
  if(pts.length>=3)return new Date(parseInt(pts[2]),parseInt(pts[1])-1,parseInt(pts[0]));
  var iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso)return new Date(parseInt(iso[1]),parseInt(iso[2])-1,parseInt(iso[3]));
  return null;
}
function diffDays(d1,d2){if(!d1||!d2)return null;return Math.round((d1-d2)/(1000*60*60*24));}

/* ─── Tipo Evento Classification ─── */
function classEvento(tipo){
  var t=n(tipo);
  if(t.includes('colisao'))return 'Colisão';
  if(t.includes('terceiro'))return 'Terceiros';
  if(t.includes('vidro')||t.includes('farol')||t.includes('lanterna')||t.includes('retrovisor')||t.includes('parabrisa')||t.includes('para-brisa'))return 'Vidros/Faróis/Lanternas';
  if(t.includes('roubo')||t.includes('furto'))return 'Roubo/Furto';
  if(t.includes('perda total'))return 'Perda Total';
  if(t.includes('incendio')||t.includes('incêndio'))return 'Incêndio';
  if(t.includes('alagamento')||t.includes('fenomeno')||t.includes('enchente'))return 'Fenômenos Naturais';
  return 'Outros';
}

/* Status open check */
var STATUS_ABERTO = ['pré-registro','aguardando troca','em sindicancia','aguardando regulagem','andamento','em reparação','aguardando recolhimento em oficina','aguardando fim de busca','aguardando pagamento de franquia','reparação finalizada','em fase de indenização','acordo extrajudicial'];
function isAberto(status){var ns=n(status);return STATUS_ABERTO.some(function(s){return ns.includes(s);});}
function isFinalizado(status){var ns=n(status);return ns.includes('finalizado')||ns.includes('liquidado')||ns.includes('encerrado')||ns.includes('negado')||ns.includes('cancelado')||ns.includes('sem cobertura')||ns.includes('nao ira acionar');}

/* ─── Parse CSV ─── */
function parseRows(txt){
  var linhas=txt.split('\n');if(linhas.length<2)return[];
  var cols=parseCSVLine(linhas[0]);
  var idx={};cols.forEach(function(c,i){idx[n(c)]=i;});
  function fc(){
    var args=Array.prototype.slice.call(arguments);
    for(var i=0;i<args.length;i++){var k=n(args[i]);if(idx[k]!==undefined)return idx[k];var keys=Object.keys(idx);for(var j=0;j<keys.length;j++){if(keys[j].includes(k))return idx[keys[j]];}}
    return -1;
  }
  var C={
    nome:fc('nome'),tipo:fc('tipo'),status:fc('status'),subStatus:fc('sub status'),
    bairro:fc('bairro'),cidade:fc('cidade'),estado:fc('estado'),
    cota:fc('cota participacao','cota participação'),
    valorLiq:fc('valor liquido','valor líquido'),
    dataEntregaDoc:fc('data de entrega documentacao','data de entrega documentação'),
    placa:fc('placa'),modelo:fc('modelo'),anoModelo:fc('ano modelo'),
    precoVeic:fc('preco veiculo','preço veículo','preco veiculo'),
    tipoVeic:fc('tipo veiculo','tipo veículo'),protocolo:fc('protocolo'),
    tipoEvento:fc('tipo evento'),dataEvento:fc('data evento'),
    dataCom:fc('data comunicacao','data comunicação'),
    regional:fc('regional'),consultor:fc('consultor'),
    nomeAssoc:fc('nome associado'),cpfAssoc:fc('cpf associado'),
    dataAtiv:fc('data ativacao contrato','data ativação contrato')
  };
  var rows=[];
  for(var li=1;li<linhas.length;li++){
    if(!linhas[li].trim())continue;
    var c=parseCSVLine(linhas[li]);if(c.length<5)continue;
    var g=function(k){return(k>=0&&k<c.length)?c[k].trim():'';};
    var dataEv=parseDate(g(C.dataEvento));
    var dataDoc=parseDate(g(C.dataEntregaDoc));
    var dataCom=parseDate(g(C.dataCom));
    rows.push({
      nome:g(C.nome),status:g(C.status),subStatus:g(C.subStatus),
      bairro:g(C.bairro),cidade:g(C.cidade),estado:g(C.estado).toUpperCase(),
      cota:pv(g(C.cota)),valorLiq:pv(g(C.valorLiq)),
      dataEntregaDoc:dataDoc,placa:g(C.placa),modelo:g(C.modelo),
      anoModelo:parseInt(g(C.anoModelo))||0,precoVeic:pv(g(C.precoVeic)),
      tipoVeic:g(C.tipoVeic).toUpperCase(),protocolo:g(C.protocolo),
      tipoEvento:g(C.tipoEvento),tipoEventoClass:classEvento(g(C.tipoEvento)),
      dataEvento:dataEv,dataCom:dataCom,
      regional:g(C.regional),consultor:g(C.consultor),
      nomeAssoc:g(C.nomeAssoc),
      mesRef:dataEv?NOMES_MES[dataEv.getMonth()]+'/'+dataEv.getFullYear():''
    });
  }
  return rows;
}

/* ─── Build Filters ─── */
function buildFilters(rows){
  var meses=new Set(),regionais=new Set(),consultores=new Set();
  rows.forEach(function(r){
    if(r.mesRef)meses.add(r.mesRef);
    if(r.regional)regionais.add(r.regional);
    if(r.consultor)consultores.add(r.consultor);
  });
  var mesSel=document.getElementById('filtro-mes');
  var regSel=document.getElementById('filtro-regional');
  var consSel=document.getElementById('filtro-consultor');
  var mesArr=Array.from(meses).sort(function(a,b){
    var pa=a.split('/'),pb=b.split('/');
    var ya=parseInt(pa[1]),yb=parseInt(pb[1]);
    if(ya!==yb)return ya-yb;
    return NOMES_MES.indexOf(pa[0])-NOMES_MES.indexOf(pb[0]);
  });
  mesSel.innerHTML='<option value="todos">Todos os meses</option>';
  mesArr.forEach(function(m){mesSel.innerHTML+='<option value="'+esc(m)+'">'+esc(m)+'</option>';});

  Array.from(regionais).sort().forEach(function(r){regSel.innerHTML+='<option value="'+esc(r)+'">'+esc(r)+'</option>';});
  consSel.innerHTML='<option value="todos">Todos</option>';
  Array.from(consultores).sort().forEach(function(c){consSel.innerHTML+='<option value="'+esc(c)+'">'+esc(c)+'</option>';});

function applyFilters(){
  var mes=document.getElementById('filtro-mes').value;
  var reg=document.getElementById('filtro-regional').value;
  var cons=document.getElementById('filtro-consultor').value;
  _filteredRows=_allRows.filter(function(r){
    if(mes!=='todos'&&r.mesRef!==mes)return false;
    if(reg!=='todos'&&r.regional!==reg)return false;
    if(cons!=='todos'&&r.consultor!==cons)return false;
    return true;
  });
  render(processar(_filteredRows,_allRows));
}

/* ─── Process Data ─── */
function processar(rows,allRows){
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var total=rows.length;
  var abertos=rows.filter(function(r){return isAberto(r.status);});
  var sinAberto=abertos.length;
  /* +30 / +60 dias */
  var mais30=0,mais60=0,maxDias=0;
  abertos.forEach(function(r){
    if(r.dataEvento){
      var d=diffDays(hoje,r.dataEvento);
      if(d>30)mais30++;
      if(d>60)mais60++;
      if(d>maxDias)maxDias=d;
    }
  });
  /* Prazo de entrega de documentação */
  var prazoEntregaDias=[];
  rows.forEach(function(r){
    if(r.dataEntregaDoc&&r.dataEvento){
      var d=diffDays(r.dataEntregaDoc,r.dataEvento);
      if(d>=0)prazoEntregaDias.push(d);
    }
  });
  var mediaPrazoEntrega=prazoEntregaDias.length>0?prazoEntregaDias.reduce(function(s,v){return s+v;},0)/prazoEntregaDias.length:0;
  /* Valores */
  var totalIndenizacao=0,totalCota=0;
  rows.forEach(function(r){
    if(r.valorLiq>0)totalIndenizacao+=r.valorLiq;
    totalCota+=r.cota;
  });
  /* Por tipo evento */
  var porTipo={};
  rows.forEach(function(r){
    var t=r.tipoEventoClass;
    if(!porTipo[t])porTipo[t]={qtd:0,valor:0};
    porTipo[t].qtd++;
    porTipo[t].valor+=r.valorLiq>0?r.valorLiq:0;
  });
  /* Médias 12 meses: use allRows */
  var meses12={};
  allRows.forEach(function(r){
    if(r.mesRef){
      if(!meses12[r.mesRef])meses12[r.mesRef]={total:0,indenizacao:0,colisao:0,terceiros:0,vidros:0,franquia:0,roubo:0,recuperacao:0};
      meses12[r.mesRef].total++;
      if(r.valorLiq>0)meses12[r.mesRef].indenizacao+=r.valorLiq;
      var t=r.tipoEventoClass;
      if(t==='Colisão')meses12[r.mesRef].colisao++;
      if(t==='Terceiros')meses12[r.mesRef].terceiros++;
      if(t==='Vidros/Faróis/Lanternas')meses12[r.mesRef].vidros++;
      if(t==='Roubo/Furto'||t==='Perda Total'){meses12[r.mesRef].roubo++;if(n(r.status).includes('recuperado'))meses12[r.mesRef].recuperacao++;}
      meses12[r.mesRef].franquia+=r.cota;
    }
  });
  var nMeses=Object.keys(meses12).length||1;
  var mediaSin=allRows.length/nMeses;
  var totalIndAll=0;allRows.forEach(function(r){if(r.valorLiq>0)totalIndAll+=r.valorLiq;});
  var mediaInd=totalIndAll/nMeses;
  var tColisao=0,tTerceiros=0,tVidros=0,tFranquia=0,tRoubo=0,tRecup=0;
  Object.values(meses12).forEach(function(m){tColisao+=m.colisao;tTerceiros+=m.terceiros;tVidros+=m.vidros;tFranquia+=m.franquia;tRoubo+=m.roubo;tRecup+=m.recuperacao;});
  var mediaColisao=tColisao/nMeses;
  var mediaTerceiros=tTerceiros/nMeses;
  var mediaVidros=tVidros/nMeses;
  var mediaFranquiaVal=tFranquia/nMeses;
  var mediaRoubo=tRoubo/nMeses;
  var mediaRecup=tRecup/nMeses;
  /* Evolução mensal */
  var mesesOrdenados=Object.keys(meses12).sort(function(a,b){
    var pa=a.split('/'),pb=b.split('/');
    var ya=parseInt(pa[1]),yb=parseInt(pb[1]);
    if(ya!==yb)return ya-yb;
    return NOMES_MES.indexOf(pa[0])-NOMES_MES.indexOf(pb[0]);
  });
  /* Por bairro / estado / tipo uso / tipo veiculo */
  var porBairro={},porEstado={},porTipoUso={},porTipoVeic={};
  rows.forEach(function(r){
    if(r.bairro)porBairro[r.bairro]=(porBairro[r.bairro]||0)+1;
    if(r.estado)porEstado[r.estado]=(porEstado[r.estado]||0)+1;
    if(r.tipoVeic)porTipoVeic[r.tipoVeic]=(porTipoVeic[r.tipoVeic]||0)+1;
  });
  /* Regional */
  var porRegional={};
  rows.forEach(function(r){if(r.regional)porRegional[r.regional]=(porRegional[r.regional]||0)+1;});
  /* Status distribution */
  var porStatus={};
  rows.forEach(function(r){porStatus[r.status]=(porStatus[r.status]||0)+1;});
  /* Alertas: sinistros abertos ordenados por dias */
  var alertas=abertos.map(function(r){
    var dias=r.dataEvento?diffDays(hoje,r.dataEvento):0;
    return{nome:r.nomeAssoc||r.nome,dias:dias,tipo:r.tipoEventoClass,status:r.status,placa:r.placa,regional:r.regional};
  }).sort(function(a,b){return b.dias-a.dias;});
  /* Prazo entrega por tipo */
  var prazoPorTipo={};
  rows.forEach(function(r){
    if(r.dataEntregaDoc&&r.dataEvento){
      var d=diffDays(r.dataEntregaDoc,r.dataEvento);
      if(d>=0){
        var t=r.tipoEventoClass;
        if(!prazoPorTipo[t])prazoPorTipo[t]=[];
        prazoPorTipo[t].push(d);
      }
    }
  });
  /* Sinistros por dia da semana */
  var porDiaSem=[0,0,0,0,0,0,0];
  rows.forEach(function(r){if(r.dataEvento)porDiaSem[r.dataEvento.getDay()]++;});
  /* Sinistros por hora (from dataCom or dataEvento) - approximate */
  var porHora=new Array(24).fill(0);
  rows.forEach(function(r){
    if(r.dataEvento){
      var h=r.dataEvento.getHours();
      porHora[h]++;
    }
  });

  return{
    total:total,sinAberto:sinAberto,mais30:mais30,mais60:mais60,maxDias:maxDias,
    mediaPrazoEntrega:mediaPrazoEntrega,
    totalIndenizacao:totalIndenizacao,totalCota:totalCota,
    porTipo:porTipo,mediaSin:mediaSin,mediaInd:mediaInd,
    mediaColisao:mediaColisao,mediaTerceiros:mediaTerceiros,mediaVidros:mediaVidros,
    mediaFranquiaVal:mediaFranquiaVal,mediaRoubo:mediaRoubo,mediaRecup:mediaRecup,
    meses12:meses12,mesesOrdenados:mesesOrdenados,
    porBairro:Object.entries(porBairro).sort(function(a,b){return b[1]-a[1];}),
    porEstado:Object.entries(porEstado).sort(function(a,b){return b[1]-a[1];}),
    porTipoVeic:Object.entries(porTipoVeic).sort(function(a,b){return b[1]-a[1];}),
    porRegional:Object.entries(porRegional).sort(function(a,b){return b[1]-a[1];}),
    porStatus:Object.entries(porStatus).sort(function(a,b){return b[1]-a[1];}),
    alertas:alertas,
    prazoEntregaDias:prazoEntregaDias,prazoPorTipo:prazoPorTipo,
    porDiaSem:porDiaSem,porHora:porHora,nMeses:nMeses
  };
}

function mediaF(v){return v.toFixed(1).replace('.',',');}

function buildTipoVeicHtml(data){
  var total=data.reduce(function(s,e){return s+e[1];},0);
  var html='';
  data.forEach(function(e,i){
    var pct=total>0?Math.round(e[1]/total*100):0;
    var cor=i===0?'var(--roxo)':'#8B1A90';
    html+='<div class="alert-item" style="background:'+cor+'08;border:1px solid '+cor+'22"><div class="alert-dot" style="background:'+cor+'"></div><div class="alert-name" style="color:'+cor+'">'+esc(e[0])+'</div><div style="text-align:right"><div class="alert-days" style="color:'+cor+'">'+fN(e[1])+'</div><div class="alert-tipo">'+pct+'%</div></div></div>';
  });
  return html;
}

function exportarDash(){
  html2canvas(document.body,{scale:1.5,useCORS:true,backgroundColor:'#F4F4F4'}).then(function(c){
    var a=document.createElement('a');
    a.download='allsafe-sinistros-'+new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')+'.png';
    a.href=c.toDataURL('image/png');a.click();
  }).catch(function(e){alert('Erro: '+e.message);});
}

/* ─── Fetch Data ─── */
function loadData(){
  document.getElementById('root').innerHTML='<div class="skel-row"><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div></div><div class="skel-row"><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div></div><div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div><div class="skel-tall"></div>';
  var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/export?format=csv&gid='+GID;
  fetch(url,{signal:AbortSignal.timeout(20000)}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.text();
  }).then(function(txt){
    _allRows=parseRows(txt);
    buildFilters(_allRows);
    _filteredRows=_allRows.slice();
    render(processar(_filteredRows,_allRows));
    document.getElementById('ts').textContent=new Date().toLocaleTimeString('pt-BR');
  }).catch(function(e){
    document.getElementById('root').innerHTML='<div class="smsg"><div class="ico">⚠️</div><div class="err">Erro ao carregar dados</div><div>'+esc(e.message)+'</div><button class="btn-sm" style="margin-top:12px;background:var(--dark);color:var(--azul)" onclick="loadData()">Tentar novamente</button></div>';
  });
}

loadData();
setInterval(loadData,5*60*1000);
</script>
