<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allsafe — Painel de Vendas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --roxo:#5353E9;--rosa:#F7B2F5;--azul:#93ADFC;
  --dark:#210B4E;--limao:#DFF44C;--menta:#AFF9E4;
  --bg:#F4F4F4;--white:#FFFFFF;--borda:#E4E4E4;--sub:#7B7B9A;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
.header{background:var(--dark);padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.header-left{display:flex;align-items:center;gap:14px}
.logo-img{height:34px;width:auto;object-fit:contain}
.header-div{width:1px;height:26px;background:rgba(255,255,255,.15)}
.header h1{font-size:13px;font-weight:500;color:rgba(255,255,255,.6)}
.header-right{display:flex;align-items:center;gap:10px}
.live{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--menta)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--menta);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ts{font-size:11px;color:#7B8FA8}
.btn-sm{background:transparent;border:1px solid #3a3a6a;border-radius:6px;color:var(--sub);font-size:11px;padding:4px 10px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-sm:hover{background:#2d2d5e;color:#fff}
select.mes-sel{background:#1a1a3e;border:1px solid #3a3a6a;border-radius:6px;color:#93ADFC;font-size:11px;padding:4px 8px;cursor:pointer;font-family:inherit}
.tog{display:flex;background:#111133;border-radius:8px;padding:3px;gap:2px}
.tog-btn{padding:5px 18px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;color:#7B8FA8;background:transparent}
.tog-btn.on{background:var(--roxo);color:#fff}
.page{max-width:1320px;margin:0 auto;padding:1.25rem 1.5rem 3rem}
/* KPIs */
.krow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem}
.kpi{border-radius:14px;padding:1.25rem 1.5rem;position:relative;overflow:hidden}
.kd{background:var(--dark)}.kr{background:var(--roxo)}.km{background:var(--menta)}
.klbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.kd .klbl{color:var(--azul)}.kr .klbl{color:var(--rosa)}.km .klbl{color:#0A6B54}
.kval{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}
.kd .kval{color:var(--limao)}.kr .kval{color:#fff;font-size:20px}.km .kval{color:var(--dark);font-size:20px}
.ksub{font-size:11px}
.kd .ksub{color:#5a5a9a}.kr .ksub{color:rgba(255,255,255,.6)}.km .ksub{color:#0A6B54;opacity:.7}
.kdeco{position:absolute;right:-8px;bottom:-8px;font-size:64px;opacity:.07;line-height:1;pointer-events:none}
.khoje{font-size:12px;margin-top:6px;color:var(--menta);font-weight:600}
/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.gmain{display:grid;grid-template-columns:260px 1fr;gap:12px;margin-bottom:12px}
.gbot{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--white);border-radius:14px;border:1px solid var(--borda);padding:1.25rem}
.ctit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ctit::before{content:'';display:inline-block;width:3px;height:12px;background:var(--roxo);border-radius:2px}
/* EQ */
.eqi{display:flex;align-items:center;padding:10px 14px;border-radius:12px;margin-bottom:0;gap:10px}
.eqi:last-child{margin-bottom:0}
.eqdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.eqnom{font-size:13px;font-weight:600;flex:1}
.eqv{font-size:18px;font-weight:800}
.eqval{font-size:10px;font-weight:500;opacity:.7;text-align:right}
.cwrap{position:relative;width:100%}
/* AGGER */
.ag{background:var(--dark);border-radius:14px;padding:1.25rem}
.agtit{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--roxo);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.agtit::before{content:'◆';font-size:8px}
.agkpis{display:flex;gap:20px;margin-bottom:14px}
.aglbl{font-size:10px;color:#6060A0;margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.agval{font-size:24px;font-weight:800;color:var(--limao)}
.agval.sm{font-size:15px;color:var(--menta)}
.agpills{display:flex;flex-wrap:wrap;gap:6px}
.agpill{background:rgba(83,83,233,.2);border:1px solid rgba(83,83,233,.4);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--azul);display:flex;gap:5px;align-items:center}
.agpill b{font-weight:700;color:#fff}
/* RANK */
.rt{width:100%;border-collapse:collapse;font-size:12px}
.rt th{text-align:left;padding:5px 8px;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--sub);text-transform:uppercase;border-bottom:2px solid var(--borda);white-space:nowrap}
.rt td{padding:7px 8px;border-bottom:1px solid #F0F0F0;vertical-align:middle}
.rt tr:last-child td{border-bottom:none}
.rt tbody tr:hover td{background:#FAFAFF}
.pos{font-size:11px;font-weight:700;color:var(--sub);min-width:20px;display:inline-block}
.p1{color:#C8900A;font-size:14px}.p2{color:#888;font-size:14px}.p3{color:#8B5E3C;font-size:14px}
.bdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.tr{text-align:right}.fw{font-weight:700}
.lg{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.lgi{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--sub)}
.lgsq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
/* DESTAQUE */
.dest{background:linear-gradient(135deg,#3535C0,var(--roxo));border-radius:14px;padding:1.25rem;color:#fff}
.destlbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rosa);margin-bottom:8px}
.destnom{font-size:22px;font-weight:800;margin-bottom:10px}
.destst{display:flex;gap:16px;flex-wrap:wrap}
.destsl{font-size:10px;color:rgba(255,255,255,.6);margin-bottom:2px}
.destsv{font-size:15px;font-weight:700;color:#fff}
/* VELOCI */
.velcard{background:var(--dark);border-radius:14px;padding:1.25rem;display:flex;flex-direction:column;align-items:center}
.veltit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--azul);margin-bottom:8px;align-self:flex-start}
.velinfo{text-align:center;margin-top:4px}
.velat{font-size:26px;font-weight:800;color:var(--limao)}
.velm{font-size:11px;color:#5a5a9a}
.velp{font-size:12px;color:var(--menta);margin-top:3px;font-weight:600}
/* TEND + OBJ */
.tendcard{background:var(--dark);border-radius:14px;padding:1.25rem;display:flex;gap:0}
.tendl{flex:1;border-right:1px solid rgba(255,255,255,.08);padding-right:16px;margin-right:16px}
.tendr{display:flex;flex-direction:column;justify-content:center;min-width:110px}
.tslbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.tslbl.az{color:var(--azul)}.tslbl.mn{color:var(--menta)}
.tsbig{font-size:28px;font-weight:800;color:var(--limao);line-height:1;margin-bottom:3px}
.tssub{font-size:11px;color:#5a5a9a;margin-bottom:8px}
.tsdet{font-size:11px;color:#7B8FA8;line-height:1.8}
.rval{font-size:24px;font-weight:800;color:var(--menta);line-height:1;margin-bottom:2px}
.rlbl{font-size:10px;color:#5a5a9a}
/* OBJETIVO */
.objcard{background:#0d0d2e;border:1px solid rgba(83,83,233,.25);border-radius:14px;padding:1.25rem}
.objtit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rosa);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.objtit::before{content:'🎯';font-size:12px}
.objmain{display:flex;align-items:flex-end;gap:8px;margin-bottom:4px}
.objval{font-size:40px;font-weight:800;color:var(--limao);line-height:1}
.objunit{font-size:12px;color:#5a5a9a;margin-bottom:6px}
.objlbl{font-size:11px;color:#7B8FA8;margin-bottom:10px}
.objalr{border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;line-height:1.5}
.objalr.verm{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);color:#E74C3C}
.objalr.verd{background:rgba(10,107,84,.15);border:1px solid rgba(10,107,84,.3);color:#2ecc71}
.objdiff{font-size:14px;font-weight:800;display:block;margin-bottom:2px}
/* SEÇÃO */
.sectit{font-size:13px;font-weight:700;color:var(--dark);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.sectit::before{content:'';display:inline-block;width:4px;height:16px;background:var(--roxo);border-radius:2px}
/* TABELAS */
.it{width:100%;border-collapse:collapse;font-size:12px}
.it th{text-align:left;padding:6px 10px;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--sub);text-transform:uppercase;border-bottom:2px solid var(--borda);white-space:nowrap;background:#fff}
.it td{padding:7px 10px;border-bottom:1px solid #F0F0F0;vertical-align:middle;text-align:center}
.it td:first-child{text-align:left}
.it tr:last-child td{border-bottom:none}
.it tbody tr:hover td{background:#FAFAFF}
.it tfoot td{border-top:2px solid var(--borda);font-weight:700;background:#F8F8FC;padding:7px 10px}
/* STATE */
.smsg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;color:var(--sub);gap:12px;font-size:14px;text-align:center}
.smsg .ico{font-size:32px}
.err{color:#C0392B}
@media(max-width:900px){.gmain,.gbot,.g2{grid-template-columns:1fr}.krow{grid-template-columns:1fr 1fr}.tendcard{flex-direction:column}.tendl{border-right:none;padding-right:0;margin-right:0;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:12px;margin-bottom:12px}}
@media(max-width:500px){.krow{grid-template-columns:1fr}.page{padding:1rem}}
</style>
</head>

// ============================================================
// UTILS
// ============================================================
function n(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}
function pv(v){if(!v)return 0;return parseFloat(String(v).replace(/R\$\s?/g,'').replace(/\./g,'').replace(',','.').trim())||0;}
function fR(v){return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fN(v){return Math.round(v).toLocaleString('pt-BR');}
function ehInt(e){const l=n(e);return KW_INT.some(k=>l.includes(k));}
function detExt(e){const l=n(e);for(const[k,ks]of Object.entries(KW_EXT)){if(ks.some(kw=>l.includes(kw)))return k;}return null;}
function ehUtil(d){const dw=d.getDay();if(dw===0||dw===6)return false;return!FERIADOS.includes(d.toISOString().slice(0,10));}
function diasUtil(ano,mes){const r=[],d=new Date(ano,mes,1);while(d.getMonth()===mes){if(ehUtil(new Date(d)))r.push(new Date(d));d.setDate(d.getDate()+1);}return r;}
function nomeMes(){const m=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];const a=new Date();return m[a.getMonth()]+'/'+a.getFullYear();}
function achaMes(s){const ns=n(s);return MESES.find(m=>n(m)===ns)||MESES.find(m=>n(m).split('/')[0]===ns.split('/')[0])||MESES[2];}

// ============================================================
// CSV — detecta colunas pelo cabeçalho
// ============================================================
function parseCSV(txt){
  const linhas=txt.split('\n');
  const header=linhas[0];
  const cols=[];let inQ=false,cur='';
  for(const ch of header){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=ch;}
  cols.push(cur.trim());

  // Mapa de índices pelos cabeçalhos (case-insensitive, sem acento)
  const idx={};
  cols.forEach((c,i)=>{idx[n(c)]=i;});

  // Índices das colunas que nos interessam
  const COL={
    status: idx[n('Status Contrato')]??idx[n('status contrato')]??0,
    equipe: idx[n('Equipe de Venda')]??idx[n('equipe de venda')]??4,
    consultor: idx[n('Consultor')]??idx[n('consultor')]??5,
    valor: idx[n('Valor Adesão')]??idx[n('valor adesao')]??idx[n('valor adesão')]??6,
    estado: idx[n('Estado')]??idx[n('estado')]??11,
    veiculo: idx[n('Tipo veículo')]??idx[n('tipo veiculo')]??idx[n('tipo de veiculo')]??15,
    uso: idx[n('Tipo de Uso')]??idx[n('tipo de uso')]??16,
    tipoNeg: idx[n('Tipo de negociação')]??idx[n('tipo de negociacao')]??idx[n('tipo negociacao')]??17,
    data: idx[n('Data Finalização Vistoria')]??idx[n('data finalizacao vistoria')]??idx[n('data')]??2,
  };

  const rows=linhas.slice(1).map(linha=>{
    const c=[];let inQ2=false,cur2='';
    for(const ch of linha){if(ch==='"'){inQ2=!inQ2;}else if(ch===','&&!inQ2){c.push(cur2.trim());cur2='';}else cur2+=ch;}
    c.push(cur2.trim());
    return{
      status:c[COL.status]||'',
      equipe:c[COL.equipe]||'',
      consultor:c[COL.consultor]||'',
      valor:pv(c[COL.valor]),
      estado:(c[COL.estado]||'').trim().toUpperCase(),
      veiculo:(c[COL.veiculo]||'').trim().toUpperCase(),
      uso:(c[COL.uso]||'').trim(),
      tipoNeg:(c[COL.tipoNeg]||'').trim()||'Não informado',
      data:(c[COL.data]||'').trim(),
      raw:c,
    };
  }).filter(r=>r.raw.length>=3&&r.status);
  return rows;
}

async function fetchRows(aba){
  const url=(GIDS&&GIDS[aba])?'https://docs.google.com/spreadsheets/d/'+SHEET+'/export?format=csv&gid='+GIDS[aba]:'https://docs.google.com/spreadsheets/d/'+SHEET+'/export?format=csv&sheet='+encodeURIComponent(aba);
  const r=await fetch(url);
  if(!r.ok)throw new Error('Aba "'+aba+'" não encontrada.');
  const txt=await r.text();
  if(!txt.includes(','))throw new Error('Aba "'+aba+'" retornou dados inválidos.');
  return parseCSV(txt);
}

// ============================================================
// CADASTROS DE CORRETORES — aba "cadastrados"
// Colunas: B=Nome Consultor (idx1), H=Time de Vendas (idx7), P=Status Ativo (idx15)
// Regra: João/Renata/Bernardo pelo nome da equipe; Agger quando equipe contém "agger"
// Demais equipes são desconsideradas
// ============================================================
async function fetchCadastros(){
  const url='https://docs.google.com/spreadsheets/d/'+SHEET_CAD+'/export?format=csv&sheet='+encodeURIComponent(ABA_CAD);
  const r=await fetch(url);
  if(!r.ok) return null;
  const txt=await r.text();
  if(!txt.includes(',')) return null;
  const linhas=txt.split('\n');

  // Usa índices fixos confirmados: Nome=1, Time=7, Status=15
  const porEq={Joao:0,Bernardo:0,Renata:0,Agger:0};
  const nomes={Joao:[],Bernardo:[],Renata:[],Agger:[]};

  linhas.slice(1).forEach(linha=>{
    const c=[];let inQ2=false,cur2='';
    for(const ch of linha){if(ch==='"'){inQ2=!inQ2;}else if(ch===','&&!inQ2){c.push(cur2.trim());cur2='';}else cur2+=ch;}
    c.push(cur2.trim());
    if(c.length<8) return;

    const ativo=n(c[15]||'');
    if(ativo&&ativo!=='sim') return; // só ativos

    const equipe=(c[7]||'').trim();
    const le=n(equipe);
    let cat='';

    // Agger tem prioridade absoluta
    if(le.includes('agger')) cat='Agger';
    // João/Renata/Bernardo pelo nome da equipe
    else if(le.includes('joao')||le.includes('joão')) cat='Joao';
    else if(le.includes('bernardo')) cat='Bernardo';
    else if(le.includes('renata')) cat='Renata';
    else return; // ignora os demais

    porEq[cat]++;
    nomes[cat].push((c[1]||'').trim());
  });

  const total=Object.values(porEq).reduce((s,v)=>s+v,0);
  return{porEq,nomes,total};
}

// ============================================================
// PROCESSAR EXTERNO
// ============================================================
function procExt(rows,aba){
  const hoje=new Date();
  const hojeStr=hoje.toISOString().slice(0,10);
  const v=rows.filter(r=>STATUS_OK.includes(n(r.status))&&!ehInt(r.equipe));
  let tot=0,totV=0,vendHoje=0;
  const porEq={Joao:{v:0,val:0},Bernardo:{v:0,val:0},Renata:{v:0,val:0},Agger:{v:0,val:0}};
  const porEst={},porEstEq={},porCon={};
  v.forEach(r=>{
    const eqK=detExt(r.equipe),con=r.consultor;
    // Data da venda
    let dStr='';
    if(r.data){const pts=r.data.split('/');if(pts.length===3)dStr=pts[2]+'-'+pts[1].padStart(2,'0')+'-'+pts[0].padStart(2,'0');else dStr=r.data.slice(0,10);}
    if(dStr===hojeStr)vendHoje++;
    tot++;totV+=r.valor;
    if(eqK&&porEq[eqK]){porEq[eqK].v++;porEq[eqK].val+=r.valor;}
    if(r.estado){porEst[r.estado]=(porEst[r.estado]||0)+1;if(eqK){if(!porEstEq[r.estado])porEstEq[r.estado]={};porEstEq[r.estado][eqK]=(porEstEq[r.estado][eqK]||0)+1;}}
    if(eqK&&con){if(!porCon[con])porCon[con]={v:0,val:0,eq:eqK};porCon[con].v++;porCon[con].val+=r.valor;}
  });
  const agEst=Object.entries(porEstEq).map(([uf,eq])=>[uf,eq['Agger']||0]).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);

  // Tendência externo
  const partes=(aba||MES).split('/');
  const mNorm=['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const mIdx=mNorm.indexOf(n(partes[0]));
  const ano=parseInt(partes[1])||hoje.getFullYear();
  const eMes=(hoje.getMonth()===mIdx&&hoje.getFullYear()===ano);
  let dPass=0,dFalt=0;
  if(mIdx>=0){
    const todos=diasUtil(ano,mIdx);
    if(eMes){dPass=todos.filter(d=>d<=hoje).length;dFalt=todos.filter(d=>d>hoje).length;}
    else if(hoje>new Date(ano,mIdx+1,0)){dPass=todos.length;}
    else{dFalt=diasUtil(ano,mIdx).length;}
  }
  const metaExt=METAS_EXT[aba||MES]||300;
  const proj=dPass>0?Math.round((tot/dPass)*(dPass+dFalt)):tot;
  const faltMeta=Math.max(0,metaExt-tot);
  const ritmo=dPass>0?(tot/dPass):0;
  const vdNec=dFalt>0?(faltMeta/dFalt):0;
  const dif=vdNec-ritmo;

  const rankExt=Object.entries(porCon).sort((a,b)=>b[1].v-a[1].v);
  const topConExt=rankExt[0]||null;
  return{tot,totV,ticket:tot?totV/tot:0,porEq,porEst,porEstEq,agEst,rank:rankExt,topConExt,vendHoje,proj,dPass,dFalt,metaExt,faltMeta,ritmo,vdNec,dif};
}

// ============================================================
// PROCESSAR INTERNO
// ============================================================
function procInt(rows,aba){
  const hoje=new Date();
  const hojeStr=hoje.toISOString().slice(0,10);
  const v=rows.filter(r=>STATUS_OK.includes(n(r.status))&&ehInt(r.equipe));
  let tot=0,totV=0,vendHoje=0;
  const porCon={};
  const porCorCat={}; // corretor -> categoria -> qtd
  const porCorTipo={}; // corretor -> tipoNeg -> qtd

  v.forEach(r=>{
    const con=r.consultor||'';
    if(!con)return;

    // Data da venda
    let dStr='';
    if(r.data){
      const parts=r.data.split('/');
      if(parts.length===3)dStr=parts[2]+'-'+parts[1].padStart(2,'0')+'-'+parts[0].padStart(2,'0');
      else dStr=r.data.slice(0,10);
    }
    if(dStr===hojeStr)vendHoje++;

    tot++;totV+=r.valor;

    if(!porCon[con])porCon[con]={v:0,val:0,tipoNeg:r.tipoNeg};
    porCon[con].v++;porCon[con].val+=r.valor;

    // Categoria (para tabela uso)
    let cat='';
    if(r.veiculo==='MOTO')cat='Moto';
    else if(n(r.uso).includes('taxi'))cat='Táxi';
    else if(n(r.uso).includes('aplic')||n(r.uso).includes('profiss'))cat='Aplicativo';
    else cat='Particular';
    if(!porCorCat[con])porCorCat[con]={};
    porCorCat[con][cat]=(porCorCat[con][cat]||0)+1;

    // Tipo de negociação (pivô)
    const tipo=r.tipoNeg||'Não informado';
    if(!porCorTipo[con])porCorTipo[con]={};
    porCorTipo[con][tipo]=(porCorTipo[con][tipo]||0)+1;
  });

  // Dias úteis
  const partes=aba.split('/');
  const mNorm=['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const mIdx=mNorm.indexOf(n(partes[0]));
  const ano=parseInt(partes[1])||hoje.getFullYear();
  const eMes=(hoje.getMonth()===mIdx&&hoje.getFullYear()===ano);
  let dPass=0,dFalt=0;
  if(mIdx>=0){
    const todos=diasUtil(ano,mIdx);
    if(eMes){dPass=todos.filter(d=>d<=hoje).length;dFalt=todos.filter(d=>d>hoje).length;}
    else if(hoje>new Date(ano,mIdx+1,0)){dPass=todos.length;}
    else{dFalt=diasUtil(ano,mIdx).length;}
  }
  const proj=dPass>0?Math.round((tot/dPass)*(dPass+dFalt)):tot;
  const meta=METAS[aba]||130;
  const faltMeta=Math.max(0,meta-tot);
  const ritmo=dPass>0?(tot/dPass):0;
  const vdNec=dFalt>0?(faltMeta/dFalt):0;
  const dif=vdNec-ritmo;
  const topCon=Object.entries(porCon).sort((a,b)=>b[1].v-a[1].v)[0];
  const rank=Object.entries(porCon).sort((a,b)=>b[1].v-a[1].v);
  rank.forEach(([nome,info])=>{
    info.tend=dPass>0?Math.round((info.v/dPass)*(dPass+dFalt)):info.v;
    info.metaI=META_CORRETOR[nome]||0;
    info.faltI=info.metaI>0?Math.max(0,info.metaI-info.v):null;
  });

  // Tipos únicos de negociação
  // Se todos forem 'Não informado', a coluna não existe nessa aba
  const tiposSet=new Set();
  v.forEach(r=>tiposSet.add(r.tipoNeg||'Não informado'));
  const todosNaoInfo=[...tiposSet].every(t=>t==='Não informado');
  const tipos=todosNaoInfo?[]:([...tiposSet].filter(t=>t&&t!=='Não informado').sort());
  if(!todosNaoInfo&&tiposSet.has('Não informado'))tipos.push('Não informado');

  // Categorias únicas
  const catsSet=new Set();
  Object.values(porCorCat).forEach(o=>Object.keys(o).forEach(c=>catsSet.add(c)));
  const catOrd=['Táxi','Aplicativo','Particular','Moto'];
  const cats=catOrd.filter(c=>catsSet.has(c));

  return{tot,totV,ticket:tot?totV/tot:0,vendHoje,porCon,rank,topCon,proj,dPass,dFalt,meta,faltMeta,ritmo,vdNec,dif,porCorCat,porCorTipo,tipos,cats};
}

      '<div style="background:var(--dark);border-radius:14px;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between">'+
        '<div style="display:flex;align-items:center;gap:10px">'+
          '<span style="font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--roxo);text-transform:uppercase">◆ Agger</span>'+
        '</div>'+
        '<div style="display:flex;gap:32px;align-items:center">'+
          '<div style="text-align:center"><div style="font-size:10px;color:#6060A0;margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em">Total vendas</div><div style="font-size:28px;font-weight:800;color:var(--limao)">'+d.porEq.Agger.v+'</div></div>'+
          '<div style="text-align:center"><div style="font-size:10px;color:#6060A0;margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em">Mensalidade</div><div style="font-size:16px;font-weight:700;color:var(--menta)">'+fR(d.porEq.Agger.val)+'</div></div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    // Tabela Agger por estado (compacta)
    '<div class="card" style="margin-bottom:12px">'+
      '<div class="ctit">Agger por estado</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:6px">'+aP+'</div>'+
    '</div>'+
    '<div class="gbot">'+
      '<div class="card" style="overflow-x:auto"><div class="ctit">Ranking de vendedores</div><table class="rt"><thead><tr><th>#</th><th>Vendedor</th><th>Equipe</th><th class="tr">Vendas</th><th class="tr">Mensalidade</th></tr></thead><tbody>'+rR+'</tbody></table></div>'+
    '</div>';
  // Velocímetro externo
  if(window.GVE){window.GVE.destroy();window.GVE=null;}
  const cve=document.getElementById('gcVelE');
  if(cve){window.GVE=new Chart(cve,{type:'doughnut',data:{datasets:[{data:[Math.min(pctE,100),Math.max(0,100-pctE)],backgroundColor:['#5353E9','#1a1a3e'],borderWidth:0,circumference:180,rotation:270},{data:[Math.min(pctPE,100),Math.max(0,100-pctPE)],backgroundColor:['rgba(83,83,233,0.2)','transparent'],borderWidth:0,circumference:180,rotation:270}]},options:{responsive:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{enabled:false}}}});}

  if(GR){GR.destroy();GR=null;}
  const ctx=document.getElementById('gcEst');
  if(ctx)GR=new Chart(ctx,{type:'bar',data:{labels:ests,datasets:['Joao','Bernardo','Renata','Agger'].map(k=>({label:EQCFG[k].nome,data:ests.map(uf=>(d.porEstEq[uf]||{})[k]||0),backgroundColor:EQCFG[k].cor+'CC',borderRadius:4}))},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},scales:{x:{stacked:true,grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'#9090AA',font:{size:11}}},y:{stacked:true,grid:{display:false},ticks:{color:'#5353E9',font:{size:11,weight:'600'}}}}}});
}

// ============================================================
// RENDER PAINEL DE CADASTROS (EXTERNO)
// Contador Agger + 4 cards compactos
// ============================================================
function rendPainelCad(cad){
  let painel=document.getElementById('painel-cad');
  if(!painel){
    painel=document.createElement('div');
    painel.id='painel-cad';
    // Insere ANTES do ranking (sectit com texto "Ranking" ou último card)
    const root=document.getElementById('root');
    const rankingRef=root.querySelector('.gbot');
    if(rankingRef) root.insertBefore(painel,rankingRef);
    else root.appendChild(painel);
  }

  const EQ_CAD=[
    {k:'Joao',    nome:'João',    cor:'#3535C0',bg:'#EEEEFF'},
    {k:'Bernardo',nome:'Bernardo',cor:'#0A6B54',bg:'#E0FDF6'},
    {k:'Renata',  nome:'Renata',  cor:'#8B1A90',bg:'#FDE8FD'},
    {k:'Agger',   nome:'Agger',   cor:'#5C6200',bg:'#F6FBDA'},
  ];

  const cards=EQ_CAD.map(e=>{
    const qtd=cad.porEq[e.k]||0;
    const pct=cad.total>0?Math.round((qtd/cad.total)*100):0;
    return '<div style="background:'+e.bg+';border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px">'+
      '<span style="width:8px;height:8px;border-radius:50%;background:'+e.cor+';flex-shrink:0"></span>'+
      '<span style="font-size:13px;font-weight:600;color:'+e.cor+';flex:1">'+e.nome+'</span>'+
      '<div style="text-align:right">'+
        '<div style="font-size:22px;font-weight:800;color:'+e.cor+'">'+qtd+'</div>'+
        '<div style="font-size:10px;color:'+e.cor+';opacity:.7">'+pct+'%</div>'+
      '</div>'+
    '</div>';
  }).join('');

  painel.innerHTML=
    '<div class="sectit">Corretores cadastrados por equipe</div>'+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:6px">'+
      cards+
    '</div>'+
    '<div style="font-size:11px;color:var(--sub);text-align:right;margin-bottom:20px">'+
      'Total: <b style="color:var(--dark)">'+cad.total+'</b> corretores ativos'+
    '</div>';
}

// ============================================================
// RENDER INTERNO
// ============================================================
function rendInt(d){
  const topN=d.topCon?d.topCon[0]:'—';
  const topI=d.topCon?d.topCon[1]:{v:0,val:0};
  const pct=Math.min(100,Math.round((d.tot/d.meta)*100));
  const pctP=Math.min(100,Math.round((d.proj/d.meta)*100));
  const md=['🥇','🥈','🥉'];

  // Alerta objetivo
  let alr='';
  if(d.faltMeta===0){
    alr='<div class="objalr verd"><span class="objdiff">✅ Meta atingida!</span>Parabéns pela conquista do mês.</div>';
  }else if(d.dif>0){
    alr='<div class="objalr verm"><span class="objdiff">⚡ +'+d.dif.toFixed(1)+' vendas/dia</span>Precisa acelerar em relação ao ritmo atual ('+d.ritmo.toFixed(1)+'/dia)</div>';
  }else{
    alr='<div class="objalr verd"><span class="objdiff">✅ No caminho certo</span>Ritmo atual suficiente para bater a meta.</div>';
  }

  // Tabela 1: corretores
  const t1R=d.rank.map(([nm,inf],i)=>{
    const pos=i+1,pc=pos<=3?'p'+pos:'';
    const tc=inf.tend>=d.meta?'#0A6B54':inf.tend>=d.tot?'#5353E9':'#C0392B';
    return '<tr>'+
      '<td><span class="pos '+pc+'">'+(pos<=3?md[i]:pos)+'</span></td>'+
      '<td class="fw">'+nm+'</td>'+
      '<td class="tr fw" style="color:#5353E9">'+inf.v+'</td>'+
      '<td class="tr fw" style="color:'+tc+'">'+inf.tend+'</td>'+
      '<td class="tr" style="color:#7B7B9A">'+(inf.metaI>0?inf.metaI:'—')+'</td>'+
      '<td class="tr" style="color:'+(inf.faltI>0?'#E74C3C':'#2ecc71')+'">'+(inf.faltI!==null?inf.faltI:'—')+'</td>'+
      '<td class="tr" style="font-size:11px;color:#7B7B9A">'+fR(inf.val)+'</td>'+
      '<td class="tr" style="font-size:11px;color:#7B7B9A">'+(inf.v>0?fR(inf.val/inf.v):'—')+'</td>'+
    '</tr>';
  }).join('');

  // Tabela 2: corretor x categoria uso
  const uHd=d.cats.map(c=>'<th class="tr">'+c+'</th>').join('');
  const uFoot=d.cats.map(c=>{const tot=d.rank.reduce((s,[nm])=>s+((d.porCorCat[nm]||{})[c]||0),0);return '<td class="tr">'+tot+'</td>';}).join('');
  const uRows=d.rank.map(([nm])=>{
    const cells=d.cats.map(c=>'<td class="tr">'+(d.porCorCat[nm]&&d.porCorCat[nm][c]?d.porCorCat[nm][c]:'-')+'</td>').join('');
    const rowTot=d.cats.reduce((s,c)=>s+((d.porCorCat[nm]||{})[c]||0),0);
    return '<tr><td class="fw">'+nm+'</td>'+cells+'<td class="tr fw" style="color:#5353E9">'+rowTot+'</td></tr>';
  }).join('');

  // Tabela 3: tipo de negociação (pivô: corretor x tipo, com totais)
  const tpHd=d.tipos.length?d.tipos.map(t=>'<th style="text-align:center">'+t+'</th>').join(''):'';
  const tpRows=d.tipos.length?d.rank.map(([nm])=>{
    const cells=d.tipos.map(t=>'<td>'+(d.porCorTipo[nm]&&d.porCorTipo[nm][t]?d.porCorTipo[nm][t]:'-')+'</td>').join('');
    const rowTot=d.tipos.reduce((s,t)=>s+((d.porCorTipo[nm]||{})[t]||0),0);
    return '<tr><td class="fw">'+nm+'</td>'+cells+'<td class="fw" style="color:#5353E9">'+rowTot+'</td></tr>';
  }).join(''):'';
  // Totais por tipo (última linha)
  const tpFoot=d.tipos.length?d.tipos.map(t=>{const s=d.rank.reduce((acc,[nm])=>acc+((d.porCorTipo[nm]||{})[t]||0),0);return '<td>'+s+'</td>';}).join(''):'';
  const tpFootTot=d.rank.reduce((s,[nm])=>s+d.tipos.reduce((ss,t)=>ss+((d.porCorTipo[nm]||{})[t]||0),0),0);

  document.getElementById('root').innerHTML=
    // KPIs
    '<div class="krow">'+
      '<div class="kpi kd"><div class="klbl">Total de vendas</div><div class="kval">'+fN(d.tot)+'</div>'+(d.vendHoje>0?'<div class="khoje">+'+d.vendHoje+' hoje</div>':'<div class="khoje" style="color:#5a5a9a">0 hoje</div>')+'<div class="kdeco">📋</div></div>'+
      '<div class="kpi kr"><div class="klbl">Faturamento adesão</div><div class="kval">'+fR(d.totV)+'</div><div class="ksub">Soma valor adesão</div><div class="kdeco">💰</div></div>'+
      '<div class="kpi km"><div class="klbl">Ticket médio adesão</div><div class="kval">'+fR(d.ticket)+'</div><div class="ksub">Por contrato</div><div class="kdeco">📈</div></div>'+
    '</div>'+
    // Destaque + Velocímetro
    '<div class="g2">'+
      '<div class="dest"><div class="destlbl">🏆 Destaque do mês</div><div class="destnom">'+topN+'</div><div class="destst"><div><div class="destsl">Vendas</div><div class="destsv">'+topI.v+'</div></div><div><div class="destsl">Faturamento</div><div class="destsv" style="font-size:13px">'+fR(topI.val)+'</div></div><div><div class="destsl">Ticket médio</div><div class="destsv" style="font-size:13px">'+(topI.v>0?fR(topI.val/topI.v):'—')+'</div></div></div></div>'+
      '<div class="velcard"><div class="veltit">Meta mensal</div><canvas id="gcVel" width="260" height="150"></canvas><div class="velinfo"><div class="velat">'+fN(d.tot)+' <span style="font-size:14px;color:#5a5a9a">/ '+d.meta+'</span></div><div class="velm">'+pct+'% atingido</div><div class="velp">Projeção: '+fN(d.proj)+' vendas</div></div></div>'+
    '</div>'+
    // Tendência + Objetivo
    '<div class="g2">'+
      '<div class="tendcard">'+
        '<div class="tendl"><div class="tslbl az">📊 Tendência de vendas</div><div class="tsbig">'+fN(d.proj)+'</div><div class="tssub">Projeção para o fim do mês</div><div class="tsdet">Dias úteis passados: <b style="color:#93ADFC">'+d.dPass+'</b><br>Dias úteis restantes: <b style="color:#AFF9E4">'+d.dFalt+'</b></div></div>'+
        '<div class="tendr"><div class="tslbl mn">Ritmo atual</div><div class="rval">'+d.ritmo.toFixed(1)+'</div><div class="rlbl">vendas/dia</div></div>'+
      '</div>'+
      '<div class="objcard"><div class="objtit">Objetivo diário</div><div class="objmain"><div class="objval">'+(d.dFalt>0?d.vdNec.toFixed(1):'—')+'</div><div class="objunit">vendas/dia<br><span style="color:#5a5a9a;font-size:10px">necessárias</span></div></div><div class="objlbl">Faltam <b style="color:'+(d.faltMeta===0?'#2ecc71':'#DFF44C')+'">'+d.faltMeta+'</b> vendas · '+d.dFalt+' dias úteis</div>'+alr+'</div>'+
    '</div>'+
    // Tabela corretores
    '<div class="sectit">Corretores internos</div>'+
    '<div class="card" style="overflow-x:auto;margin-bottom:16px">'+
      '<table class="it"><thead><tr><th>#</th><th>Corretor</th><th class="tr">Vendas</th><th class="tr">Tendência</th><th class="tr">Meta</th><th class="tr">Faltam</th><th class="tr">Faturamento</th><th class="tr">Ticket médio</th></tr></thead><tbody>'+t1R+'</tbody></table>'+
    '</div>'+
    // Tabela uso
    '<div class="sectit">Vendas por categoria</div>'+
    '<div class="card" style="overflow-x:auto;margin-bottom:16px">'+
      '<table class="it"><thead><tr><th>Corretor</th>'+uHd+'<th class="tr">Total</th></tr></thead><tbody>'+uRows+'</tbody>'+
      '<tfoot><tr><td class="fw">Total</td>'+uFoot+'<td class="tr fw" style="color:#5353E9">'+d.tot+'</td></tr></tfoot></table>'+
    '</div>'+
    // Tabela tipo negociação
    '<div class="sectit">Por tipo de negociação</div>'+
    '<div class="card" style="overflow-x:auto;margin-bottom:16px">'+
      (d.tipos.length===0
        ? '<div style="padding:1rem;color:var(--sub);font-size:13px">⚠️ A coluna Tipo de negociação não existe nessa aba. Adicione-a à planilha para visualizar.</div>'
        : '<table class="it"><thead><tr><th>Corretor</th>'+tpHd+'<th style="text-align:center;color:#5353E9">Total</th></tr></thead><tbody>'+tpRows+'</tbody><tfoot><tr><td class="fw">Total</td>'+tpFoot+'<td class="fw" style="color:#5353E9">'+tpFootTot+'</td></tr></tfoot></table>')+
    '</div>';

  if(GV){GV.destroy();GV=null;}
  const cv=document.getElementById('gcVel');
  if(cv)GV=new Chart(cv,{type:'doughnut',data:{datasets:[{data:[Math.min(pct,100),Math.max(0,100-pct)],backgroundColor:['#5353E9','#1a1a3e'],borderWidth:0,circumference:180,rotation:270},{data:[Math.min(pctP,100),Math.max(0,100-pctP)],backgroundColor:['rgba(83,83,233,0.2)','transparent'],borderWidth:0,circumference:180,rotation:270}]},options:{responsive:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{enabled:false}}}});
}

// ============================================================
// CONTROLE
// ============================================================
function setView(v){VIEW=v;document.getElementById('btn-ext').classList.toggle('on',v==='ext');document.getElementById('btn-int').classList.toggle('on',v==='int');atualizar();}
function trocarMes(v){MES=v;atualizar();}
function popularSel(){const s=document.getElementById('mes-sel');s.innerHTML='';MESES.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;if(m===MES)o.selected=true;s.appendChild(o);});}
async function atualizar(){
  try{
    document.getElementById('ts').textContent='Atualizando...';
    const rows=await fetchRows(MES);
    if(VIEW==='ext'){
      rendExt(procExt(rows,MES));
      // Carrega cadastros em paralelo e adiciona o painel
      fetchCadastros().then(cad=>{if(cad)rendPainelCad(cad);}).catch(()=>{});
    }
    else rendInt(procInt(rows,MES));
    document.getElementById('ts').textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR');
  }catch(e){
    document.getElementById('root').innerHTML='<div class="smsg err"><div class="ico">❌</div>'+e.message+'<br><br><small>Verifique se a aba existe e a planilha está pública.</small></div>';
    document.getElementById('ts').textContent='Erro';
  }
}
(function(){MES=achaMes(nomeMes());popularSel();atualizar();setInterval(atualizar,60000);})();
</script>
