<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allsafe Seguro Auto</title>

<!-- Prefetch das páginas para zero delay -->
<link rel="prefetch" href="Comercial/">
<link rel="prefetch" href="Cobrancas/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --roxo:#5353E9;
  --lime:#C8E542;
  --dark:#0D0D2B;
  --card:#161640;
  --white:#FFFFFF;
  --bg:#050510;
}

html{height:100%}

body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--white);
  min-height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow:hidden;
  position:relative;
}

/* ── Ambient background glow ── */
body::before{
  content:'';
  position:fixed;
  top:-40%;left:-20%;
  width:140%;height:140%;
  background:
    radial-gradient(ellipse 600px 600px at 30% 20%, rgba(83,83,233,.08) 0%, transparent 70%),
    radial-gradient(ellipse 500px 500px at 70% 70%, rgba(200,229,66,.04) 0%, transparent 70%),
    radial-gradient(ellipse 800px 800px at 50% 50%, rgba(83,83,233,.03) 0%, transparent 60%);
  pointer-events:none;
  z-index:0;
}

/* ── Subtle grid pattern ── */
body::after{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(83,83,233,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(83,83,233,.03) 1px, transparent 1px);
  background-size:80px 80px;
  pointer-events:none;
  z-index:0;
}

.container{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
  padding:2rem;
  width:100%;
  max-width:560px;
  animation:containerIn 1s cubic-bezier(.16,1,.3,1) both;
}

@keyframes containerIn{
  from{opacity:0;transform:translateY(30px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* ── Logo ── */
.logo-wrap{
  margin-bottom:12px;
  animation:logoIn .8s cubic-bezier(.16,1,.3,1) .15s both;
}

@keyframes logoIn{
  from{opacity:0;transform:scale(.8)}
  to{opacity:1;transform:scale(1)}
}

.logo-img{
  width:88px;
  height:88px;
  border-radius:22px;
  object-fit:cover;
  box-shadow:
    0 0 0 1px rgba(83,83,233,.15),
    0 8px 40px rgba(83,83,233,.2),
    0 2px 12px rgba(0,0,0,.4);
  transition:transform .4s cubic-bezier(.16,1,.3,1), box-shadow .4s ease;
}

.logo-img:hover{
  transform:scale(1.06);
  box-shadow:
    0 0 0 1px rgba(83,83,233,.25),
    0 12px 50px rgba(83,83,233,.3),
    0 4px 20px rgba(0,0,0,.5);
}

/* ── Brand text ── */
.brand{
  text-align:center;
  margin-bottom:48px;
  animation:brandIn .8s cubic-bezier(.16,1,.3,1) .3s both;
}

@keyframes brandIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

.brand h1{
  font-size:28px;
  font-weight:700;
  letter-spacing:-.02em;
  color:var(--white);
  margin-bottom:6px;
}

.brand p{
  font-size:13px;
  font-weight:400;
  color:rgba(255,255,255,.35);
  letter-spacing:.04em;
}

/* ── Navigation grid ── */
.nav-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  width:100%;
}

/* ── Card button ── */
.nav-card{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:space-between;
  padding:24px 22px 20px;
  min-height:140px;
  background:rgba(22,22,64,.6);
  border:1px solid rgba(83,83,233,.12);
  border-radius:20px;
  cursor:pointer;
  text-decoration:none;
  color:var(--white);
  transition:
    transform .35s cubic-bezier(.16,1,.3,1),
    box-shadow .35s ease,
    border-color .35s ease,
    background .35s ease;
  overflow:hidden;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}

.nav-card::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:20px;
  background:linear-gradient(135deg, rgba(83,83,233,.06) 0%, transparent 60%);
  opacity:0;
  transition:opacity .35s ease;
  pointer-events:none;
}

.nav-card:hover::before{opacity:1}

.nav-card:hover{
  transform:translateY(-4px) scale(1.01);
  box-shadow:0 12px 40px rgba(83,83,233,.15), 0 4px 16px rgba(0,0,0,.3);
  border-color:rgba(83,83,233,.25);
  background:rgba(22,22,64,.8);
}

.nav-card:active{
  transform:translateY(-1px) scale(.99);
  transition-duration:.1s;
}

/* Staggered entrance */
.nav-card:nth-child(1){animation:cardIn .6s cubic-bezier(.16,1,.3,1) .45s both}
.nav-card:nth-child(2){animation:cardIn .6s cubic-bezier(.16,1,.3,1) .55s both}
.nav-card:nth-child(3){animation:cardIn .6s cubic-bezier(.16,1,.3,1) .65s both}
.nav-card:nth-child(4){animation:cardIn .6s cubic-bezier(.16,1,.3,1) .75s both}

@keyframes cardIn{
  from{opacity:0;transform:translateY(20px) scale(.95)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

.card-icon{
  font-size:28px;
  margin-bottom:14px;
  display:block;
  line-height:1;
}

.card-label{
  font-size:15px;
  font-weight:600;
  letter-spacing:-.01em;
  line-height:1.3;
}

.card-arrow{
  position:absolute;
  right:18px;
  bottom:18px;
  font-size:14px;
  color:rgba(255,255,255,.2);
  transition:color .3s ease, transform .3s cubic-bezier(.16,1,.3,1);
}

.nav-card:hover .card-arrow{
  color:var(--roxo);
  transform:translateX(3px);
}

/* ── Disabled state ── */
.nav-card.disabled{
  cursor:default;
  opacity:.4;
  pointer-events:auto;
}

.nav-card.disabled:hover{
  transform:none;
  box-shadow:none;
  border-color:rgba(83,83,233,.12);
  background:rgba(22,22,64,.6);
}

.nav-card.disabled:hover::before{opacity:0}
.nav-card.disabled:hover .card-arrow{color:rgba(255,255,255,.2);transform:none}
.nav-card.disabled:active{transform:none}

.card-badge{
  position:absolute;
  top:14px;
  right:14px;
  font-size:9px;
  font-weight:600;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:rgba(200,229,66,.7);
  background:rgba(200,229,66,.08);
  border:1px solid rgba(200,229,66,.15);
  border-radius:20px;
  padding:3px 10px;
  line-height:1.4;
}

/* ── Footer ── */
.footer{
  margin-top:48px;
  text-align:center;
  animation:brandIn .8s cubic-bezier(.16,1,.3,1) .9s both;
}

.footer p{
  font-size:11px;
  color:rgba(255,255,255,.15);
  letter-spacing:.03em;
}

/* ── Live dot ── */
.live-indicator{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  font-weight:500;
  color:rgba(175,249,228,.5);
  margin-top:8px;
}

.live-dot{
  width:5px;height:5px;
  border-radius:50%;
  background:#AFF9E4;
  animation:pulse 2.5s ease-in-out infinite;
}

@keyframes pulse{
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(175,249,228,.4)}
  50%{opacity:.4;box-shadow:0 0 0 6px rgba(175,249,228,0)}
}

/* ── Responsive ── */
@media(max-width:480px){
  .container{padding:1.5rem;gap:0}
  .logo-img{width:72px;height:72px;border-radius:18px}
  .brand h1{font-size:24px}
  .brand{margin-bottom:36px}
  .nav-card{min-height:120px;padding:20px 18px 16px;border-radius:16px}
  .card-icon{font-size:24px;margin-bottom:10px}
  .card-label{font-size:14px}
  .footer{margin-top:36px}
}

@media(max-width:360px){
  .nav-grid{gap:10px}
  .nav-card{min-height:110px;padding:16px 14px 14px}
  .card-label{font-size:13px}
  .brand h1{font-size:22px}
}

@media(min-height:800px){
  .brand{margin-bottom:56px}
  .footer{margin-top:60px}
}
</style>
</head>
<body>

<div class="container">

  <div class="logo-wrap">
    <img class="logo-img" src="logo.png" alt="Allsafe Seguro Auto">
  </div>

  <div class="brand">
    <h1>Allsafe Seguro Auto</h1>
    <p>Painel de gestão</p>
  </div>

  <nav class="nav-grid">

    <a class="nav-card" href="Comercial/" id="link-comercial">
      <span class="card-icon">📊</span>
      <span class="card-label">Comercial</span>
      <span class="card-arrow">→</span>
    </a>

    <a class="nav-card" href="Cobrancas/" id="link-cobrancas">
      <span class="card-icon">💳</span>
      <span class="card-label">Cobranças</span>
      <span class="card-arrow">→</span>
    </a>

    <div class="nav-card disabled">
      <span class="card-badge">Em breve</span>
      <span class="card-icon">🛡️</span>
      <span class="card-label">Sinistros</span>
      <span class="card-arrow">→</span>
    </div>

    <div class="nav-card disabled">
      <span class="card-badge">Em breve</span>
      <span class="card-icon">💰</span>
      <span class="card-label">Financeiro</span>
      <span class="card-arrow">→</span>
    </div>

  </nav>

  <div class="footer">
    <p style="color:rgba(255,255,255,.6);font-style:italic">"Se você pode sonhar, você pode realizar"</p>
    <p style="color:rgba(255,255,255,.35);font-size:10px;margin-top:4px">— Walt Disney</p>
  </div>

</div>

<script>
/* Pre-carrega as páginas ativas em background via iframe oculto
   para que ao clicar o browser já tenha o HTML em cache */
(function(){
  var pages = ['Comercial/', 'Cobrancas/'];
  pages.forEach(function(url){
    var iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:absolute;width:0;height:0;border:0;opacity:0;pointer-events:none';
    iframe.src = url;
    iframe.loading = 'eager';
    iframe.setAttribute('tabindex', '-1');
    iframe.setAttribute('aria-hidden', 'true');
    document.body.appendChild(iframe);
  });
})();
</script>

</body>
</html>
