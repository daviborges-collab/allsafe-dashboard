<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Allsafe Seguro Auto</title>
<meta name="theme-color" content="#050510">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Prefetch das páginas para zero delay -->
<link rel="prefetch" href="Comercial/">
<link rel="prefetch" href="Cobrancas/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --roxo:#5353E9;
  --lime:#C8E542;
  --dark:#0D0D2B;
  --card:#161640;
  --white:#FFFFFF;
  --bg:#050510;
}

html{height:100%}

body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--white);
  min-height:100%;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow:hidden;
  position:relative;
}

/* ── Ambient orbs — Apple-style depth ── */
.orb{
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  pointer-events:none;
  z-index:0;
}
.orb-1{
  width:500px;height:500px;
  top:-15%;left:-10%;
  background:radial-gradient(circle, rgba(83,83,233,.12) 0%, transparent 70%);
  animation:orbFloat 20s ease-in-out infinite;
}
.orb-2{
  width:400px;height:400px;
  bottom:-10%;right:-8%;
  background:radial-gradient(circle, rgba(200,229,66,.06) 0%, transparent 70%);
  animation:orbFloat 25s ease-in-out infinite reverse;
}
.orb-3{
  width:300px;height:300px;
  top:40%;left:50%;
  transform:translateX(-50%);
  background:radial-gradient(circle, rgba(83,83,233,.04) 0%, transparent 70%);
  animation:orbFloat 18s ease-in-out 3s infinite;
}

@keyframes orbFloat{
  0%,100%{transform:translate(0,0)}
  33%{transform:translate(20px,-15px)}
  66%{transform:translate(-15px,10px)}
}

/* ── Container ── */
.container{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:2rem;
  width:100%;
  max-width:520px;
}

/* ── Logo ── */
.logo-wrap{
  margin-bottom:20px;
  opacity:0;
  animation:logoReveal 1s cubic-bezier(.22,1,.36,1) .2s forwards;
}

@keyframes logoReveal{
  from{opacity:0;transform:scale(.85) translateY(8px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

.logo-img{
  width:80px;
  height:80px;
  border-radius:20px;
  object-fit:cover;
  box-shadow:
    0 0 0 0.5px rgba(255,255,255,.08),
    0 4px 24px rgba(83,83,233,.25),
    0 1px 6px rgba(0,0,0,.5);
  transition:transform .5s cubic-bezier(.22,1,.36,1), box-shadow .5s ease;
  will-change:transform;
}

.logo-img:hover{
  transform:scale(1.05) translateY(-2px);
  box-shadow:
    0 0 0 0.5px rgba(255,255,255,.12),
    0 8px 40px rgba(83,83,233,.3),
    0 2px 12px rgba(0,0,0,.5);
}

/* ── Brand text ── */
.brand{
  text-align:center;
  margin-bottom:44px;
  opacity:0;
  animation:textReveal .9s cubic-bezier(.22,1,.36,1) .4s forwards;
}

@keyframes textReveal{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}

.brand h1{
  font-size:26px;
  font-weight:700;
  letter-spacing:-.025em;
  color:var(--white);
  margin-bottom:6px;
  line-height:1.2;
}

.brand p{
  font-size:13px;
  font-weight:400;
  color:rgba(255,255,255,.3);
  letter-spacing:.02em;
}

/* ── Navigation grid ── */
.nav-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  width:100%;
}

/* ── Card button — glass morphism ── */
.nav-card{
  position:relative;
  display:flex;
  flex-direction:column;
  padding:22px 20px 18px;
  min-height:136px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  cursor:pointer;
  text-decoration:none;
  color:var(--white);
  overflow:hidden;
  backdrop-filter:blur(40px) saturate(1.2);
  -webkit-backdrop-filter:blur(40px) saturate(1.2);
  transition:
    transform .4s cubic-bezier(.22,1,.36,1),
    box-shadow .4s ease,
    border-color .4s ease,
    background .4s ease;
  will-change:transform;
  opacity:0;
}

/* Staggered entrance */
.nav-card:nth-child(1){animation:cardReveal .7s cubic-bezier(.22,1,.36,1) .55s forwards}
.nav-card:nth-child(2){animation:cardReveal .7s cubic-bezier(.22,1,.36,1) .65s forwards}
.nav-card:nth-child(3){animation:cardReveal .7s cubic-bezier(.22,1,.36,1) .75s forwards}
.nav-card:nth-child(4){animation:cardReveal .7s cubic-bezier(.22,1,.36,1) .85s forwards}

@keyframes cardReveal{
  from{opacity:0;transform:translateY(16px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* Shimmer highlight on top edge */
.nav-card::before{
  content:'';
  position:absolute;
  top:0;left:10%;right:10%;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.1), transparent);
  opacity:0;
  transition:opacity .4s ease;
}

/* Inner glow on hover */
.nav-card::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:18px;
  background:radial-gradient(ellipse at 30% 0%, rgba(83,83,233,.08) 0%, transparent 60%);
  opacity:0;
  transition:opacity .4s ease;
  pointer-events:none;
}

.nav-card:hover{
  transform:translateY(-3px);
  box-shadow:
    0 8px 32px rgba(83,83,233,.12),
    0 2px 8px rgba(0,0,0,.3);
  border-color:rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);
}
.nav-card:hover::before{opacity:1}
.nav-card:hover::after{opacity:1}

.nav-card:active{
  transform:translateY(-1px) scale(.985);
  transition-duration:.12s;
}

.card-icon{
  font-size:26px;
  margin-bottom:auto;
  display:block;
  line-height:1;
}

.card-bottom{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:16px;
}

.card-label{
  font-size:14.5px;
  font-weight:600;
  letter-spacing:-.01em;
  line-height:1.3;
}

.card-arrow{
  font-size:13px;
  color:rgba(255,255,255,.15);
  transition:color .35s ease, transform .35s cubic-bezier(.22,1,.36,1);
  flex-shrink:0;
}

.nav-card:hover .card-arrow{
  color:rgba(255,255,255,.5);
  transform:translateX(3px);
}

/* ── Disabled state ── */
.nav-card.disabled{
  cursor:default;
  opacity:.35;
  pointer-events:none;
}

.card-badge{
  position:absolute;
  top:12px;
  right:12px;
  font-size:8.5px;
  font-weight:600;
  letter-spacing:.07em;
  text-transform:uppercase;
  color:rgba(200,229,66,.65);
  background:rgba(200,229,66,.06);
  border:1px solid rgba(200,229,66,.1);
  border-radius:20px;
  padding:3px 9px;
  line-height:1.4;
}

/* ── Footer ── */
.footer{
  margin-top:44px;
  text-align:center;
  opacity:0;
  animation:textReveal .8s cubic-bezier(.22,1,.36,1) 1.1s forwards;
}

.footer .quote{
  font-size:12px;
  font-weight:300;
  font-style:italic;
  color:rgba(255,255,255,.25);
  letter-spacing:.01em;
  line-height:1.6;
}

.footer .author{
  font-size:10px;
  font-weight:400;
  color:rgba(255,255,255,.15);
  margin-top:4px;
  letter-spacing:.02em;
}

/* ── Responsive — Mobile ── */
@media(max-width:480px){
  body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  .container{padding:1.5rem}
  .logo-img{width:68px;height:68px;border-radius:17px}
  .brand h1{font-size:23px}
  .brand p{font-size:12px}
  .brand{margin-bottom:36px}
  .nav-grid{gap:10px}
  .nav-card{min-height:120px;padding:18px 16px 16px;border-radius:16px}
  .nav-card::after{border-radius:16px}
  .card-icon{font-size:22px}
  .card-label{font-size:13.5px}
  .card-arrow{font-size:12px}
  .footer{margin-top:32px}
  .footer .quote{font-size:11px}
}

@media(max-width:360px){
  .nav-grid{gap:8px}
  .nav-card{min-height:110px;padding:16px 14px 14px;border-radius:14px}
  .nav-card::after{border-radius:14px}
  .card-label{font-size:13px}
  .brand h1{font-size:21px}
  .logo-img{width:60px;height:60px;border-radius:15px}
  .brand{margin-bottom:30px}
}

/* ── Desktop ── */
@media(min-width:768px){
  .container{max-width:480px}
  .logo-img{width:88px;height:88px;border-radius:22px}
  .brand h1{font-size:28px}
  .brand{margin-bottom:52px}
  .nav-card{min-height:148px;padding:24px 22px 20px;border-radius:20px}
  .nav-card::after{border-radius:20px}
  .card-icon{font-size:28px}
  .card-label{font-size:15px}
  .footer{margin-top:52px}
}

@media(min-height:800px){
  .brand{margin-bottom:56px}
  .footer{margin-top:56px}
}

/* ── Selection ── */
::selection{background:rgba(83,83,233,.3);color:#fff}
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>

<!-- Ambient light orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="container">

  <div class="logo-wrap">
    <img class="logo-img" src="logo.png" alt="Allsafe">
  </div>

  <div class="brand">
    <h1>Allsafe Seguro Auto</h1>
    <p>Painel de gestão</p>
  </div>

  <nav class="nav-grid">

    <a class="nav-card" href="Comercial/">
      <span class="card-icon">📊</span>
      <div class="card-bottom">
        <span class="card-label">Comercial</span>
        <span class="card-arrow">→</span>
      </div>
    </a>

    <a class="nav-card" href="Cobrancas/">
      <span class="card-icon">💳</span>
      <div class="card-bottom">
        <span class="card-label">Cobranças</span>
        <span class="card-arrow">→</span>
      </div>
    </a>

    <div class="nav-card disabled">
      <span class="card-badge">Em breve</span>
      <span class="card-icon">🛡️</span>
      <div class="card-bottom">
        <span class="card-label">Sinistros</span>
        <span class="card-arrow">→</span>
      </div>
    </div>

    <div class="nav-card disabled">
      <span class="card-badge">Em breve</span>
      <span class="card-icon">💰</span>
      <div class="card-bottom">
        <span class="card-label">Financeiro</span>
        <span class="card-arrow">→</span>
      </div>
    </div>

  </nav>

  <div class="footer">
    <p class="quote">"Se você pode sonhar, você pode realizar"</p>
    <p class="author">— Walt Disney</p>
  </div>

</div>

<script>
/* Pre-carrega as páginas ativas em background via fetch */
(function(){
  ['Comercial/', 'Cobrancas/'].forEach(function(url){
    try { fetch(url, {mode:'no-cors',credentials:'same-origin'}); } catch(e){}
  });
})();
</script>

</body>
</html>
