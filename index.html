<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allsafe — Painel de Vendas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --roxo:#5353E9;--rosa:#F7B2F5;--azul:#93ADFC;
  --dark:#210B4E;--limao:#DFF44C;--menta:#AFF9E4;
  --bg:#F4F4F4;--white:#FFFFFF;--borda:#E4E4E4;--sub:#7B7B9A;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
.header{background:linear-gradient(180deg,var(--dark) 0%,#1a0940 100%);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;gap:14px;border-bottom:1px solid rgba(83,83,233,.15)}
.header-left{display:flex;align-items:center;gap:12px}
.logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--roxo),#7B6BF5);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(83,83,233,.35);flex-shrink:0}
.logo-mark svg{width:18px;height:18px}
.header-div{width:1px;height:22px;background:rgba(255,255,255,.1);flex-shrink:0}
.header h1{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.01em}
.header-right{display:flex;align-items:center;gap:10px}
.live{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--menta)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--menta);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ts{font-size:11px;color:#7B8FA8}
.btn-sm{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:rgba(255,255,255,.45);font-size:11px;padding:5px 10px;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-sm:hover{background:rgba(255,255,255,.12);color:#fff}
select.mes-sel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:var(--azul);font-size:11px;padding:5px 8px;cursor:pointer;font-family:inherit;transition:all .2s}
select.mes-sel:hover{background:rgba(255,255,255,.1)}
.tog{display:flex;background:rgba(255,255,255,.08);border-radius:9px;padding:2px;gap:1px;backdrop-filter:blur(8px)}
.tog-btn{padding:5px 16px;border-radius:7px;border:none;font-size:11.5px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .25s cubic-bezier(.4,0,.2,1);color:rgba(255,255,255,.45);background:transparent}
.tog-btn.on{background:rgba(255,255,255,.95);color:var(--dark);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.18)}
.page{max-width:1320px;margin:0 auto;padding:1.25rem 1.5rem 3rem}
/* KPIs */
.krow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem}
.kpi{border-radius:14px;padding:1.25rem 1.5rem;position:relative;overflow:hidden}
.kd{background:var(--dark)}.kr{background:var(--roxo)}.km{background:var(--menta)}
.klbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.kd .klbl{color:var(--azul)}.kr .klbl{color:var(--rosa)}.km .klbl{color:#0A6B54}
.kval{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}
.kd .kval{color:var(--limao)}.kr .kval{color:#fff;font-size:20px}.km .kval{color:var(--dark);font-size:20px}
.ksub{font-size:11px}
.kd .ksub{color:#5a5a9a}.kr .ksub{color:rgba(255,255,255,.6)}.km .ksub{color:#0A6B54;opacity:.7}
.kdeco{position:absolute;right:-8px;bottom:-8px;font-size:64px;opacity:.07;line-height:1;pointer-events:none}
.khoje{font-size:12px;margin-top:6px;color:var(--menta);font-weight:600}
/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.gmain{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.gbot{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--white);border-radius:14px;border:1px solid var(--borda);padding:1.25rem}
.ctit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ctit::before{content:'';display:inline-block;width:3px;height:12px;background:var(--roxo);border-radius:2px}
/* EQ */
.eqi{display:flex;align-items:center;padding:10px 14px;border-radius:12px;margin-bottom:0;gap:10px}
.eqi:last-child{margin-bottom:0}
.eqdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.eqnom{font-size:13px;font-weight:600;flex:1}
.eqv{font-size:18px;font-weight:800}
.eqval{font-size:10px;font-weight:500;opacity:.7;text-align:right}
.cwrap{position:relative;width:100%}
/* AGGER */
.ag{background:var(--dark);border-radius:14px;padding:1.25rem}
.agtit{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--roxo);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.agtit::before{content:'◆';font-size:8px}
.agkpis{display:flex;gap:20px;margin-bottom:14px}
.aglbl{font-size:10px;color:#6060A0;margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.agval{font-size:24px;font-weight:800;color:var(--limao)}
.agval.sm{font-size:15px;color:var(--menta)}
.agpills{display:flex;flex-wrap:wrap;gap:6px}
.agpill{background:rgba(83,83,233,.2);border:1px solid rgba(83,83,233,.4);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--azul);display:flex;gap:5px;align-items:center}
.agpill b{font-weight:700;color:#fff}
/* RANK */
.rt{width:100%;border-collapse:collapse;font-size:12px}
.rt th{text-align:left;padding:5px 8px;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--sub);text-transform:uppercase;border-bottom:2px solid var(--borda);white-space:nowrap}
.rt td{padding:7px 8px;border-bottom:1px solid #F0F0F0;vertical-align:middle}
.rt tr:last-child td{border-bottom:none}
.rt tbody tr:hover td{background:#FAFAFF}
.pos{font-size:11px;font-weight:700;color:var(--sub);min-width:20px;display:inline-block}
.p1{color:#C8900A;font-size:14px}.p2{color:#888;font-size:14px}.p3{color:#8B5E3C;font-size:14px}
.bdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.tr{text-align:right}.fw{font-weight:700}
.lg{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.lgi{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--sub)}
.lgsq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
/* DESTAQUE */
.dest{background:linear-gradient(135deg,#3535C0,var(--roxo));border-radius:14px;padding:1.25rem;color:#fff}
.destlbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rosa);margin-bottom:8px}
.destnom{font-size:22px;font-weight:800;margin-bottom:10px}
.destst{display:flex;gap:16px;flex-wrap:wrap}
.destsl{font-size:10px;color:rgba(255,255,255,.6);margin-bottom:2px}
.destsv{font-size:15px;font-weight:700;color:#fff}
/* VELOCI */
.velcard{background:var(--dark);border-radius:14px;padding:1.25rem;display:flex;flex-direction:column;align-items:center}
.veltit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--azul);margin-bottom:8px;align-self:flex-start}
.velinfo{text-align:center;margin-top:4px}
.velat{font-size:26px;font-weight:800;color:var(--limao)}
.velm{font-size:11px;color:#5a5a9a}
.velp{font-size:12px;color:var(--menta);margin-top:3px;font-weight:600}
/* TEND + OBJ */
.tendcard{background:var(--dark);border-radius:14px;padding:1.25rem;display:flex;gap:0}
.tendl{flex:1;border-right:1px solid rgba(255,255,255,.08);padding-right:16px;margin-right:16px}
.tendr{display:flex;flex-direction:column;justify-content:center;min-width:110px}
.tslbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.tslbl.az{color:var(--azul)}.tslbl.mn{color:var(--menta)}
.tsbig{font-size:28px;font-weight:800;color:var(--limao);line-height:1;margin-bottom:3px}
.tssub{font-size:11px;color:#5a5a9a;margin-bottom:8px}
.tsdet{font-size:11px;color:#7B8FA8;line-height:1.8}
.rval{font-size:24px;font-weight:800;color:var(--menta);line-height:1;margin-bottom:2px}
.rlbl{font-size:10px;color:#5a5a9a}
/* OBJETIVO */
.objcard{background:#0d0d2e;border:1px solid rgba(83,83,233,.25);border-radius:14px;padding:1.25rem}
.objtit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rosa);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.objtit::before{content:'🎯';font-size:12px}
.objmain{display:flex;align-items:flex-end;gap:8px;margin-bottom:4px}
.objval{font-size:40px;font-weight:800;color:var(--limao);line-height:1}
.objunit{font-size:12px;color:#5a5a9a;margin-bottom:6px}
.objlbl{font-size:11px;color:#7B8FA8;margin-bottom:10px}
.objalr{border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;line-height:1.5}
.objalr.verm{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);color:#E74C3C}
.objalr.verd{background:rgba(10,107,84,.15);border:1px solid rgba(10,107,84,.3);color:#2ecc71}
.objdiff{font-size:14px;font-weight:800;display:block;margin-bottom:2px}
/* SEÇÃO */
.sectit{font-size:13px;font-weight:700;color:var(--dark);margin:20px 0 8px;display:flex;align-items:center;gap:8px}
.sectit::before{content:'';display:inline-block;width:4px;height:16px;background:var(--roxo);border-radius:2px}
/* TABELAS */
.it{width:100%;border-collapse:collapse;font-size:12px}
.it th{text-align:left;padding:6px 10px;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--sub);text-transform:uppercase;border-bottom:2px solid var(--borda);white-space:nowrap;background:#fff}
.it td{padding:7px 10px;border-bottom:1px solid #F0F0F0;vertical-align:middle;text-align:center}
.it td:first-child{text-align:left}
.it tr:last-child td{border-bottom:none}
.it tbody tr:hover td{background:#FAFAFF}
.it tfoot td{border-top:2px solid var(--borda);font-weight:700;background:#F8F8FC;padding:7px 10px}
/* STATE */
.smsg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;color:var(--sub);gap:12px;font-size:14px;text-align:center}
.smsg .ico{font-size:32px}
.err{color:#C0392B}

/* ── FILTRO EQUIPE — Segmented Control Apple ── */
.filtro-bar{display:inline-flex;gap:0;margin-bottom:16px;align-items:center;background:rgba(120,120,130,.18);border-radius:11px;padding:3px}
.filtro-lbl{display:none}
.filtro-btn{padding:6px 20px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.5);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .25s cubic-bezier(.4,0,.2,1);white-space:nowrap}
.filtro-btn:hover{color:rgba(255,255,255,.9)}
.filtro-btn.on{background:#fff;color:#1c1c1e;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.22),0 1px 2px rgba(0,0,0,.12)}
/* ── BADGE HOJE ── */
.eq-hoje-badge{font-size:9px;font-weight:700;background:rgba(255,255,255,.2);border-radius:10px;padding:1px 6px;margin-left:6px}
/* ── COMPARATIVO ── */
.kpi-comp{font-size:10px;margin-top:3px;font-weight:600}
.kpi-comp.up{color:#2ecc71}.kpi-comp.dn{color:#e74c3c}.kpi-comp.eq{color:#7B8FA8}
/* ── GRÁFICO DIÁRIO ── */
.grafico-diario-wrap{height:150px;position:relative;width:100%}
/* ── EXPAND CARD ── */
.expand-card{background:var(--white);border-radius:14px;border:1px solid var(--borda);overflow:hidden;margin-bottom:12px}
.expand-card .ec-head{padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .15s}
.expand-card .ec-head:hover{background:#F8F8FC}
.ec-tit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);display:flex;align-items:center;gap:6px}
.ec-tit::before{content:'';display:inline-block;width:3px;height:12px;background:var(--roxo);border-radius:2px}
.ec-arr{font-size:12px;color:var(--sub);transition:transform .3s;display:inline-block}
.expand-card.open .ec-arr{transform:rotate(180deg)}
.ec-body{display:none;padding:0 1.25rem 1.25rem}
.expand-card.open .ec-body{display:block}
/* ── FILTRO CORRETOR INTERNO ── */
.filtro-cor-bar{display:inline-flex;gap:0;margin-bottom:16px;align-items:center;background:rgba(120,120,130,.12);border-radius:11px;padding:3px;flex-wrap:wrap}
.filtro-cor-btn{padding:5px 14px;border-radius:8px;border:none;background:transparent;color:rgba(33,11,78,.4);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .25s cubic-bezier(.4,0,.2,1);white-space:nowrap}
.filtro-cor-btn:hover{color:rgba(33,11,78,.8)}
.filtro-cor-btn.on{background:var(--roxo);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(83,83,233,.3)}
/* ── BOTÃO SALVAR RODAPÉ ── */
.btn-salvar-rodape{display:flex;align-items:center;justify-content:center;gap:8px;margin:28px auto 0;padding:12px 28px;background:var(--dark);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#7B8FA8;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-salvar-rodape:hover{background:#2a2a5e;color:#fff;border-color:rgba(255,255,255,.2)}
@media(max-width:900px){.gmain,.gbot,.g2,.g3{grid-template-columns:1fr}.krow{grid-template-columns:1fr 1fr}.tendcard{flex-direction:column}.tendl{border-right:none;padding-right:0;margin-right:0;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:12px;margin-bottom:12px}}
@media(max-width:500px){.krow{grid-template-columns:1fr}.page{padding:.75rem}}
@media(max-width:768px){.header{flex-wrap:wrap;height:auto;padding:.5rem 1rem;gap:8px}.kval{font-size:24px!important}.card,.ag,.tendcard,.objcard,.velcard,.dest{padding:1rem}.rt td,.rt th,.it td,.it th{padding:5px 6px;font-size:11px}}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2L3 20h18L12 2z" fill="none" stroke="#fff" stroke-width="2" stroke-linejoin="round"/><path d="M8.5 14h7M10 17h4" stroke="#DFF44C" stroke-width="1.5" stroke-linecap="round"/></svg></div>
    <div class="header-div"></div>
    <h1>Painel de Vendas</h1>
  </div>
  <div class="header-right">
    <div class="tog">
      <button class="tog-btn on" id="btn-ext" onclick="setView('ext')">Externo</button>
      <button class="tog-btn" id="btn-int" onclick="setView('int')">Interno</button>
    </div>
    <select class="mes-sel" id="mes-sel" onchange="trocarMes(this.value)"></select>
    <div class="live"><div class="live-dot"></div>Ao vivo</div>
    <span class="ts" id="ts">—</span>
    <button class="btn-sm" onclick="atualizar()">↻</button>
  </div>
</div>
<div class="page">
  <div id="root"><div class="smsg"><div class="ico">⏳</div>Buscando dados...</div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ============================================================
// CONFIGURAÇÕES
// ============================================================
const MESES=['Março/2026','Abril/2026','Maio/2026','Junho/2026','Julho/2026','Agosto/2026','Setembro/2026','Outubro/2026','Novembro/2026','Dezembro/2026'];
const GIDS={'Março/2026':'99037583'};
const METAS={'Março/2026':130,'Abril/2026':130,'Maio/2026':130,'Junho/2026':130,'Julho/2026':130,'Agosto/2026':130,'Setembro/2026':130,'Outubro/2026':130,'Novembro/2026':130,'Dezembro/2026':130};
const METAS_EXT={'Março/2026':300,'Abril/2026':300,'Maio/2026':300,'Junho/2026':300,'Julho/2026':300,'Agosto/2026':300,'Setembro/2026':300,'Outubro/2026':300,'Novembro/2026':300,'Dezembro/2026':300};
const FERIADOS=['2026-01-01','2026-04-03','2026-04-21','2026-05-01','2026-06-04','2026-09-07','2026-10-12','2026-11-02','2026-11-15','2026-11-20','2026-12-25'];
const META_CORRETOR={};
const KW_INT=['interna','autocello','macro','interno'];
const KW_EXT={Joao:['joao','joão'],Bernardo:['bernardo'],Renata:['renata'],Agger:['agger']};
const EQCFG={Joao:{nome:'João',cor:'#3535C0',bg:'#EEEEFF'},Bernardo:{nome:'Bernardo',cor:'#0A6B54',bg:'#E0FDF6'},Renata:{nome:'Renata',cor:'#8B1A90',bg:'#FDE8FD'},Agger:{nome:'Agger',cor:'#5C6200',bg:'#F6FBDA'}};
const SHEET=atob('MXhKLXVGMmRILWZrbmVBYTRoVjZ2cGRzX1dEMkRkX0s0dU1KMTJMalp4UmM=');
const SHEET_CAD=atob('MThOOHhZYU5FWW9keFVjSlNLMzNlbjM4VXpXUDd5N2xNVkphSDUwclNGRVk=');
const ABA_CAD='cadastrados';
const GID_SCRIPT='2117768339';
const GID_BASE='728914571';
const EXCLUIR_REGIONAL=['totalben associacao de beneficios','sindicato- rio de janeiro - taxistas','stamrj','macro','matriz | rio de janeiro -rj','migracao - sindicato','regional - robocop- sindicato','dinami club','autocelo'];
const STATUS_OK=['ativo','pendente de analise','autorizado'];
let VIEW='ext',MES='',GR=null,GV=null;
let filtroExt=null,filtroInt=null;
let dadosExt=null,dadosBase=null,dadosMetas=null;
let GDE=null,GDI=null;
let mesAntData=null;

// ============================================================
// UTILS
// ============================================================
function n(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}
function hojeLocal(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function pv(v){if(!v)return 0;return parseFloat(String(v).replace(/R\$\s?/g,'').replace(/\./g,'').replace(',','.').trim())||0;}
function fR(v){return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fN(v){return Math.round(v).toLocaleString('pt-BR');}
function ehInt(e){const l=n(e);return KW_INT.some(k=>l.includes(k));}
function detExt(e){const l=n(e);for(const[k,ks]of Object.entries(KW_EXT)){if(ks.some(kw=>l.includes(kw)))return k;}return null;}
function ehUtil(d){const dw=d.getDay();if(dw===0||dw===6)return false;const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');return!FERIADOS.includes(ds);}
function diasUtil(ano,mes){const r=[],d=new Date(ano,mes,1);while(d.getMonth()===mes){if(ehUtil(new Date(d)))r.push(new Date(d));d.setDate(d.getDate()+1);}return r;}
function nomeMes(){const m=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];const a=new Date();return m[a.getMonth()]+'/'+a.getFullYear();}
function achaMes(s){const ns=n(s);return MESES.find(m=>n(m)===ns)||MESES.find(m=>n(m).split('/')[0]===ns.split('/')[0])||MESES[0];}

// ============================================================
// EXPAND CARD — componente colapsável
// ============================================================
function expandCard(title,content,id,openByDefault){
  var cls=openByDefault?'expand-card open':'expand-card';
  return '<div class="'+cls+'" id="ec-'+id+'">'+
    '<div class="ec-head" onclick="this.parentElement.classList.toggle(\'open\')">'+
      '<span class="ec-tit">'+title+'</span>'+
      '<span class="ec-arr">▼</span>'+
    '</div>'+
    '<div class="ec-body">'+content+'</div>'+
  '</div>';
}

// ============================================================
// CSV
// ============================================================
function parseCSV(txt){
  const linhas=txt.split('\n');
  const header=linhas[0];
  const cols=[];let inQ=false,cur='';
  for(const ch of header){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=ch;}
  cols.push(cur.trim());
  const idx={};
  cols.forEach((c,i)=>{idx[n(c)]=i;});
  const COL={
    status:idx[n('Status Contrato')]??idx[n('status contrato')]??0,
    equipe:idx[n('Equipe de Venda')]??idx[n('equipe de venda')]??4,
    consultor:idx[n('Consultor')]??idx[n('consultor')]??5,
    valor:idx[n('Valor Adesão')]??idx[n('valor adesao')]??idx[n('valor adesão')]??6,
    estado:idx[n('Estado')]??idx[n('estado')]??11,
    veiculo:idx[n('Tipo veículo')]??idx[n('tipo veiculo')]??idx[n('tipo de veiculo')]??15,
    uso:idx[n('Tipo de Uso')]??idx[n('tipo de uso')]??16,
    tipoNeg:idx[n('Como conheceu')]??idx[n('como conheceu')]??idx[n('Tipo de negociação')]??idx[n('tipo de negociacao')]??17,
    data:idx[n('Data Finalização Vistoria')]??idx[n('data finalizacao vistoria')]??idx[n('data')]??2,
  };
  const rows=linhas.slice(1).map(linha=>{
    const c=[];let inQ2=false,cur2='';
    for(const ch of linha){if(ch==='"'){inQ2=!inQ2;}else if(ch===','&&!inQ2){c.push(cur2.trim());cur2='';}else cur2+=ch;}
    c.push(cur2.trim());
    return{status:c[COL.status]||'',equipe:c[COL.equipe]||'',consultor:c[COL.consultor]||'',valor:pv(c[COL.valor]),estado:(c[COL.estado]||'').trim().toUpperCase(),veiculo:(c[COL.veiculo]||'').trim().toUpperCase(),uso:(c[COL.uso]||'').trim(),tipoNeg:(c[COL.tipoNeg]||'').trim()||'Não informado',data:(c[COL.data]||'').trim(),raw:c};
  }).filter(r=>r.raw.length>=3&&r.status);
  return rows;
}
async function fetchRows(aba){
  const url=(GIDS&&GIDS[aba])?'https://docs.google.com/spreadsheets/d/'+SHEET+'/export?format=csv&gid='+GIDS[aba]:'https://docs.google.com/spreadsheets/d/'+SHEET+'/export?format=csv&sheet='+encodeURIComponent(aba);
  const r=await fetch(url);if(!r.ok)throw new Error('Aba "'+aba+'" não encontrada.');
  const txt=await r.text();if(!txt.includes(','))throw new Error('Aba "'+aba+'" retornou dados inválidos.');
  return parseCSV(txt);
}

async function fetchCadastros(){
  const url='https://docs.google.com/spreadsheets/d/'+SHEET_CAD+'/export?format=csv&gid=1805273442';
  const r=await fetch(url);if(!r.ok)return null;
  const txt=await r.text();if(!txt.includes(','))return null;
  const linhas=txt.split('\n').slice(1).filter(l=>l.trim());
  const porEq={Joao:0,Bernardo:0,Renata:0,Agger:0};
  linhas.forEach(linha=>{
    const c=[];let inQ=false,cur='';
    for(const ch of linha){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){c.push(cur.trim());cur='';}else cur+=ch;}
    c.push(cur.trim());
    if(c.length<8)return;
    if(n(c[15]||'')!=='sim')return;
    const le=n(c[7]||'');
    if(le.includes('agger'))porEq.Agger++;
    else if(le.includes('joao')||le.includes('joão'))porEq.Joao++;
    else if(le.includes('bernardo'))porEq.Bernardo++;
    else if(le.includes('renata'))porEq.Renata++;
  });
  const total=Object.values(porEq).reduce((s,v)=>s+v,0);
  return{porEq,total};
}

async function fetchBaseCorretor(){
  const url='https://docs.google.com/spreadsheets/d/'+SHEET+'/export?format=csv&gid='+GID_BASE;
  const r=await fetch(url);if(!r.ok)return null;
  const txt=await r.text();if(!txt.includes(','))return null;
  const linhas=txt.split('\n').slice(1).filter(l=>l.trim());
  const porCon={};const hoje=new Date();
  linhas.forEach(linha=>{
    const c=[];let inQ=false,cur='';
    for(const ch of linha){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){c.push(cur.trim());cur='';}else cur+=ch;}
    c.push(cur.trim());
    if(c.length<6)return;
    const regional=n(c[5]||'');
    if(EXCLUIR_REGIONAL.some(ex=>{const nex=n(ex);return regional===nex||regional.includes(nex)||(nex.length>5&&nex.includes(regional));}))return;
    const consultor=(c[3]||'').trim();
    if(!consultor||consultor==='null'||consultor.length<2)return;
    const dataStr=(c[2]||'').trim();let dt=null;
    if(dataStr){const pts=dataStr.split('/');if(pts.length===3)dt=new Date(parseInt(pts[2]),parseInt(pts[1])-1,parseInt(pts[0]));}
    if(!porCon[consultor])porCon[consultor]={itens:0,primeiraData:null};
    porCon[consultor].itens++;
    if(dt&&(!porCon[consultor].primeiraData||dt<porCon[consultor].primeiraData))porCon[consultor].primeiraData=dt;
  });
  const top10=Object.entries(porCon).sort((a,b)=>b[1].itens-a[1].itens).slice(0,10).map(([nome,d])=>{
    let vmMes=null;
    if(d.primeiraData){const meses=(hoje.getFullYear()-d.primeiraData.getFullYear())*12+(hoje.getMonth()-d.primeiraData.getMonth())+1;vmMes=meses>0?(d.itens/meses).toFixed(1):String(d.itens);}
    return{nome,itens:d.itens,desde:d.primeiraData?d.primeiraData.toLocaleDateString('pt-BR'):'-',vmMes};
  });
  return{top10};
}

async function fetchNovosCorretores(){
  const hoje=new Date();const mesAtual=hoje.getMonth();const anoAtual=hoje.getFullYear();
  const[rBase,rCad]=await Promise.all([
    fetch('https://docs.google.com/spreadsheets/d/'+SHEET+'/export?format=csv&gid='+GID_BASE),
    fetch('https://docs.google.com/spreadsheets/d/'+SHEET_CAD+'/export?format=csv&gid=1805273442'),
  ]);
  if(!rBase.ok||!rCad.ok)return null;
  const[txtBase,txtCad]=await Promise.all([rBase.text(),rCad.text()]);
  function parse(l){const c=[];let inQ=false,cur='';for(const ch of l){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){c.push(cur.trim());cur='';}else cur+=ch;}c.push(cur.trim());return c;}
  const mapaEquipe={};
  txtCad.split('\n').slice(1).filter(l=>l.trim()).forEach(l=>{const c=parse(l);if(c.length<8)return;const nome=n(c[1]||'');if(nome)mapaEquipe[nome]=(c[7]||'').trim();});
  const porCon={};
  txtBase.split('\n').slice(1).filter(l=>l.trim()).forEach(l=>{
    const c=parse(l);if(c.length<6)return;
    const regional=n(c[5]||'');if(EXCLUIR_REGIONAL.some(ex=>regional===n(ex)||regional.includes(n(ex))))return;
    const consultor=(c[3]||'').trim();if(!consultor||consultor.length<2)return;
    const dataStr=(c[2]||'').trim();if(!dataStr)return;
    const pts=dataStr.split('/');if(pts.length!==3)return;
    const dt=new Date(parseInt(pts[2]),parseInt(pts[1])-1,parseInt(pts[0]));if(isNaN(dt.getTime()))return;
    if(!porCon[consultor]||dt<porCon[consultor].dt)porCon[consultor]={dt,equipeBase:(c[4]||'').trim()};
  });
  const novos=Object.entries(porCon).filter(([,d])=>d.dt.getMonth()===mesAtual&&d.dt.getFullYear()===anoAtual).map(([nome,d])=>{
    const equipeOficial=mapaEquipe[n(nome)]||d.equipeBase||'';const le=n(equipeOficial);
    let cat='';if(le.includes('agger'))cat='Agger';else if(le.includes('joao'))cat='João';else if(le.includes('bernardo'))cat='Bernardo';else if(le.includes('renata'))cat='Renata';else cat='Outro';
    return{nome,desde:d.dt.toLocaleDateString('pt-BR'),equipe:equipeOficial,cat};
  }).sort((a,b)=>a.cat.localeCompare(b.cat)||a.nome.localeCompare(b.nome));
  return{novos,total:novos.length};
}

function kpiComp(atual,anterior){
  if(anterior===null||anterior===undefined||anterior===0)return '';
  const pct=Math.round(((atual-anterior)/anterior)*100);
  const cls=pct>0?'up':pct<0?'dn':'eq';
  const seta=pct>0?'▲':pct<0?'▼':'—';
  return '<div class="kpi-comp '+cls+'">'+seta+' '+Math.abs(pct)+'% vs mês ant.</div>';
}

function procExt(rows,aba){
  const hoje=new Date();const hojeStr=hojeLocal();
  const v=rows.filter(r=>STATUS_OK.includes(n(r.status))&&!ehInt(r.equipe));
  const vFilt=filtroExt?v.filter(r=>detExt(r.equipe)===filtroExt):v;
  let tot=0,totV=0,vendHoje=0;
  const vendHojeEq={Joao:0,Bernardo:0,Renata:0,Agger:0};
  const porDia={},porDiaEq={};
  const porEq={Joao:{v:0,val:0},Bernardo:{v:0,val:0},Renata:{v:0,val:0},Agger:{v:0,val:0}};
  const porEst={},porEstEq={},porCon={};
  vFilt.forEach(r=>{
    const eqK=detExt(r.equipe),con=r.consultor;
    let dStr='';const dia=r.data?r.data.slice(0,5):null;
    if(r.data){const pts=r.data.split('/');if(pts.length===3)dStr=pts[2]+'-'+pts[1].padStart(2,'0')+'-'+pts[0].padStart(2,'0');else dStr=r.data.slice(0,10);}
    if(dStr===hojeStr){vendHoje++;if(eqK&&vendHojeEq[eqK]!==undefined)vendHojeEq[eqK]++;}
    if(dia){porDia[dia]=(porDia[dia]||0)+1;if(eqK){if(!porDiaEq[eqK])porDiaEq[eqK]={};porDiaEq[eqK][dia]=(porDiaEq[eqK][dia]||0)+1;}}
    tot++;totV+=r.valor;
    if(eqK&&porEq[eqK]){porEq[eqK].v++;porEq[eqK].val+=r.valor;}
    if(r.estado){porEst[r.estado]=(porEst[r.estado]||0)+1;if(eqK){if(!porEstEq[r.estado])porEstEq[r.estado]={};porEstEq[r.estado][eqK]=(porEstEq[r.estado][eqK]||0)+1;}}
    if(eqK&&con){if(!porCon[con])porCon[con]={v:0,val:0,eq:eqK};porCon[con].v++;porCon[con].val+=r.valor;}
  });
  const agEst=Object.entries(porEstEq).map(([uf,eq])=>[uf,eq['Agger']||0]).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const partes=(aba||MES).split('/');
  const mNorm=['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const mIdx=mNorm.indexOf(n(partes[0]));const ano=parseInt(partes[1])||hoje.getFullYear();
  const eMes=(hoje.getMonth()===mIdx&&hoje.getFullYear()===ano);
  let dPass=0,dFalt=0;
  if(mIdx>=0){const todos=diasUtil(ano,mIdx);if(eMes){dPass=todos.filter(d=>d<=hoje).length;dFalt=todos.filter(d=>d>hoje).length;}else if(hoje>new Date(ano,mIdx+1,0)){dPass=todos.length;}else{dFalt=diasUtil(ano,mIdx).length;}}
  const metaExt=METAS_EXT[aba||MES]||300;
  const proj=dPass>0?Math.round((tot/dPass)*(dPass+dFalt)):tot;
  const faltMeta=Math.max(0,metaExt-tot);const ritmo=dPass>0?(tot/dPass):0;const vdNec=dFalt>0?(faltMeta/dFalt):0;const dif=vdNec-ritmo;
  const rankExt=Object.entries(porCon).sort((a,b)=>b[1].v-a[1].v);const topConExt=rankExt[0]||null;
  return{tot,totV,ticket:tot?totV/tot:0,porEq,porEst,porEstEq,agEst,rank:rankExt,topConExt,vendHoje,vendHojeEq,porDia,porDiaEq,proj,dPass,dFalt,metaExt,faltMeta,ritmo,vdNec,dif,porCon};
}

function procInt(rows,aba){
  const hoje=new Date();const hojeStr=hojeLocal();
  const v=rows.filter(r=>STATUS_OK.includes(n(r.status))&&ehInt(r.equipe));
  // Build full rank from ALL internal data (for filter buttons)
  const porConAll={};
  v.forEach(r=>{const con=r.consultor||'';if(!con)return;if(!porConAll[con])porConAll[con]={v:0,val:0};porConAll[con].v++;porConAll[con].val+=r.valor;});
  const allRank=Object.entries(porConAll).sort((a,b)=>b[1].v-a[1].v);
  // Apply corretor filter
  const vFilt=filtroInt?v.filter(r=>r.consultor===filtroInt):v;
  let tot=0,totV=0,vendHoje=0;const porCon={};const porCorCat={};const porCorTipo={};const porDia={};
  vFilt.forEach(r=>{
    const con=r.consultor||'';if(!con)return;
    let dStr='';const dia=r.data?r.data.slice(0,5):null;
    if(r.data){const parts=r.data.split('/');if(parts.length===3)dStr=parts[2]+'-'+parts[1].padStart(2,'0')+'-'+parts[0].padStart(2,'0');else dStr=r.data.slice(0,10);}
    if(dStr===hojeStr)vendHoje++;if(dia)porDia[dia]=(porDia[dia]||0)+1;
    tot++;totV+=r.valor;
    if(!porCon[con])porCon[con]={v:0,val:0,tipoNeg:r.tipoNeg};porCon[con].v++;porCon[con].val+=r.valor;
    let cat='';if(r.veiculo==='MOTO')cat='Moto';else if(n(r.uso).includes('taxi'))cat='Táxi';else if(n(r.uso).includes('aplic')||n(r.uso).includes('profiss'))cat='Aplicativo';else cat='Particular';
    if(!porCorCat[con])porCorCat[con]={};porCorCat[con][cat]=(porCorCat[con][cat]||0)+1;
    const tipo=r.tipoNeg||'Não informado';if(!porCorTipo[con])porCorTipo[con]={};porCorTipo[con][tipo]=(porCorTipo[con][tipo]||0)+1;
  });
  const partes=aba.split('/');const mNorm=['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const mIdx=mNorm.indexOf(n(partes[0]));const ano=parseInt(partes[1])||hoje.getFullYear();
  const eMes=(hoje.getMonth()===mIdx&&hoje.getFullYear()===ano);let dPass=0,dFalt=0;
  if(mIdx>=0){const todos=diasUtil(ano,mIdx);if(eMes){dPass=todos.filter(d=>d<=hoje).length;dFalt=todos.filter(d=>d>hoje).length;}else if(hoje>new Date(ano,mIdx+1,0)){dPass=todos.length;}else{dFalt=diasUtil(ano,mIdx).length;}}
  const proj=dPass>0?Math.round((tot/dPass)*(dPass+dFalt)):tot;const meta=METAS[aba]||130;
  const faltMeta=Math.max(0,meta-tot);const ritmo=dPass>0?(tot/dPass):0;const vdNec=dFalt>0?(faltMeta/dFalt):0;const dif=vdNec-ritmo;
  const topCon=Object.entries(porCon).sort((a,b)=>b[1].v-a[1].v)[0];
  const rank=Object.entries(porCon).sort((a,b)=>b[1].v-a[1].v);
  rank.forEach(([nome,info])=>{info.tend=dPass>0?Math.round((info.v/dPass)*(dPass+dFalt)):info.v;info.metaI=META_CORRETOR[nome]||0;info.faltI=info.metaI>0?Math.max(0,info.metaI-info.v):null;});
  const tiposSet=new Set();vFilt.forEach(r=>tiposSet.add(r.tipoNeg||'Não informado'));
  const todosNaoInfo=[...tiposSet].every(t=>t==='Não informado');
  const tipos=todosNaoInfo?[]:([...tiposSet].filter(t=>t&&t!=='Não informado').sort());
  if(!todosNaoInfo&&tiposSet.has('Não informado'))tipos.push('Não informado');
  const catsSet=new Set();Object.values(porCorCat).forEach(o=>Object.keys(o).forEach(c=>catsSet.add(c)));
  const cats=['Táxi','Aplicativo','Particular','Moto'].filter(c=>catsSet.has(c));
  return{tot,totV,ticket:tot?totV/tot:0,vendHoje,porDia,porCon,rank,allRank,topCon,proj,dPass,dFalt,meta,faltMeta,ritmo,vdNec,dif,porCorCat,porCorTipo,tipos,cats};
}

    '</div>'+
    '<div class="card" style="margin-bottom:12px"><div class="ctit">Evolução diária de vendas — '+MES+'</div><div class="grafico-diario-wrap"><canvas id="gcDiarioInt"></canvas></div></div>'+
    '<div class="g2" style="margin-bottom:12px">'+
      '<div class="dest" style="min-height:0"><div class="destlbl">🏆 Destaque do mês</div><div class="destnom" style="font-size:16px;margin-bottom:6px">'+topN+'</div><div class="destst"><div><div class="destsl">Vendas</div><div class="destsv">'+topI.v+'</div></div><div><div class="destsl">Faturamento</div><div class="destsv" style="font-size:13px">'+fR(topI.val)+'</div></div><div><div class="destsl">Ticket médio</div><div class="destsv" style="font-size:13px">'+(topI.v>0?fR(topI.val/topI.v):'—')+'</div></div></div></div>'+
      '<div class="velcard" style="min-height:0"><div class="veltit">Meta mensal</div><canvas id="gcVel" width="260" height="120"></canvas><div class="velinfo"><div class="velat">'+fN(d.tot)+' <span style="font-size:13px;color:#5a5a9a">/ '+d.meta+'</span></div><div class="velm">'+pct+'% atingido</div><div class="velp">Projeção: '+fN(d.proj)+' vendas</div><div style="font-size:12px;color:#fff;margin-top:4px;font-weight:700;background:rgba(255,255,255,.12);border-radius:6px;padding:3px 10px;display:inline-block">Meta: '+fN(d.meta)+'</div></div></div>'+
    '</div>'+
    '<div class="g2">'+
      '<div class="tendcard"><div class="tendl"><div class="tslbl az">📊 Tendência de vendas</div><div class="tsbig">'+fN(d.proj)+'</div><div class="tssub">Projeção para o fim do mês</div><div class="tsdet">Dias úteis passados: <b style="color:#93ADFC">'+d.dPass+'</b><br>Dias úteis restantes: <b style="color:#AFF9E4">'+d.dFalt+'</b></div></div><div class="tendr"><div class="tslbl mn">Ritmo atual</div><div class="rval">'+d.ritmo.toFixed(1)+'</div><div class="rlbl">vendas/dia</div></div></div>'+
      '<div class="objcard"><div class="objtit">Objetivo diário</div><div class="objmain"><div class="objval">'+(d.dFalt>0?d.vdNec.toFixed(1):'—')+'</div><div class="objunit">vendas/dia<br><span style="color:#5a5a9a;font-size:10px">necessárias</span></div></div><div class="objlbl">Faltam <b style="color:'+(d.faltMeta===0?'#2ecc71':'#DFF44C')+'">'+d.faltMeta+'</b> vendas · '+d.dFalt+' dias úteis</div>'+alr+'</div>'+
    '</div>'+
    expandCard('Corretores internos','<div style="overflow-x:auto"><table class="it"><thead><tr><th>#</th><th>Corretor</th><th class="tr">Vendas</th><th class="tr">Tendência</th><th class="tr">Meta</th><th class="tr">Faltam</th><th class="tr">Faturamento</th><th class="tr">Ticket médio</th></tr></thead><tbody>'+t1R+'</tbody></table></div>','cor-int',true)+
    expandCard('Vendas por categoria','<div style="overflow-x:auto"><table class="it"><thead><tr><th>Corretor</th>'+uHd+'<th class="tr">Total</th></tr></thead><tbody>'+uRows+'</tbody><tfoot><tr><td class="fw">Total</td>'+uFoot+'<td class="tr fw" style="color:#5353E9">'+d.tot+'</td></tr></tfoot></table></div>','cat',false)+
    expandCard('Origem de venda',(d.tipos.length===0?'<div style="padding:1rem;color:var(--sub);font-size:13px">⚠️ A coluna "Como conheceu" não existe nessa aba. Adicione-a à planilha para visualizar.</div>':'<div style="overflow-x:auto"><table class="it"><thead><tr><th>Corretor</th>'+tpHd+'<th style="text-align:center;color:#5353E9">Total</th></tr></thead><tbody>'+tpRows+'</tbody><tfoot><tr><td class="fw">Total</td>'+tpFoot+'<td class="fw" style="color:#5353E9">'+tpFootTot+'</td></tr></tfoot></table></div>'),'origem',false)+
    '<button class="btn-salvar-rodape" onclick="exportarDashboard()">⬇ Salvar espelho do dia</button>';

  rendGraficoDiario('gcDiarioInt',d.porDia,'#5353E9','GDI');

  if(GV){GV.destroy();GV=null;}
  var cv=document.getElementById('gcVel');
  if(cv)GV=new Chart(cv,{type:'doughnut',data:{datasets:[{data:[Math.min(pct,100),Math.max(0,100-pct)],backgroundColor:['#5353E9','#1a1a3e'],borderWidth:0,circumference:180,rotation:270},{data:[Math.min(pctP,100),Math.max(0,100-pctP)],backgroundColor:['rgba(83,83,233,0.2)','transparent'],borderWidth:0,circumference:180,rotation:270}]},options:{responsive:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{enabled:false}}}});
}

// ============================================================
// CONTROLE
// ============================================================
function setView(v){VIEW=v;document.getElementById('btn-ext').classList.toggle('on',v==='ext');document.getElementById('btn-int').classList.toggle('on',v==='int');atualizar();}
function trocarMes(v){MES=v;atualizar();}
function popularSel(){var s=document.getElementById('mes-sel');s.innerHTML='';MESES.forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=m;if(m===MES)o.selected=true;s.appendChild(o);});}

async function atualizar(){
  try{
    document.getElementById('ts').textContent='Atualizando...';
    if(!dadosMetas)await fetchMetas().catch(function(){});
    var rows=await fetchRows(MES);
    if(VIEW==='ext'){
      var dExt=procExt(rows,MES);
      dadosExt=dExt;
      rendExt(dExt);
      fetchMesAnterior().then(function(ant){mesAntData=ant;rendExt(dExt);}).catch(function(){});
      fetchCadastros().then(function(cad){if(cad)rendPainelCad(cad);}).catch(function(){});
      fetchScriptManual().then(function(data){if(data)rendCorretoresEstado(data);}).catch(function(){});
      fetchBaseCorretor().then(function(data){dadosBase=data;if(data)rendBaseCorretor(data);}).catch(function(){});
      fetchNovosCorretores().then(function(data){if(data)rendNovosCorretores(data);}).catch(function(){});
    } else {
      rendInt(procInt(rows,MES));
    }
    document.getElementById('ts').textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR');
  }catch(e){
    document.getElementById('root').innerHTML='<div class="smsg err"><div class="ico">❌</div>'+e.message+'<br><br><small>Verifique se a aba existe e a planilha está pública.</small></div>';
    document.getElementById('ts').textContent='Erro';
  }
}
(function(){MES=achaMes(nomeMes());popularSel();atualizar();setInterval(atualizar,60000);})();
</script>
