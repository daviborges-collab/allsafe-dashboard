<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allsafe — Painel de Vendas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --roxo:#5353E9;--rosa:#F7B2F5;--azul:#93ADFC;
  --dark:#210B4E;--limao:#DFF44C;--menta:#AFF9E4;
  --bg:#F4F4F4;--white:#FFFFFF;--borda:#E4E4E4;--sub:#7B7B9A;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
.header{background:var(--dark);padding:0 1.5rem;height:64px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.header-left{display:flex;align-items:center;gap:14px}
.logo-img{height:32px;width:auto;filter:brightness(0) invert(1)}
.header-divider{width:1px;height:28px;background:rgba(255,255,255,.15)}
.header h1{font-size:13px;font-weight:500;color:rgba(255,255,255,.7);white-space:nowrap}
.header-right{display:flex;align-items:center;gap:10px}
.live{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--menta)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--menta);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ts{font-size:11px;color:#7B8FA8;white-space:nowrap}
.btn-sm{background:transparent;border:1px solid #3a3a6a;border-radius:6px;color:var(--sub);font-size:11px;padding:4px 10px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-sm:hover{background:#2d2d5e;color:#fff}
select.mes-select{background:#1a1a3e;border:1px solid #3a3a6a;border-radius:6px;color:#93ADFC;font-size:11px;padding:4px 8px;cursor:pointer;font-family:inherit}
.toggle-wrap{display:flex;background:#111133;border-radius:8px;padding:3px;gap:2px}
.toggle-btn{padding:5px 18px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;color:#7B8FA8;background:transparent}
.toggle-btn.active{background:var(--roxo);color:#fff}
.page{max-width:1320px;margin:0 auto;padding:1.25rem 1.5rem 3rem}
/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem}
.kpi{border-radius:14px;padding:1.25rem 1.5rem;position:relative;overflow:hidden}
.kpi-dark{background:var(--dark)}.kpi-roxo{background:var(--roxo)}.kpi-menta{background:var(--menta)}
.kpi-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.kpi-dark .kpi-label{color:var(--azul)}.kpi-roxo .kpi-label{color:var(--rosa)}.kpi-menta .kpi-label{color:#0A6B54}
.kpi-value{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}
.kpi-dark .kpi-value{color:var(--limao)}.kpi-roxo .kpi-value{color:#fff;font-size:20px}.kpi-menta .kpi-value{color:var(--dark);font-size:20px}
.kpi-sub{font-size:11px}
.kpi-dark .kpi-sub{color:#5a5a9a}.kpi-roxo .kpi-sub{color:rgba(255,255,255,.6)}.kpi-menta .kpi-sub{color:#0A6B54;opacity:.7}
.kpi-deco{position:absolute;right:-8px;bottom:-8px;font-size:64px;opacity:.07;line-height:1;pointer-events:none}
.kpi-hoje{font-size:12px;margin-top:6px;color:var(--menta);font-weight:600}
/* GRID */
.main-grid{display:grid;grid-template-columns:270px 1fr;gap:12px;margin-bottom:12px}
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--white);border-radius:14px;border:1px solid var(--borda);padding:1.25rem}
.card-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.card-title::before{content:'';display:inline-block;width:3px;height:12px;background:var(--roxo);border-radius:2px}
/* EQUIPES */
.eq-item{display:flex;align-items:center;padding:9px 11px;border-radius:10px;margin-bottom:7px;gap:9px}
.eq-item:last-child{margin-bottom:0}
.eq-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.eq-nome{font-size:13px;font-weight:600;flex:1}
.eq-vendas{font-size:18px;font-weight:800}
.eq-val{font-size:10px;font-weight:500;opacity:.7;text-align:right}
.chart-wrap{position:relative;width:100%}
/* AGGER */
.agger-card{background:var(--dark);border-radius:14px;padding:1.25rem}
.agger-title{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--roxo);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.agger-title::before{content:'◆';font-size:8px}
.agger-kpis{display:flex;gap:20px;margin-bottom:14px}
.agger-lbl{font-size:10px;color:#6060A0;margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.agger-val{font-size:26px;font-weight:800;color:var(--limao)}
.agger-val.sm{font-size:15px;color:var(--menta)}
.agger-pills{display:flex;flex-wrap:wrap;gap:6px}
.agger-pill{background:rgba(83,83,233,.2);border:1px solid rgba(83,83,233,.4);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--azul);display:flex;gap:5px;align-items:center}
.agger-pill b{font-weight:700;color:#fff}
/* RANK */
.rank-table{width:100%;border-collapse:collapse;font-size:12px}
.rank-table th{text-align:left;padding:5px 7px;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--sub);text-transform:uppercase;border-bottom:2px solid var(--borda)}
.rank-table td{padding:7px 7px;border-bottom:1px solid #F0F0F0;vertical-align:middle}
.rank-table tr:last-child td{border-bottom:none}
.rank-table tbody tr:hover td{background:#FAFAFF}
.pos{font-size:11px;font-weight:700;color:var(--sub);min-width:20px;display:inline-block}
.p1{color:#C8900A;font-size:14px}.p2{color:#888;font-size:14px}.p3{color:#8B5E3C;font-size:14px}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.tr{text-align:right}.fw{font-weight:700}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--sub)}
.legend-sq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
/* INTERNO */
.int-top-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.destaque-card{background:linear-gradient(135deg,#3535C0,var(--roxo));border-radius:14px;padding:1.25rem;color:#fff}
.destaque-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rosa);margin-bottom:8px}
.destaque-nome{font-size:22px;font-weight:800;margin-bottom:10px}
.destaque-stats{display:flex;gap:16px;flex-wrap:wrap}
.destaque-stat-label{font-size:10px;color:rgba(255,255,255,.6);margin-bottom:2px}
.destaque-stat-value{font-size:15px;font-weight:700;color:#fff}
/* TENDÊNCIA + OBJETIVO */
.tend-obj-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.tend-card{background:var(--dark);border-radius:14px;padding:1.25rem;display:flex;gap:0}
.tend-left{flex:1;border-right:1px solid rgba(255,255,255,.08);padding-right:16px;margin-right:16px}
.tend-right{display:flex;flex-direction:column;justify-content:center;min-width:100px}
.tend-section-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.tend-section-label.azul{color:var(--azul)}.tend-section-label.menta{color:var(--menta)}
.tend-big{font-size:28px;font-weight:800;color:var(--limao);line-height:1;margin-bottom:3px}
.tend-sub{font-size:11px;color:#5a5a9a;margin-bottom:10px}
.tend-detail{font-size:11px;color:#7B8FA8;line-height:1.8}
.ritmo-value{font-size:22px;font-weight:800;color:var(--menta);line-height:1;margin-bottom:2px}
.ritmo-label{font-size:10px;color:#5a5a9a}
/* OBJETIVO */
.obj-card{background:#0d0d2e;border:1px solid rgba(83,83,233,.25);border-radius:14px;padding:1.25rem}
.obj-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rosa);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.obj-title::before{content:'🎯';font-size:12px}
.obj-main{display:flex;align-items:flex-end;gap:8px;margin-bottom:4px}
.obj-value{font-size:40px;font-weight:800;color:var(--limao);line-height:1}
.obj-unit{font-size:13px;color:#5a5a9a;margin-bottom:6px}
.obj-label{font-size:11px;color:#7B8FA8;margin-bottom:12px}
.obj-alerta{border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;line-height:1.5}
.obj-alerta.vermelho{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);color:#E74C3C}
.obj-alerta.verde{background:rgba(10,107,84,.15);border:1px solid rgba(10,107,84,.3);color:#2ecc71}
.obj-diff{font-size:14px;font-weight:800;display:block;margin-bottom:2px}
/* VELOCI + DESTAQUE */
.veloci-card{background:var(--dark);border-radius:14px;padding:1.25rem;display:flex;flex-direction:column;align-items:center}
.veloci-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--azul);margin-bottom:8px;align-self:flex-start}
.veloci-info{text-align:center;margin-top:4px}
.veloci-atual{font-size:26px;font-weight:800;color:var(--limao)}
.veloci-meta{font-size:11px;color:#5a5a9a}
.veloci-proj{font-size:12px;color:var(--menta);margin-top:3px;font-weight:600}
/* SEÇÃO */
.sec-title{font-size:13px;font-weight:700;color:var(--dark);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';display:inline-block;width:4px;height:16px;background:var(--roxo);border-radius:2px}
/* TABELAS */
.int-table{width:100%;border-collapse:collapse;font-size:12px}
.int-table th{text-align:left;padding:6px 8px;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--sub);text-transform:uppercase;border-bottom:2px solid var(--borda);white-space:nowrap}
.int-table td{padding:7px 8px;border-bottom:1px solid #F0F0F0;vertical-align:middle}
.int-table tr:last-child td{border-bottom:none}
.int-table tbody tr:hover td{background:#FAFAFF}
/* STATE */
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;color:var(--sub);gap:12px;font-size:14px;text-align:center}
.state-msg .ico{font-size:32px}
.err{color:#C0392B}
@media(max-width:900px){.main-grid,.bottom-grid,.int-top-grid,.tend-obj-grid{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr 1fr}.tend-card{flex-direction:column}.tend-left{border-right:none;padding-right:0;margin-right:0;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:12px;margin-bottom:12px}}
@media(max-width:500px){.kpi-row{grid-template-columns:1fr}.page{padding:1rem}}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ============================================================
// CONFIGURAÇÕES — EDITE AQUI
// ============================================================
const MESES = [
  'Janeiro/2026','Fevereiro/2026','Março/2026','Abril/2026',
  'Maio/2026','Junho/2026','Julho/2026','Agosto/2026',
  'Setembro/2026','Outubro/2026','Novembro/2026','Dezembro/2026',
];
const METAS = {
  'Janeiro/2026':130,'Fevereiro/2026':130,'Março/2026':130,
  'Abril/2026':130,'Maio/2026':130,'Junho/2026':130,
  'Julho/2026':130,'Agosto/2026':130,'Setembro/2026':130,
  'Outubro/2026':130,'Novembro/2026':130,'Dezembro/2026':130,
};
const FERIADOS = [
  '2026-01-01','2026-04-03','2026-04-21','2026-05-01',
  '2026-06-04','2026-09-07','2026-10-12','2026-11-02',
  '2026-11-15','2026-11-20','2026-12-25',
];

// ============================================================
// PALAVRAS-CHAVE — EDITE AQUI SE NECESSÁRIO
// ============================================================
const KW_INTERNO = ['interna','autocello','macro','interno'];
const KW_EXTERNO = {
  Joao:     ['joao','joão'],
  Bernardo: ['bernardo'],
  Renata:   ['renata'],
  Agger:    ['agger'],
};
const EQ_CFG = {
  Joao:     {nome:'João',    cor:'#3535C0',bg:'#EEEEFF'},
  Bernardo: {nome:'Bernardo',cor:'#0A6B54',bg:'#E0FDF6'},
  Renata:   {nome:'Renata',  cor:'#8B1A90',bg:'#FDE8FD'},
  Agger:    {nome:'Agger',   cor:'#5C6200',bg:'#F6FBDA'},
};

// ============================================================
// META INDIVIDUAL POR CORRETOR (opcional — 0 = sem meta individual)
// ============================================================
const META_CORRETOR = {};
// Exemplo: META_CORRETOR['Aline Lima'] = 20;

// ============================================================
// ESTADO
// ============================================================
const SHEET_ID='1xJ-uF2dH-fkneAa4hV6vpds_WD2Dd_K4uMJ12LjZxRc';
const STATUS_OK=['ativo','pendente de analise','autorizado'];
let viewAtual='externo', mesAtual='', grafico=null, graficoVeloci=null;

// ============================================================
// UTILITÁRIOS
// ============================================================
function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}
function parseValor(v){if(!v)return 0;return parseFloat(String(v).replace(/R$\s?/g,'').replace(/\./g,'').replace(',','.').trim())||0;}
function fmtR(n){return 'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtN(n){return Math.round(n).toLocaleString('pt-BR');}
function ehInterno(e){const l=norm(e);return KW_INTERNO.some(kw=>l.includes(kw));}
function detectarExt(e){const l=norm(e);for(const[k,kws]of Object.entries(KW_EXTERNO)){if(kws.some(kw=>l.includes(kw)))return k;}return null;}

// ============================================================
// DIAS ÚTEIS
// ============================================================
function ehDiaUtil(d){const dw=d.getDay();if(dw===0||dw===6)return false;return!FERIADOS.includes(d.toISOString().slice(0,10));}
function diasUteisNoMes(ano,mes){const dias=[],d=new Date(ano,mes,1);while(d.getMonth()===mes){if(ehDiaUtil(new Date(d)))dias.push(new Date(d));d.setDate(d.getDate()+1);}return dias;}

// ============================================================
// MÊS
// ============================================================
function nomeMesAtual(){const m=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];const a=new Date();return m[a.getMonth()]+'/'+a.getFullYear();}
function encontrarMes(n){const nn=norm(n);return MESES.find(m=>norm(m)===nn)||MESES.find(m=>norm(m).split('/')[0]===nn.split('/')[0])||MESES[2];}
function csvUrl(aba){return'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/export?format=csv&sheet='+encodeURIComponent(aba);}

// ============================================================
// FETCH
// ============================================================
function parseCSV(txt){return txt.split('\n').slice(1).map(l=>{const c=[];let inQ=false,cur='';for(const ch of l){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){c.push(cur.trim());cur='';}else cur+=ch;}c.push(cur.trim());return c;}).filter(r=>r.length>=5);}
async function buscarDados(aba){const r=await fetch(csvUrl(aba));if(r.ok){const t=await r.text();if(t.includes(','))return parseCSV(t);}throw new Error('Aba "'+aba+'" não encontrada. Verifique o nome na planilha.');}

// ============================================================
// PROCESSAR EXTERNO
// ============================================================
function processarExterno(linhas){
  const v=linhas.filter(r=>STATUS_OK.includes(norm(r[0]))&&!ehInterno(r[4]));
  let total=0,totVal=0;
  const porEq={Joao:{v:0,val:0},Bernardo:{v:0,val:0},Renata:{v:0,val:0},Agger:{v:0,val:0}};
  const porEst={},porEstEq={},porCon={};
  v.forEach(r=>{
    const val=parseValor(r[6]),eqK=detectarExt(r[4]);
    const uf=String(r[11]||'').trim().toUpperCase(),con=String(r[5]||'').trim();
    total++;totVal+=val;
    if(eqK&&porEq[eqK]){porEq[eqK].v++;porEq[eqK].val+=val;}
    if(uf){porEst[uf]=(porEst[uf]||0)+1;if(eqK){if(!porEstEq[uf])porEstEq[uf]={};porEstEq[uf][eqK]=(porEstEq[uf][eqK]||0)+1;}}
    if(eqK&&con&&con!=='null'){if(!porCon[con])porCon[con]={v:0,val:0,eq:eqK};porCon[con].v++;porCon[con].val+=val;}
  });
  const aggrEst=Object.entries(porEstEq).map(([uf,eq])=>[uf,eq['Agger']||0]).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  return{total,totVal,ticket:total?totVal/total:0,porEq,porEst,porEstEq,aggrEst,ranking:Object.entries(porCon).sort((a,b)=>b[1].v-a[1].v)};
}

// ============================================================
// PROCESSAR INTERNO
// ============================================================
function processarInterno(linhas,nomeAba){
  const hoje=new Date();
  const hojeStr=hoje.toISOString().slice(0,10);

  const v=linhas.filter(r=>STATUS_OK.includes(norm(r[0]))&&ehInterno(r[4]));
  let total=0,totVal=0,vendaHoje=0;
  const porCon={};

  v.forEach(r=>{
    const val=parseValor(r[6]);
    const con=String(r[5]||'').trim();
    const tipo=String(r[17]||'').trim()||'Não informado'; // col R
    const veiculo=String(r[15]||'').trim()||'—';           // col P
    const uso=String(r[16]||'').trim()||'—';               // col Q
    // Data da venda (col C)
    const dataRaw=String(r[2]||'').trim();
    const dataVenda=dataRaw.split('/').length===3?dataRaw.split('/').reverse().join('-'):dataRaw.slice(0,10);
    if(dataVenda===hojeStr) vendaHoje++;

    total++;totVal+=val;
    if(con&&con!=='null'){
      if(!porCon[con])porCon[con]={v:0,val:0,tipo,veiculo,uso};
      porCon[con].v++;porCon[con].val+=val;
    }
  });

  // Dias úteis
  const partes=nomeAba.split('/');
  const mesesNorm=['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const mIdx=mesesNorm.indexOf(norm(partes[0]));
  const ano=parseInt(partes[1])||hoje.getFullYear();
  const eMesAtual=(hoje.getMonth()===mIdx&&hoje.getFullYear()===ano);
  let diasPassados=0,diasFaltam=0;
  if(mIdx>=0){
    const todos=diasUteisNoMes(ano,mIdx);
    if(eMesAtual){diasPassados=todos.filter(d=>d<=hoje).length;diasFaltam=todos.filter(d=>d>hoje).length;}
    else if(hoje>new Date(ano,mIdx+1,0)){diasPassados=todos.length;diasFaltam=0;}
    else{diasPassados=0;diasFaltam=todos.length;}
  }
  const projecao=diasPassados>0?Math.round((total/diasPassados)*(diasPassados+diasFaltam)):total;
  const meta=METAS[nomeAba]||130;
  const faltamMeta=Math.max(0,meta-total);
  const ritmoAtual=diasPassados>0?(total/diasPassados):0;
  const vendDiaNec=diasFaltam>0?(faltamMeta/diasFaltam):0;
  const difRitmo=vendDiaNec-ritmoAtual;
  const topCon=Object.entries(porCon).sort((a,b)=>b[1].v-a[1].v)[0];
  const ranking=Object.entries(porCon).sort((a,b)=>b[1].v-a[1].v);

  // Tendência individual
  ranking.forEach(([nome,info])=>{
    const metaInd=META_CORRETOR[nome]||0;
    info.tendencia=diasPassados>0?Math.round((info.v/diasPassados)*(diasPassados+diasFaltam)):info.v;
    info.metaInd=metaInd;
    info.faltamInd=metaInd>0?Math.max(0,metaInd-info.v):null;
  });

  // Tabela tipo de negociação (só total por tipo)
  const porTipo={};
  v.forEach(r=>{
    const tipo=String(r[17]||'').trim()||'Não informado';
    const val=parseValor(r[6]);
    if(!porTipo[tipo])porTipo[tipo]={v:0,val:0};
    porTipo[tipo].v++;porTipo[tipo].val+=val;
  });

  // Tabela por corretor x categoria de uso
  // Categorias: Táxi, Aplicativo, Particular (carro), Moto
  const porCorretorUso={};
  const todasCategorias=new Set();
  v.forEach(r=>{
    const con=String(r[5]||'').trim();
    if(!con||con==='null')return;
    const veiculo=String(r[15]||'').trim().toUpperCase(); // col P
    const uso=String(r[16]||'').trim().toLowerCase();     // col Q
    let cat='';
    if(veiculo==='MOTO') cat='Moto';
    else if(uso.includes('taxi')||uso.includes('táxi')) cat='Táxi';
    else if(uso.includes('aplic')||uso.includes('profiss')) cat='Aplicativo';
    else cat='Particular';
    todasCategorias.add(cat);
    if(!porCorretorUso[con])porCorretorUso[con]={};
    porCorretorUso[con][cat]=(porCorretorUso[con][cat]||0)+1;
  });
  const catOrdem=['Táxi','Aplicativo','Particular','Moto'];
  const cats=catOrdem.filter(c=>todasCategorias.has(c));

  return{total,totVal,ticket:total?totVal/total:0,vendaHoje,porCon,ranking,topCon,projecao,diasPassados,diasFaltam,meta,faltamMeta,ritmoAtual,vendDiaNec,difRitmo,porTipo,porCorretorUso,cats};
}

// ============================================================
// RENDER EXTERNO
// ============================================================
function renderExterno(d){
  const estados=Object.entries(d.porEst).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([uf])=>uf);
  const eqCards=['Joao','Bernardo','Renata','Agger'].map(k=>{
    const cfg=EQ_CFG[k],st=d.porEq[k];
    return '<div class="eq-item" style="background:'+cfg.bg+'"><span class="eq-dot" style="background:'+cfg.cor+'"></span><span class="eq-nome" style="color:'+cfg.cor+'">'+cfg.nome+'</span><div style="text-align:right"><div class="eq-vendas" style="color:'+cfg.cor+'">'+st.v+'</div><div class="eq-val" style="color:'+cfg.cor+'">'+fmtR(st.val)+'</div></div></div>';
  }).join('');
  const aggrPills=d.aggrEst.length?d.aggrEst.map(([uf,cnt])=>'<div class="agger-pill"><b>'+cnt+'</b>'+uf+'</div>').join(''):'<span style="font-size:11px;opacity:.5">Sem dados</span>';
  const medals=['🥇','🥈','🥉'];
  const rankRows=d.ranking.slice(0,35).map(([nome,info],i)=>{
    const pos=i+1,pc=pos<=3?'p'+pos:'',cfg=EQ_CFG[info.eq]||{cor:'#444',bg:'#F5F5F5'};
    return '<tr><td><span class="pos '+pc+'">'+(pos<=3?medals[i]:pos)+'</span></td><td class="fw">'+nome+'</td><td><span class="badge" style="background:'+cfg.bg+';color:'+cfg.cor+'">'+(EQ_CFG[info.eq]?EQ_CFG[info.eq].nome:info.eq)+'</span></td><td class="tr fw" style="color:#5353E9">'+info.v+'</td><td class="tr" style="color:#7B7B9A;font-size:11px">'+fmtR(info.val)+'</td></tr>';
  }).join('');
  const legenda=['Joao','Bernardo','Renata','Agger'].map(k=>'<span class="legend-item"><span class="legend-sq" style="background:'+EQ_CFG[k].cor+'"></span>'+EQ_CFG[k].nome+'</span>').join('');

  document.getElementById('root').innerHTML=
    '<div class="kpi-row">'+
      '<div class="kpi kpi-dark"><div class="kpi-label">Total de vendas</div><div class="kpi-value">'+fmtN(d.total)+'</div><div class="kpi-sub">João · Bernardo · Renata · Agger</div><div class="kpi-deco">📋</div></div>'+
      '<div class="kpi kpi-roxo"><div class="kpi-label">Mensalidade total</div><div class="kpi-value">'+fmtR(d.totVal)+'</div><div class="kpi-sub">Soma valor adesão</div><div class="kpi-deco">💰</div></div>'+
      '<div class="kpi kpi-menta"><div class="kpi-label">Ticket médio</div><div class="kpi-value">'+fmtR(d.ticket)+'</div><div class="kpi-sub">Por contrato</div><div class="kpi-deco">📈</div></div>'+
    '</div>'+
    '<div class="main-grid">'+
      '<div class="card"><div class="card-title">Equipes de venda</div>'+eqCards+'</div>'+
      '<div class="card"><div class="card-title">Vendas por estado</div><div class="chart-wrap" style="height:'+Math.max(200,estados.length*32)+'px"><canvas id="graficoEstado"></canvas></div><div class="legend">'+legenda+'</div></div>'+
    '</div>'+
    '<div class="bottom-grid">'+
      '<div class="agger-card"><div class="agger-title">Agger</div><div class="agger-kpis"><div><div class="agger-lbl">Total vendas</div><div class="agger-val">'+d.porEq.Agger.v+'</div></div><div><div class="agger-lbl">Mensalidade</div><div class="agger-val sm">'+fmtR(d.porEq.Agger.val)+'</div></div></div><div class="agger-lbl" style="margin-bottom:7px">Por estado</div><div class="agger-pills">'+aggrPills+'</div></div>'+
      '<div class="card" style="overflow-x:auto"><div class="card-title">Ranking de vendedores</div><table class="rank-table"><thead><tr><th>#</th><th>Vendedor</th><th>Equipe</th><th class="tr">Vendas</th><th class="tr">Mensalidade</th></tr></thead><tbody>'+rankRows+'</tbody></table></div>'+
    '</div>';

  if(grafico){grafico.destroy();grafico=null;}
  const ctx=document.getElementById('graficoEstado');
  if(ctx){grafico=new Chart(ctx,{type:'bar',data:{labels:estados,datasets:['Joao','Bernardo','Renata','Agger'].map(k=>({label:EQ_CFG[k].nome,data:estados.map(uf=>(d.porEstEq[uf]||{})[k]||0),backgroundColor:EQ_CFG[k].cor+'CC',borderRadius:4}))},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},scales:{x:{stacked:true,grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'#9090AA',font:{size:11}}},y:{stacked:true,grid:{display:false},ticks:{color:'#5353E9',font:{size:11,weight:'600'}}}}}});}
}

// ============================================================
// RENDER INTERNO
// ============================================================
function renderInterno(d){
  const topNome=d.topCon?d.topCon[0]:'—';
  const topInfo=d.topCon?d.topCon[1]:{v:0,val:0};
  const pct=Math.min(100,Math.round((d.total/d.meta)*100));
  const pctProj=Math.min(100,Math.round((d.projecao/d.meta)*100));
  const medals=['🥇','🥈','🥉'];

  // Alerta objetivo
  let alertaHtml='';
  if(d.faltamMeta===0){
    alertaHtml='<div class="obj-alerta verde"><span class="obj-diff">✅ Meta atingida!</span>Parabéns pela conquista do mês.</div>';
  } else if(d.difRitmo>0){
    alertaHtml='<div class="obj-alerta vermelho"><span class="obj-diff">⚡ +'+d.difRitmo.toFixed(1)+' vendas/dia</span>Precisa acelerar em relação ao ritmo atual ('+d.ritmoAtual.toFixed(1)+'/dia)</div>';
  } else {
    alertaHtml='<div class="obj-alerta verde"><span class="obj-diff">✅ No caminho certo</span>Ritmo atual suficiente para bater a meta.</div>';
  }

  // Tabela 1: corretores
  const tab1Rows=d.ranking.map(([nome,info],i)=>{
    const pos=i+1,pc=pos<=3?'p'+pos:'';
    const tendCor=info.tendencia>=d.meta?'#0A6B54':info.tendencia>=d.total?'#5353E9':'#C0392B';
    const metaCell=info.metaInd>0?info.metaInd:'—';
    const faltamCell=info.faltamInd!==null?info.faltamInd:'—';
    return '<tr>'+
      '<td><span class="pos '+pc+'">'+(pos<=3?medals[i]:pos)+'</span></td>'+
      '<td class="fw">'+nome+'</td>'+
      '<td class="tr fw" style="color:#5353E9">'+info.v+'</td>'+
      '<td class="tr fw" style="color:'+tendCor+'">'+info.tendencia+'</td>'+
      '<td class="tr" style="color:#7B7B9A">'+metaCell+'</td>'+
      '<td class="tr" style="color:'+(info.faltamInd>0?'#E74C3C':'#2ecc71')+'">'+faltamCell+'</td>'+
      '<td class="tr" style="font-size:11px;color:#7B7B9A">'+fmtR(info.val)+'</td>'+
      '<td class="tr" style="font-size:11px;color:#7B7B9A">'+(info.v>0?fmtR(info.val/info.v):'—')+'</td>'+
    '</tr>';
  }).join('');

  // Tabela 2: corretor x categoria de uso
  const usoHeaders=d.cats.map(c=>'<th class="tr">'+c+'</th>').join('');
  const usoRows=d.ranking.map(([nome,info])=>{
    const cells=d.cats.map(c=>'<td class="tr">'+(d.porCorretorUso[nome]&&d.porCorretorUso[nome][c]?d.porCorretorUso[nome][c]:'-')+'</td>').join('');
    return '<tr><td class="fw">'+nome+'</td>'+cells+'</tr>';
  }).join('');

  // Tabela 3: tipo de negociação (total)
  const tipoRows=Object.entries(d.porTipo).sort((a,b)=>b[1].v-a[1].v).map(([tipo,info])=>
    '<tr><td class="fw">'+tipo+'</td><td class="tr fw" style="color:#5353E9">'+info.v+'</td><td class="tr" style="font-size:11px;color:#7B7B9A">'+fmtR(info.val)+'</td><td class="tr" style="font-size:11px;color:#7B7B9A">'+(info.v>0?fmtR(info.val/info.v):'—')+'</td><td class="tr" style="font-size:11px;color:#7B7B9A">'+(d.total>0?Math.round((info.v/d.total)*100)+'%':'—')+'</td></tr>'
  ).join('');

  document.getElementById('root').innerHTML=
    // KPIs
    '<div class="kpi-row">'+
      '<div class="kpi kpi-dark"><div class="kpi-label">Total de vendas</div><div class="kpi-value">'+fmtN(d.total)+'</div>'+
        (d.vendaHoje>0?'<div class="kpi-hoje">+'+d.vendaHoje+' hoje</div>':'<div class="kpi-hoje" style="color:#5a5a9a">0 hoje</div>')+
      '<div class="kpi-deco">📋</div></div>'+
      '<div class="kpi kpi-roxo"><div class="kpi-label">Faturamento adesão</div><div class="kpi-value">'+fmtR(d.totVal)+'</div><div class="kpi-sub">Soma valor adesão</div><div class="kpi-deco">💰</div></div>'+
      '<div class="kpi kpi-menta"><div class="kpi-label">Ticket médio adesão</div><div class="kpi-value">'+fmtR(d.ticket)+'</div><div class="kpi-sub">Por contrato</div><div class="kpi-deco">📈</div></div>'+
    '</div>'+

    // Destaque + Velocímetro
    '<div class="int-top-grid">'+
      '<div class="destaque-card">'+
        '<div class="destaque-label">🏆 Destaque do mês</div>'+
        '<div class="destaque-nome">'+topNome+'</div>'+
        '<div class="destaque-stats">'+
          '<div><div class="destaque-stat-label">Vendas</div><div class="destaque-stat-value">'+topInfo.v+'</div></div>'+
          '<div><div class="destaque-stat-label">Faturamento</div><div class="destaque-stat-value" style="font-size:13px">'+fmtR(topInfo.val)+'</div></div>'+
          '<div><div class="destaque-stat-label">Ticket médio</div><div class="destaque-stat-value" style="font-size:13px">'+(topInfo.v>0?fmtR(topInfo.val/topInfo.v):'—')+'</div></div>'+
        '</div>'+
      '</div>'+
      '<div class="veloci-card">'+
        '<div class="veloci-title">Meta mensal</div>'+
        '<canvas id="graficoVeloci" width="260" height="150"></canvas>'+
        '<div class="veloci-info">'+
          '<div class="veloci-atual">'+fmtN(d.total)+' <span style="font-size:14px;color:#5a5a9a">/ '+d.meta+'</span></div>'+
          '<div class="veloci-meta">'+pct+'% atingido</div>'+
          '<div class="veloci-proj">Projeção: '+fmtN(d.projecao)+' vendas</div>'+
        '</div>'+
      '</div>'+
    '</div>'+

    // Tendência + Objetivo
    '<div class="tend-obj-grid">'+
      '<div class="tend-card">'+
        '<div class="tend-left">'+
          '<div class="tend-section-label azul">📊 Tendência de vendas</div>'+
          '<div class="tend-big">'+fmtN(d.projecao)+'</div>'+
          '<div class="tend-sub">Projeção para o fim do mês</div>'+
          '<div class="tend-detail">'+
            'Dias úteis passados: <b style="color:#93ADFC">'+d.diasPassados+'</b><br>'+
            'Dias úteis restantes: <b style="color:#AFF9E4">'+d.diasFaltam+'</b>'+
          '</div>'+
        '</div>'+
        '<div class="tend-right">'+
          '<div class="tend-section-label menta">Ritmo atual</div>'+
          '<div class="ritmo-value">'+d.ritmoAtual.toFixed(1)+'</div>'+
          '<div class="ritmo-label">vendas/dia</div>'+
        '</div>'+
      '</div>'+
      '<div class="obj-card">'+
        '<div class="obj-title">Objetivo diário</div>'+
        '<div class="obj-main">'+
          '<div class="obj-value">'+(d.diasFaltam>0?d.vendDiaNec.toFixed(1):'—')+'</div>'+
          '<div class="obj-unit">vendas/dia<br><span style="color:#5a5a9a;font-size:10px">necessárias</span></div>'+
        '</div>'+
        '<div class="obj-label">Faltam <b style="color:'+( d.faltamMeta===0?'#2ecc71':'#DFF44C')+'">'+d.faltamMeta+'</b> vendas · '+d.diasFaltam+' dias úteis</div>'+
        alertaHtml+
      '</div>'+
    '</div>'+

    // Tabela corretores
    '<div class="sec-title">Corretores internos</div>'+
    '<div class="card" style="overflow-x:auto;margin-bottom:16px">'+
      '<table class="int-table">'+
        '<thead><tr><th>#</th><th>Corretor</th><th class="tr">Vendas</th><th class="tr">Tendência</th><th class="tr">Meta</th><th class="tr">Faltam</th><th class="tr">Faturamento</th><th class="tr">Ticket médio</th></tr></thead>'+
        '<tbody>'+tab1Rows+'</tbody>'+
      '</table>'+
    '</div>'+

    // Tabela corretor x uso
    '<div class="sec-title">Vendas por categoria</div>'+
    '<div class="card" style="overflow-x:auto;margin-bottom:16px">'+
      '<table class="int-table">'+
        '<thead><tr><th>Corretor</th>'+usoHeaders+'</tr></thead>'+
        '<tbody>'+usoRows+'</tbody>'+
      '</table>'+
    '</div>'+

    // Tabela tipo negociação
    '<div class="sec-title">Por tipo de negociação</div>'+
    '<div class="card" style="overflow-x:auto">'+
      '<table class="int-table">'+
        '<thead><tr><th>Tipo de negociação</th><th class="tr">Vendas</th><th class="tr">Faturamento</th><th class="tr">Ticket médio</th><th class="tr">% do total</th></tr></thead>'+
        '<tbody>'+tipoRows+'</tbody>'+
      '</table>'+
    '</div>';

  if(graficoVeloci){graficoVeloci.destroy();graficoVeloci=null;}
  const ctx2=document.getElementById('graficoVeloci');
  if(ctx2){
    graficoVeloci=new Chart(ctx2,{type:'doughnut',data:{datasets:[
      {data:[Math.min(pct,100),Math.max(0,100-pct)],backgroundColor:['#5353E9','#1a1a3e'],borderWidth:0,circumference:180,rotation:270},
      {data:[Math.min(pctProj,100),Math.max(0,100-pctProj)],backgroundColor:['rgba(83,83,233,0.2)','transparent'],borderWidth:0,circumference:180,rotation:270},
    ]},options:{responsive:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{enabled:false}}}});
  }
}

// ============================================================
// CONTROLE
// ============================================================
function setView(v){viewAtual=v;document.getElementById('btn-externo').classList.toggle('active',v==='externo');document.getElementById('btn-interno').classList.toggle('active',v==='interno');atualizar();}
function trocarMes(v){mesAtual=v;atualizar();}
function popularSelectMes(){const sel=document.getElementById('mes-select');sel.innerHTML='';MESES.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;if(m===mesAtual)o.selected=true;sel.appendChild(o);});}
async function atualizar(){
  try{
    document.getElementById('ts').textContent='Atualizando...';
    const linhas=await buscarDados(mesAtual);
    if(viewAtual==='externo')renderExterno(processarExterno(linhas));
    else renderInterno(processarInterno(linhas,mesAtual));
    document.getElementById('ts').textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR');
  }catch(e){
    document.getElementById('root').innerHTML='<div class="state-msg err"><div class="ico">❌</div>'+e.message+'<br><br><small>Verifique se a aba existe e a planilha está pública.</small></div>';
    document.getElementById('ts').textContent='Erro';
  }
}
(function init(){mesAtual=encontrarMes(nomeMesAtual());popularSelectMes();atualizar();setInterval(atualizar,60000);})();
</script>
