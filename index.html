<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allsafe — Painel de Vendas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --roxo:#5353E9;--rosa:#F7B2F5;--azul:#93ADFC;
  --dark:#210B4E;--limao:#DFF44C;--menta:#AFF9E4;
  --bg:#F4F4F4;--white:#FFFFFF;--borda:#E4E4E4;--sub:#7B7B9A;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
.header{background:linear-gradient(180deg,var(--dark) 0%,#1a0940 100%);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;gap:14px;border-bottom:1px solid rgba(83,83,233,.15)}
.header-left{display:flex;align-items:center;gap:12px}
.logo-img{height:32px;width:32px;border-radius:9px;object-fit:cover;box-shadow:0 2px 8px rgba(83,83,233,.35);flex-shrink:0}
.header-div{width:1px;height:22px;background:rgba(255,255,255,.1);flex-shrink:0}
.header h1{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.01em}
.header-right{display:flex;align-items:center;gap:10px}
.live{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--menta)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--menta);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ts{font-size:11px;color:#7B8FA8}
.btn-sm{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:rgba(255,255,255,.45);font-size:11px;padding:5px 10px;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-sm:hover{background:rgba(255,255,255,.12);color:#fff}
select.mes-sel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:var(--azul);font-size:11px;padding:5px 8px;cursor:pointer;font-family:inherit}
.tog{display:flex;background:rgba(255,255,255,.08);border-radius:9px;padding:2px;gap:1px}
.tog-btn{padding:5px 16px;border-radius:7px;border:none;font-size:11.5px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .25s;color:rgba(255,255,255,.45);background:transparent}
.tog-btn.on{background:rgba(255,255,255,.95);color:var(--dark);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.18)}
.page{max-width:1320px;margin:0 auto;padding:1.25rem 1.5rem 3rem}
.krow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem}
.kpi{border-radius:14px;padding:1.25rem 1.5rem;position:relative;overflow:hidden;transition:transform .2s}
.kpi:hover{transform:translateY(-2px)}
.kd{background:var(--dark)}.kr{background:var(--roxo)}.km{background:var(--menta)}
.klbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.kd .klbl{color:var(--azul)}.kr .klbl{color:var(--rosa)}.km .klbl{color:#0A6B54}
.kval{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}
.kd .kval{color:var(--limao)}.kr .kval{color:#fff;font-size:20px}.km .kval{color:var(--dark);font-size:20px}
.ksub{font-size:11px}
.kd .ksub{color:#5a5a9a}.kr .ksub{color:rgba(255,255,255,.6)}.km .ksub{color:#0A6B54;opacity:.7}
.kdeco{position:absolute;right:-8px;bottom:-8px;font-size:64px;opacity:.07;line-height:1;pointer-events:none}
.khoje{font-size:12px;margin-top:6px;color:var(--menta);font-weight:600}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.gmain{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:var(--white);border-radius:14px;border:1px solid var(--borda);padding:1.25rem;transition:box-shadow .25s}
.card:hover{box-shadow:0 4px 20px rgba(33,11,78,.06)}
.ctit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ctit::before{content:'';display:inline-block;width:3px;height:12px;background:var(--roxo);border-radius:2px}
.eqi{display:flex;align-items:center;padding:10px 14px;border-radius:12px;gap:10px}
.eqdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.eqnom{font-size:13px;font-weight:600;flex:1}
.eqv{font-size:18px;font-weight:800}
.eqval{font-size:10px;font-weight:500;opacity:.7;text-align:right}
.cwrap{position:relative;width:100%}
.agpill{background:rgba(83,83,233,.2);border:1px solid rgba(83,83,233,.4);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--azul);display:flex;gap:5px;align-items:center}
.agpill b{font-weight:700;color:#fff}
.rt{width:100%;border-collapse:collapse;font-size:12px}
.rt th{text-align:left;padding:5px 8px;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--sub);text-transform:uppercase;border-bottom:2px solid var(--borda);white-space:nowrap}
.rt td{padding:7px 8px;border-bottom:1px solid #F0F0F0;vertical-align:middle}
.rt tr:last-child td{border-bottom:none}
.rt tbody tr:hover td{background:#FAFAFF}
.pos{font-size:11px;font-weight:700;color:var(--sub);min-width:20px;display:inline-block}
.p1{color:#C8900A;font-size:14px}.p2{color:#888;font-size:14px}.p3{color:#8B5E3C;font-size:14px}
.bdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.tr{text-align:right}.fw{font-weight:700}
.lg{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.lgi{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--sub)}
.lgsq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.dest{background:linear-gradient(135deg,#3535C0,var(--roxo));border-radius:14px;padding:1.25rem;color:#fff}
.destlbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rosa);margin-bottom:8px}
.destnom{font-size:22px;font-weight:800;margin-bottom:10px}
.destst{display:flex;gap:16px;flex-wrap:wrap}
.destsl{font-size:10px;color:rgba(255,255,255,.6);margin-bottom:2px}
.destsv{font-size:15px;font-weight:700;color:#fff}
.velcard{background:var(--dark);border-radius:14px;padding:1.25rem;display:flex;flex-direction:column;align-items:center}
.veltit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--azul);margin-bottom:8px;align-self:flex-start}
.velinfo{text-align:center;margin-top:4px}
.velat{font-size:26px;font-weight:800;color:var(--limao)}
.velm{font-size:11px;color:#5a5a9a}
.velp{font-size:12px;color:var(--menta);margin-top:3px;font-weight:600}
.tendcard{background:var(--dark);border-radius:14px;padding:1.25rem;display:flex;gap:0}
.tendl{flex:1;border-right:1px solid rgba(255,255,255,.08);padding-right:16px;margin-right:16px}
.tendr{display:flex;flex-direction:column;justify-content:center;min-width:110px}
.tslbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.tslbl.az{color:var(--azul)}.tslbl.mn{color:var(--menta)}
.tsbig{font-size:28px;font-weight:800;color:var(--limao);line-height:1;margin-bottom:3px}
.tssub{font-size:11px;color:#5a5a9a;margin-bottom:8px}
.tsdet{font-size:11px;color:#7B8FA8;line-height:1.8}
.rval{font-size:24px;font-weight:800;color:var(--menta);line-height:1;margin-bottom:2px}
.rlbl{font-size:10px;color:#5a5a9a}
.objcard{background:#0d0d2e;border:1px solid rgba(83,83,233,.25);border-radius:14px;padding:1.25rem}
.objtit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rosa);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.objtit::before{content:'🎯';font-size:12px}
.objmain{display:flex;align-items:flex-end;gap:8px;margin-bottom:4px}
.objval{font-size:40px;font-weight:800;color:var(--limao);line-height:1}
.objunit{font-size:12px;color:#5a5a9a;margin-bottom:6px}
.objlbl{font-size:11px;color:#7B8FA8;margin-bottom:10px}
.objalr{border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;line-height:1.5}
.objalr.verm{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);color:#E74C3C}
.objalr.verd{background:rgba(10,107,84,.15);border:1px solid rgba(10,107,84,.3);color:#2ecc71}
.objdiff{font-size:14px;font-weight:800;display:block;margin-bottom:2px}
.sectit{font-size:13px;font-weight:700;color:var(--dark);margin:20px 0 8px;display:flex;align-items:center;gap:8px}
.sectit::before{content:'';display:inline-block;width:4px;height:16px;background:var(--roxo);border-radius:2px}
.it{width:100%;border-collapse:collapse;font-size:12px}
.it th{text-align:left;padding:6px 10px;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--sub);text-transform:uppercase;border-bottom:2px solid var(--borda);white-space:nowrap;background:#fff}
.it td{padding:7px 10px;border-bottom:1px solid #F0F0F0;vertical-align:middle;text-align:center}
.it td:first-child{text-align:left}
.it tr:last-child td{border-bottom:none}
.it tbody tr:hover td{background:#FAFAFF}
.it tfoot td{border-top:2px solid var(--borda);font-weight:700;background:#F8F8FC;padding:7px 10px}
.smsg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;color:var(--sub);gap:12px;font-size:14px;text-align:center}
.smsg .ico{font-size:32px}
.err{color:#C0392B}
.eq-hoje-badge{font-size:9px;font-weight:700;background:rgba(255,255,255,.2);border-radius:10px;padding:1px 6px;margin-left:6px}
.kpi-comp{font-size:10px;margin-top:3px;font-weight:600}
.kpi-comp.up{color:#2ecc71}.kpi-comp.dn{color:#e74c3c}.kpi-comp.eq{color:#7B8FA8}
.grafico-diario-wrap{height:150px;position:relative;width:100%}
.expand-card{background:var(--white);border-radius:14px;border:1px solid var(--borda);overflow:hidden;margin-bottom:12px}
.expand-card .ec-head{padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .15s;border-radius:14px}
.expand-card .ec-head:hover{background:#F8F8FC}
.ec-tit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);display:flex;align-items:center;gap:6px}
.ec-tit::before{content:'';display:inline-block;width:3px;height:12px;background:var(--roxo);border-radius:2px}
.ec-arr{font-size:12px;color:var(--sub);transition:transform .3s;display:inline-block}
.expand-card.open .ec-arr{transform:rotate(180deg)}
.ec-body{max-height:0;overflow:hidden;padding:0 1.25rem;opacity:0;transition:max-height .4s cubic-bezier(.4,0,.2,1),padding .3s ease,opacity .25s ease}
.expand-card.open .ec-body{max-height:4000px;padding:0 1.25rem 1.25rem;opacity:1}
.filtro-cor-bar{display:inline-flex;gap:0;margin-bottom:16px;align-items:center;background:rgba(120,120,130,.12);border-radius:11px;padding:3px;flex-wrap:wrap}
.filtro-cor-btn{padding:5px 14px;border-radius:8px;border:none;background:transparent;color:rgba(33,11,78,.4);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .25s;white-space:nowrap}
.filtro-cor-btn:hover{color:rgba(33,11,78,.8)}
.filtro-cor-btn.on{background:var(--roxo);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(83,83,233,.3)}
.btn-salvar-rodape{display:flex;align-items:center;justify-content:center;gap:8px;margin:28px auto 0;padding:12px 28px;background:var(--dark);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#7B8FA8;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-salvar-rodape:hover{background:#2a2a5e;color:#fff}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.krow,.g2,.gmain,.card,.expand-card,.tendcard,.velcard,.objcard,.dest{animation:fadeUp .4s ease both}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(83,83,233,.18);border-radius:3px}
@media(max-width:900px){.gmain,.g2{grid-template-columns:1fr}.krow{grid-template-columns:1fr 1fr}.tendcard{flex-direction:column}.tendl{border-right:none;padding-right:0;margin-right:0;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:12px;margin-bottom:12px}}
@media(max-width:500px){.krow{grid-template-columns:1fr}.page{padding:.75rem}}
@media(max-width:768px){.header{flex-wrap:wrap;height:auto;padding:.5rem 1rem;gap:8px}.kval{font-size:24px!important}.card,.tendcard,.objcard,.velcard,.dest{padding:1rem}.rt td,.rt th,.it td,.it th{padding:5px 6px;font-size:11px}}
</style>
</head>

  return fetch(url, { signal: ctrl.signal }).finally(function(){ clearTimeout(timer); });

// ============================================================
// CSV PARSER
// ============================================================
function parseCSVLine(line){
  var cols=[],inQ=false,cur='';
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch==='"'){if(inQ&&i+1<line.length&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
    else cur+=ch;
  }
  cols.push(cur.trim());
  return cols;
}

// ============================================================
// MELHORIA 3 — findCol() mais seguro: removido match bidirecional
// Agora verifica APENAS se o header da planilha contém o termo procurado
// ============================================================
function findCol(idx){
  for(var i=1;i<arguments.length;i++){
    var k=n(arguments[i]);
    if(idx[k]!==undefined)return idx[k];
  }
  var keys=Object.keys(idx);
  for(var i=1;i<arguments.length;i++){
    var k=n(arguments[i]);
    for(var j=0;j<keys.length;j++){
      if(keys[j].includes(k)){return idx[keys[j]];}
    }
  }
  return -1;
}

function parseCSV(txt){
  var linhas=txt.split('\n');
  if(linhas.length<2)return[];
  var cols=parseCSVLine(linhas[0]);
  var idx={};
  cols.forEach(function(c,i){idx[n(c)]=i;});

  var fc=function(){
    var args=Array.prototype.slice.call(arguments);
    var fallback=typeof args[args.length-1]==='number'?args.pop():-1;
    var result=findCol.apply(null,[idx].concat(args));
    return result>=0?result:fallback;
  };

  var COL={
    status:fc('Status Contrato','status contrato','status',0),
    equipe:fc('Equipe de Venda','equipe de venda','equipe',4),
    consultor:fc('Consultor','consultor','vendedor',5),
    valor:fc('Valor Adesão','valor adesao','valor adesão','valor',6),
    estado:fc('Estado','estado','uf',11),
    veiculo:fc('Tipo veículo','tipo veiculo','tipo de veiculo',15),
    uso:fc('Tipo de Uso','tipo de uso',16),
    tipoNeg:fc('Tipo de negociação','tipo de negociacao','Como conheceu','como conheceu',17),
    data:fc('Data Finalização Vistoria','data finalizacao vistoria','data finalização vistoria','data',2),
  };

  var rows=[];
  for(var li=1;li<linhas.length;li++){
    if(!linhas[li].trim())continue;
    var c=parseCSVLine(linhas[li]);
    if(c.length<3)continue;
    var status=(c[COL.status]||'').trim();
    if(!status)continue;
    rows.push({
      status:status,
      equipe:(c[COL.equipe]||'').trim(),
      consultor:(c[COL.consultor]||'').trim(),
      valor:pv(c[COL.valor]),
      estado:(c[COL.estado]||'').trim().toUpperCase(),
      veiculo:COL.veiculo>=0&&COL.veiculo<c.length?(c[COL.veiculo]||'').trim().toUpperCase():'',
      uso:COL.uso>=0&&COL.uso<c.length?(c[COL.uso]||'').trim():'',
      tipoNeg:COL.tipoNeg>=0&&COL.tipoNeg<c.length?((c[COL.tipoNeg]||'').trim()||'Não informado'):'Não informado',
      data:(c[COL.data]||'').trim(),
      raw:c
    });
  }
  return rows;
}

}

function kpiComp(atual,anterior){
  if(!anterior)return '';
  var pct=Math.round(((atual-anterior)/anterior)*100);
  var cls=pct>0?'up':pct<0?'dn':'eq';
  var seta=pct>0?'▲':pct<0?'▼':'—';
  return '<div class="kpi-comp '+cls+'">'+seta+' '+Math.abs(pct)+'% vs mês ant.</div>';
}

function findMetaMes(aba,meses){
  var nAba=n(aba);
  for(var i=0;i<meses.length;i++){
    if(n(meses[i])===nAba)return i;
    var nM=n(meses[i]);
    if(nAba.split('/')[0]===nM.split('/')[0]&&nAba.split('/')[1]===nM.split('/')[1])return i;
  }
  return null;
}

async function fetchMetas(){
  try{
    var urlInt='https://docs.google.com/spreadsheets/d/'+SHEET_META+'/export?format=csv&gid=0';
    var rInt=await fetchComTimeout(urlInt, 15000);
    if(rInt.ok){
      var txtInt=await rInt.text();
      var linhasInt=txtInt.split('\n').filter(function(l){return l.trim();});
      if(linhasInt.length>=2){
        var headerInt=parseCSVLine(linhasInt[0]);
        var mesesInt=headerInt.slice(1).filter(function(m){return m.trim();});
        var corretores={};
        var totais=[];
        var metaTotalRow=null;
        for(var i=1;i<linhasInt.length;i++){
          var cols=parseCSVLine(linhasInt[i]);
          var nome=(cols[0]||'').trim();
          if(!nome)continue;
          var nNome=n(nome);
          if(nNome.includes('meta total')||nNome.includes('metal total')){
            metaTotalRow=cols;
            continue;
          }
          var metasPorMes=[];
          for(var j=1;j<cols.length;j++){
            metasPorMes.push(parseInt(cols[j])||0);
          }
          corretores[nome]=metasPorMes;
        }
        if(metaTotalRow){
          for(var j=1;j<metaTotalRow.length;j++){
            totais.push(parseInt(metaTotalRow[j])||0);
          }
        }else{
          for(var mi=0;mi<mesesInt.length;mi++){
            var soma=0;
            for(var cn in corretores){if(corretores.hasOwnProperty(cn))soma+=(corretores[cn][mi]||0);}
            totais.push(soma);
          }
        }
        METAS_INT_DATA={meses:mesesInt,corretores:corretores,totais:totais};
        var mesIdx=findMetaMes(MES,mesesInt);
        if(mesIdx!==null){
          META_CORRETOR={};
          for(var cn in corretores){
            if(corretores.hasOwnProperty(cn)){
              META_CORRETOR[cn]=corretores[cn][mesIdx]||0;
            }
          }
        }
      }
    }
    var urlExt='https://docs.google.com/spreadsheets/d/'+SHEET_META+'/export?format=csv&gid=228088346';
    var rExt=await fetchComTimeout(urlExt, 15000);
    if(rExt.ok){
      var txtExt=await rExt.text();
      var linhasExt=txtExt.split('\n').filter(function(l){return l.trim();});
      if(linhasExt.length>=2){
        var headerExt=parseCSVLine(linhasExt[0]);
        var mesesExt=headerExt.slice(1).filter(function(m){return m.trim();});
        var equipes={};
        var totaisExt=[];
        var metaTotalRowExt=null;
        for(var i=1;i<linhasExt.length;i++){
          var cols=parseCSVLine(linhasExt[i]);
          var nome=(cols[0]||'').trim();
          if(!nome)continue;
          var nNome=n(nome);
          if(nNome.includes('meta total')||nNome.includes('metal total')){
            metaTotalRowExt=cols;continue;
          }
          var metasPorMes=[];
          for(var j=1;j<cols.length;j++){metasPorMes.push(parseInt(cols[j])||0);}
          equipes[nome]=metasPorMes;
        }
        if(metaTotalRowExt){
          for(var j=1;j<metaTotalRowExt.length;j++){totaisExt.push(parseInt(metaTotalRowExt[j])||0);}
        }else{
          for(var mi=0;mi<mesesExt.length;mi++){var soma=0;for(var en in equipes){if(equipes.hasOwnProperty(en))soma+=(equipes[en][mi]||0);}totaisExt.push(soma);}
        }
        METAS_EXT_DATA={meses:mesesExt,equipes:equipes,totais:totaisExt};
      }
    }
    dadosMetas={interno:METAS_INT_DATA,externo:METAS_EXT_DATA};
  }catch(e){
    console.warn('fetchMetas erro:',e);
    dadosMetas=null;
  }
}

function getMetaCorretor(nome){
  if(META_CORRETOR[nome])return META_CORRETOR[nome];
  var nNome=n(nome);
  for(var k in META_CORRETOR){
    if(META_CORRETOR.hasOwnProperty(k)&&n(k)===nNome)return META_CORRETOR[k];
  }
  return 0;
}

function getMetaEquipe(nomeEquipe){
  if(!METAS_EXT_DATA||!METAS_EXT_DATA.meses)return 0;
  var mesIdx=findMetaMes(MES,METAS_EXT_DATA.meses);
  if(mesIdx===null)return 0;
  var nNome=n(nomeEquipe);
  for(var k in METAS_EXT_DATA.equipes){
    if(METAS_EXT_DATA.equipes.hasOwnProperty(k)&&n(k)===nNome){
      return METAS_EXT_DATA.equipes[k][mesIdx]||0;
    }
  }
  for(var k in METAS_EXT_DATA.equipes){
    if(METAS_EXT_DATA.equipes.hasOwnProperty(k)){
      var nK=n(k);
      if(nK.includes(nNome)||nNome.includes(nK))return METAS_EXT_DATA.equipes[k][mesIdx]||0;
    }
  }
  return 0;
}

function calcDias(aba){
  var hoje=new Date();var partes=aba.split('/');
  var mN=['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  var mIdx=mN.indexOf(n(partes[0]));var ano=parseInt(partes[1])||hoje.getFullYear();
  if(mIdx<0)return{dPass:0,dFalt:0,mesEncerrado:false};
  var eMes=(hoje.getMonth()===mIdx&&hoje.getFullYear()===ano);
  var todos=diasUtil(ano,mIdx);var dPass=0,dFalt=0;
  if(eMes){dPass=todos.filter(function(d){return d<=hoje;}).length;dFalt=todos.filter(function(d){return d>hoje;}).length;}
  else if(hoje>new Date(ano,mIdx+1,0)){dPass=todos.length;}
  else{dFalt=todos.length;}
  return{dPass:dPass,dFalt:dFalt,mesEncerrado:dFalt===0&&dPass>0};
}

function procExt(rows,aba){
  var hoje=new Date();var hojeStr=hojeLocal();
  var v=rows.filter(function(r){return STATUS_OK.includes(n(r.status))&&!ehInt(r.equipe);});
  var vFilt=filtroExt?v.filter(function(r){return detExt(r.equipe)===filtroExt;}):v;
  var tot=0,totV=0,vendHoje=0;
  var vendHojeEq={Joao:0,Bernardo:0,Renata:0,Agger:0};
  var porDia={},porDiaEq={};
  var porEq={Joao:{v:0,val:0},Bernardo:{v:0,val:0},Renata:{v:0,val:0},Agger:{v:0,val:0}};
  var porEst={},porEstEq={},porCon={};
  vFilt.forEach(function(r){
    var eqK=detExt(r.equipe),con=r.consultor;
    var dStr='';var dia=r.data?r.data.slice(0,5):null;
    if(r.data){var pts=r.data.split('/');if(pts.length===3)dStr=pts[2]+'-'+pts[1].padStart(2,'0')+'-'+pts[0].padStart(2,'0');}
    if(dStr===hojeStr){vendHoje++;if(eqK&&vendHojeEq[eqK]!==undefined)vendHojeEq[eqK]++;}
    if(dia){porDia[dia]=(porDia[dia]||0)+1;if(eqK){if(!porDiaEq[eqK])porDiaEq[eqK]={};porDiaEq[eqK][dia]=(porDiaEq[eqK][dia]||0)+1;}}
    tot++;totV+=r.valor;
    if(eqK&&porEq[eqK]){porEq[eqK].v++;porEq[eqK].val+=r.valor;}
    if(r.estado){porEst[r.estado]=(porEst[r.estado]||0)+1;if(eqK){if(!porEstEq[r.estado])porEstEq[r.estado]={};porEstEq[r.estado][eqK]=(porEstEq[r.estado][eqK]||0)+1;}}
    if(eqK&&con){if(!porCon[con])porCon[con]={v:0,val:0,eq:eqK};porCon[con].v++;porCon[con].val+=r.valor;}
  });
  var agEst=Object.entries(porEstEq).map(function(e){return[e[0],(e[1]['Agger']||0)];}).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];});
  var dias=calcDias(aba);var metaExt=getMetaExt(aba);
  var proj=dias.dPass>0?Math.round((tot/dias.dPass)*(dias.dPass+dias.dFalt)):tot;
  var faltMeta=Math.max(0,metaExt-tot);var ritmo=dias.dPass>0?(tot/dias.dPass):0;var vdNec=dias.dFalt>0?(faltMeta/dias.dFalt):0;
  var rankExt=Object.entries(porCon).sort(function(a,b){return b[1].v-a[1].v;});
  return{tot:tot,totV:totV,ticket:tot?totV/tot:0,porEq:porEq,porEst:porEst,porEstEq:porEstEq,agEst:agEst,rank:rankExt,topConExt:rankExt[0]||null,vendHoje:vendHoje,vendHojeEq:vendHojeEq,porDia:porDia,porDiaEq:porDiaEq,proj:proj,dPass:dias.dPass,dFalt:dias.dFalt,metaExt:metaExt,faltMeta:faltMeta,ritmo:ritmo,vdNec:vdNec,dif:vdNec-ritmo,porCon:porCon,mesEncerrado:dias.mesEncerrado};
}

// PROCESSAR INTERNO
// ============================================================
function procInt(rows,aba){
  var hoje=new Date();var hojeStr=hojeLocal();
  var v=rows.filter(function(r){return STATUS_OK.includes(n(r.status))&&ehInt(r.equipe);});
  var porConAll={};
  v.forEach(function(r){var con=r.consultor||'';if(!con)return;if(!porConAll[con])porConAll[con]={v:0,val:0};porConAll[con].v++;porConAll[con].val+=r.valor;});
  var allRank=Object.entries(porConAll).sort(function(a,b){return b[1].v-a[1].v;});
  var vFilt=filtroInt?v.filter(function(r){return r.consultor===filtroInt;}):v;
  var tot=0,totV=0,vendHoje=0;var porCon={};var porCorCat={};var porCorTipo={};var porDia={};
  vFilt.forEach(function(r){
    var con=r.consultor||'';if(!con)return;
    var dStr='';var dia=r.data?r.data.slice(0,5):null;
    if(r.data){var pts=r.data.split('/');if(pts.length===3)dStr=pts[2]+'-'+pts[1].padStart(2,'0')+'-'+pts[0].padStart(2,'0');}
    if(dStr===hojeStr)vendHoje++;if(dia)porDia[dia]=(porDia[dia]||0)+1;
    tot++;totV+=r.valor;
    if(!porCon[con])porCon[con]={v:0,val:0};porCon[con].v++;porCon[con].val+=r.valor;
    var cat='';if(r.veiculo==='MOTO')cat='Moto';else if(n(r.uso).includes('taxi'))cat='Táxi';else if(n(r.uso).includes('aplic')||n(r.uso).includes('profiss'))cat='Aplicativo';else cat='Particular';
    if(!porCorCat[con])porCorCat[con]={};porCorCat[con][cat]=(porCorCat[con][cat]||0)+1;
    var tipo=r.tipoNeg||'Não informado';if(!porCorTipo[con])porCorTipo[con]={};porCorTipo[con][tipo]=(porCorTipo[con][tipo]||0)+1;
  });
  var dias=calcDias(aba);var meta=getMetaInt(aba);
  var proj=dias.dPass>0?Math.round((tot/dias.dPass)*(dias.dPass+dias.dFalt)):tot;
  var faltMeta=Math.max(0,meta-tot);var ritmo=dias.dPass>0?(tot/dias.dPass):0;var vdNec=dias.dFalt>0?(faltMeta/dias.dFalt):0;
  var rank=Object.entries(porCon).sort(function(a,b){return b[1].v-a[1].v;});
  rank.forEach(function(entry){var inf=entry[1];inf.tend=dias.dPass>0?Math.round((inf.v/dias.dPass)*(dias.dPass+dias.dFalt)):inf.v;inf.metaI=getMetaCorretor(entry[0]);inf.faltI=inf.metaI>0?Math.max(0,inf.metaI-inf.v):null;});
  var tiposSet=new Set();vFilt.forEach(function(r){tiposSet.add(r.tipoNeg||'Não informado');});
  var todosNaoInfo=[...tiposSet].every(function(t){return t==='Não informado';});
  var tipos=todosNaoInfo?[]:([...tiposSet].filter(function(t){return t&&t!=='Não informado';}).sort());
  if(!todosNaoInfo&&tiposSet.has('Não informado'))tipos.push('Não informado');
  var catsSet=new Set();Object.values(porCorCat).forEach(function(o){Object.keys(o).forEach(function(c){catsSet.add(c);});});
  var cats=['Táxi','Aplicativo','Particular','Moto'].filter(function(c){return catsSet.has(c);});
  return{tot:tot,totV:totV,ticket:tot?totV/tot:0,vendHoje:vendHoje,porDia:porDia,porCon:porCon,rank:rank,allRank:allRank,topCon:Object.entries(porCon).sort(function(a,b){return b[1].v-a[1].v;})[0],proj:proj,dPass:dias.dPass,dFalt:dias.dFalt,meta:meta,faltMeta:faltMeta,ritmo:ritmo,vdNec:vdNec,dif:vdNec-ritmo,porCorCat:porCorCat,porCorTipo:porCorTipo,tipos:tipos,cats:cats,mesEncerrado:dias.mesEncerrado};
}

// ============================================================
// PROCESSAR TOTAL
// ============================================================
function procTotal(rows,aba){
  var hoje=new Date();var hojeStr=hojeLocal();
  var v=rows.filter(function(r){return STATUS_OK.includes(n(r.status));});
  var tot=0,totV=0,vendHoje=0;var porDia={};var porCat={};var porTipo={};
  var extV=0,extVal=0,intV=0,intVal=0;
  v.forEach(function(r){
    var dStr='';var dia=r.data?r.data.slice(0,5):null;
    if(r.data){var pts=r.data.split('/');if(pts.length===3)dStr=pts[2]+'-'+pts[1].padStart(2,'0')+'-'+pts[0].padStart(2,'0');}
    if(dStr===hojeStr)vendHoje++;if(dia)porDia[dia]=(porDia[dia]||0)+1;
    tot++;totV+=r.valor;
    if(ehInt(r.equipe)){intV++;intVal+=r.valor;}else{extV++;extVal+=r.valor;}
    var cat='';if(r.veiculo==='MOTO')cat='Moto';else if(n(r.uso).includes('taxi'))cat='Táxi';else if(n(r.uso).includes('aplic')||n(r.uso).includes('profiss'))cat='Aplicativo';else cat='Particular';
    porCat[cat]=(porCat[cat]||0)+1;
    porTipo[r.tipoNeg||'Não informado']=(porTipo[r.tipoNeg||'Não informado']||0)+1;
  });
  var dias=calcDias(aba);var metaTotal=getMetaInt(aba)+getMetaExt(aba);
  var proj=dias.dPass>0?Math.round((tot/dias.dPass)*(dias.dPass+dias.dFalt)):tot;
  var faltMeta=Math.max(0,metaTotal-tot);var ritmo=dias.dPass>0?(tot/dias.dPass):0;var vdNec=dias.dFalt>0?(faltMeta/dias.dFalt):0;
  var tiposArr=Object.keys(porTipo).filter(function(t){return t!=='Não informado';}).sort();
  if(porTipo['Não informado'])tiposArr.push('Não informado');
  var todosNaoInfo=tiposArr.length===1&&tiposArr[0]==='Não informado';
  var cats=['Táxi','Aplicativo','Particular','Moto'].filter(function(c){return porCat[c];});
  return{tot:tot,totV:totV,ticket:tot?totV/tot:0,vendHoje:vendHoje,porDia:porDia,proj:proj,dPass:dias.dPass,dFalt:dias.dFalt,metaTotal:metaTotal,faltMeta:faltMeta,ritmo:ritmo,vdNec:vdNec,dif:vdNec-ritmo,extV:extV,extVal:extVal,intV:intV,intVal:intVal,porCat:porCat,cats:cats,porTipo:porTipo,tipos:todosNaoInfo?[]:tiposArr,mesEncerrado:dias.mesEncerrado};
}

    corBtns+
    '<div class="krow"><div class="kpi kd"><div class="klbl">Total de vendas</div><div class="kval">'+fN(d.tot)+'</div>'+(d.vendHoje>0?'<div class="khoje">+'+d.vendHoje+' hoje</div>':'<div class="khoje" style="color:#5a5a9a">0 hoje</div>')+'<div class="kdeco">📋</div></div><div class="kpi kr"><div class="klbl">Faturamento adesão</div><div class="kval">'+fR(d.totV)+'</div><div class="ksub">Valor de adesão</div><div class="kdeco">💰</div></div><div class="kpi km"><div class="klbl">Ticket médio adesão</div><div class="kval">'+fR(d.ticket)+'</div><div class="ksub">Por contrato</div><div class="kdeco">📈</div></div></div>'+
    '<div class="g2" style="margin-bottom:12px"><div class="dest" style="min-height:0"><div class="destlbl">🏆 Destaque do mês</div><div class="destnom" style="font-size:16px;margin-bottom:6px">'+topN+'</div><div class="destst"><div><div class="destsl">Vendas</div><div class="destsv">'+topI.v+'</div></div><div><div class="destsl">Faturamento</div><div class="destsv" style="font-size:13px">'+fR(topI.val)+'</div></div><div><div class="destsl">Ticket médio</div><div class="destsv" style="font-size:13px">'+(topI.v>0?fR(topI.val/topI.v):'—')+'</div></div></div></div><div class="velcard" style="min-height:0"><div class="veltit">Meta mensal</div><canvas id="gcVel" width="260" height="120"></canvas><div class="velinfo"><div class="velat">'+fN(d.tot)+' <span style="font-size:13px;color:#5a5a9a">/ '+d.meta+'</span></div><div class="velm">'+pct+'% atingido</div><div class="velp">Projeção: '+fN(d.proj)+'</div><div style="font-size:12px;color:#fff;margin-top:4px;font-weight:700;background:rgba(255,255,255,.12);border-radius:6px;padding:3px 10px;display:inline-block">Meta: '+fN(d.meta)+'</div></div></div></div>'+
    '<div class="g2">'+buildTendencia(d)+buildObjetivo(d,d.meta,pct,alr)+'</div>'+
    '<div class="card" style="margin-bottom:12px"><div class="ctit">Evolução diária — '+MES+'</div><div class="grafico-diario-wrap"><canvas id="gcDiarioInt"></canvas></div></div>'+
    expandCard('Corretores internos','<div style="overflow-x:auto"><table class="it"><thead><tr><th>#</th><th>Corretor</th><th class="tr">Vendas</th><th class="tr">Tendência</th><th class="tr">Meta</th><th class="tr">Faltam</th><th class="tr">Faturamento</th><th class="tr">Ticket médio</th></tr></thead><tbody>'+t1R+'</tbody></table></div>','cor-int',true)+
    expandCard('Vendas por categoria','<div style="overflow-x:auto"><table class="it"><thead><tr><th>Corretor</th>'+uHd+'<th class="tr">Total</th></tr></thead><tbody>'+uRows+'</tbody><tfoot><tr><td class="fw">Total</td>'+uFoot+'<td class="tr fw" style="color:#5353E9">'+d.tot+'</td></tr></tfoot></table></div>','cat',false)+
    expandCard('Origem de venda',(d.tipos.length===0?'<div style="padding:1rem;color:var(--sub);font-size:13px">⚠️ Coluna de origem não encontrada.</div>':'<div style="overflow-x:auto"><table class="it"><thead><tr><th>Corretor</th>'+tpHd+'<th style="text-align:center;color:#5353E9">Total</th></tr></thead><tbody>'+tpRows+'</tbody><tfoot><tr><td class="fw">Total</td>'+tpFoot+'<td class="fw" style="color:#5353E9">'+tpFootTot+'</td></tr></tfoot></table></div>'),'origem',false)+
    '<button class="btn-salvar-rodape" onclick="exportarDashboard()">⬇ Salvar espelho do dia</button>';

  rendGraficoDiario('gcDiarioInt',d.porDia,'#5353E9','GDI');
  rendVelocimetro('gcVel',pct,pctP,'GV');
}

// ============================================================
// RENDER TOTAL
// ============================================================
function rendTotal(d){
  destroyAllCharts();
  var pct=d.metaTotal>0?Math.min(100,Math.round((d.tot/d.metaTotal)*100)):0;
  var pctP=d.metaTotal>0?Math.min(100,Math.round((d.proj/d.metaTotal)*100)):0;
  var alr='';
  if(d.faltMeta===0)alr='<div class="objalr verd"><span class="objdiff">✅ Meta atingida!</span>Parabéns!</div>';
  else if(d.dif>0)alr='<div class="objalr verm"><span class="objdiff">⚡ +'+d.dif.toFixed(1)+' vendas/dia</span>Precisa acelerar ('+d.ritmo.toFixed(1)+'/dia)</div>';
  else alr='<div class="objalr verd"><span class="objdiff">✅ No caminho certo</span>Ritmo suficiente.</div>';
  var compTot='',compVal='',compTick='';
  if(mesAntData){var aT=(mesAntData.ext.tot||0)+(mesAntData.int.tot||0);var aV=(mesAntData.ext.totV||0)+(mesAntData.int.totV||0);compTot=kpiComp(d.tot,aT);compVal=kpiComp(d.totV,aV);if(d.tot&&aT)compTick=kpiComp(d.totV/d.tot,aV/aT);}
  var destNm=d.extV>=d.intV?'Comercial Externo':'Comercial Interno';var destV=Math.max(d.extV,d.intV);var destVal=d.extV>=d.intV?d.extVal:d.intVal;
  var tpHd=d.tipos.map(function(t){return '<th style="text-align:center">'+t+'</th>';}).join('');
  var tpCells=d.tipos.map(function(t){return '<td style="text-align:center;font-weight:700">'+(d.porTipo[t]||0)+'</td>';}).join('');
  var tpTotal=d.tipos.reduce(function(s,t){return s+(d.porTipo[t]||0);},0);
  var catHd=d.cats.map(function(c){return '<th style="text-align:center">'+c+'</th>';}).join('');
  var catCells=d.cats.map(function(c){return '<td style="text-align:center;font-weight:700">'+(d.porCat[c]||0)+'</td>';}).join('');
  var catTotal=d.cats.reduce(function(s,c){return s+(d.porCat[c]||0);},0);

  document.getElementById('root').innerHTML=
    '<div class="krow"><div class="kpi kd"><div class="klbl">Total de vendas</div><div class="kval">'+fN(d.tot)+'</div>'+(d.vendHoje>0?'<div class="khoje">+'+d.vendHoje+' hoje</div>':'<div class="khoje" style="color:#5a5a9a">0 hoje</div>')+compTot+'<div class="kdeco">📋</div></div><div class="kpi kr"><div class="klbl">Faturamento total</div><div class="kval">'+fR(d.totV)+'</div><div class="ksub">Externo + Interno</div>'+compVal+'<div class="kdeco">💰</div></div><div class="kpi km"><div class="klbl">Ticket médio</div><div class="kval">'+fR(d.ticket)+'</div><div class="ksub">Por contrato</div>'+compTick+'<div class="kdeco">📈</div></div></div>'+
    '<div class="g2" style="margin-bottom:12px"><div class="dest" style="min-height:0"><div class="destlbl">🏆 Comercial em destaque</div><div class="destnom" style="font-size:18px;margin-bottom:8px">'+destNm+'</div><div class="destst"><div><div class="destsl">Vendas</div><div class="destsv">'+destV+'</div></div><div><div class="destsl">Faturamento</div><div class="destsv" style="font-size:13px">'+fR(destVal)+'</div></div></div><div style="margin-top:12px;display:flex;gap:12px;flex-wrap:wrap"><div style="background:rgba(255,255,255,.12);border-radius:8px;padding:8px 14px;flex:1;min-width:120px"><div style="font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Externo</div><div style="font-size:18px;font-weight:800">'+d.extV+'</div><div style="font-size:10px;color:rgba(255,255,255,.5)">'+fR(d.extVal)+'</div></div><div style="background:rgba(255,255,255,.12);border-radius:8px;padding:8px 14px;flex:1;min-width:120px"><div style="font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Interno</div><div style="font-size:18px;font-weight:800">'+d.intV+'</div><div style="font-size:10px;color:rgba(255,255,255,.5)">'+fR(d.intVal)+'</div></div></div></div>'+buildTendencia(d)+'</div>'+
    '<div class="g2" style="margin-bottom:12px"><div class="velcard"><div class="veltit">Meta mensal combinada</div><canvas id="gcVelTotal" width="260" height="150"></canvas><div class="velinfo"><div class="velat">'+fN(d.tot)+' <span style="font-size:15px;color:rgba(255,255,255,.6);font-weight:500">/ '+fN(d.metaTotal)+'</span></div><div class="velm">'+pct+'% atingido</div></div></div>'+buildObjetivo(d,d.metaTotal,pct,alr)+'</div>'+
    '<div class="card" style="margin-bottom:12px"><div class="ctit">Evolução diária — '+MES+'</div><div class="grafico-diario-wrap"><canvas id="gcDiarioTotal"></canvas></div></div>'+
    expandCard('Origem de venda',(d.tipos.length===0?'<div style="padding:1rem;color:var(--sub);font-size:13px">Dados não disponíveis.</div>':'<div style="overflow-x:auto"><table class="it"><thead><tr>'+tpHd+'<th style="text-align:center;color:#5353E9">Total</th></tr></thead><tbody><tr>'+tpCells+'<td style="text-align:center;font-weight:800;color:#5353E9">'+tpTotal+'</td></tr></tbody></table></div>'),'total-origem',true)+
    expandCard('Vendas por categoria','<div style="overflow-x:auto"><table class="it"><thead><tr>'+catHd+'<th style="text-align:center;color:#5353E9">Total</th></tr></thead><tbody><tr>'+catCells+'<td style="text-align:center;font-weight:800;color:#5353E9">'+catTotal+'</td></tr></tbody></table></div>','total-cat',true)+
    '<button class="btn-salvar-rodape" onclick="exportarDashboard()">⬇ Salvar espelho do dia</button>';

  rendGraficoDiario('gcDiarioTotal',d.porDia,'#5353E9','GDT');
  rendVelocimetro('gcVelTotal',pct,pctP,'GVT');
}


// ============================================================
// CONTROLE
// ============================================================
function setView(v){VIEW=v;filtroInt=null;filtroExt=null;document.getElementById('btn-ext').classList.toggle('on',v==='ext');document.getElementById('btn-int').classList.toggle('on',v==='int');document.getElementById('btn-total').classList.toggle('on',v==='total');atualizar();}
function trocarMes(v){MES=v;filtroInt=null;filtroExt=null;mesAntData=null;atualizar();}
function popularSel(){var s=document.getElementById('mes-sel');s.innerHTML='';MESES.forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=m;if(m===MES)o.selected=true;s.appendChild(o);});}

// ============================================================
// MELHORIA 2 — Função para reiniciar o intervalo após pausa por falhas
// ============================================================
function reiniciarIntervalo(){
  _falhasConsecutivas=0;
  if(_intervaloAtualizar)clearInterval(_intervaloAtualizar);
  _intervaloAtualizar=setInterval(atualizar,60000);
  atualizar();
}

async function atualizar(){
  var thisVersion=++_renderVersion;
  try{
    var tsEl=document.getElementById('ts');
    if(tsEl) tsEl.textContent='Atualizando...';
    await fetchMetas().catch(function(){});
    var rows=await fetchRows(MES);
    if(thisVersion!==_renderVersion)return;

    if(VIEW==='ext'){
      var dExt=procExt(rows,MES);
      dadosExt=dExt;
      rendExt(dExt);
      fetchMesAnterior().then(function(ant){if(thisVersion!==_renderVersion)return;mesAntData=ant;rendExt(dExt);}).catch(function(){});
      fetchCadastros().then(function(cad){if(thisVersion!==_renderVersion)return;if(cad)rendPainelCad(cad);}).catch(function(){});
      fetchScriptManual().then(function(data){if(thisVersion!==_renderVersion)return;if(data)rendCorretoresEstado(data);}).catch(function(){});
      fetchBaseCorretor().then(function(data){if(thisVersion!==_renderVersion)return;dadosBase=data;if(data)rendBaseCorretor(data);}).catch(function(){});
      fetchNovosCorretores().then(function(data){if(thisVersion!==_renderVersion)return;if(data)rendNovosCorretores(data);}).catch(function(){});
    } else if(VIEW==='int'){
      rendInt(procInt(rows,MES));
    } else {
      var dTotal=procTotal(rows,MES);
      rendTotal(dTotal);
      fetchMesAnterior().then(function(ant){if(thisVersion!==_renderVersion)return;mesAntData=ant;rendTotal(dTotal);}).catch(function(){});
    }
    if(thisVersion===_renderVersion){
      // MELHORIA 2 — Reset do contador de falhas em caso de sucesso
      _falhasConsecutivas=0;
      var tsEl2=document.getElementById('ts');
      if(tsEl2) tsEl2.textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR');
    }
  }catch(e){
    if(thisVersion===_renderVersion){
      // MELHORIA 2 — Incrementa falhas consecutivas e pausa se >= 5
      _falhasConsecutivas++;
      if(_falhasConsecutivas>=5){
        if(_intervaloAtualizar){clearInterval(_intervaloAtualizar);_intervaloAtualizar=null;}
        destroyAllCharts();
        var rootEl=document.getElementById('root');
        if(rootEl) rootEl.innerHTML='<div class="smsg err"><div class="ico">⚠️</div>Conexão instável. Múltiplas tentativas falharam.<br><br><button class="btn-sm" style="font-size:13px;padding:8px 20px;color:#fff;background:var(--roxo);border:none" onclick="reiniciarIntervalo()">Tentar novamente</button></div>';
        var tsEl3=document.getElementById('ts');
        if(tsEl3) tsEl3.textContent='Pausado — falhas consecutivas';
      }else{
        destroyAllCharts();
        var rootEl=document.getElementById('root');
        if(rootEl) rootEl.innerHTML='<div class="smsg err"><div class="ico">❌</div>'+e.message+'<br><br><small>Verifique se a aba existe e a planilha está pública. (Tentativa '+_falhasConsecutivas+'/5)</small></div>';
        var tsEl3=document.getElementById('ts');
        if(tsEl3) tsEl3.textContent='Erro';
      }
    }
  }
}

(async function(){
  try{MESES=await detectarMeses();}catch(e){MESES=[NOMES_MES[new Date().getMonth()]+'/'+new Date().getFullYear()];}
  MES=achaMes(nomeMes());
  popularSel();
  atualizar();
  // MELHORIA 2 — Guarda o ID do intervalo numa variável global
  _intervaloAtualizar=setInterval(atualizar,60000);
})();

</script>
