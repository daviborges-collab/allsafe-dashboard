<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>Allsafe — Painel Financeiro</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --roxo:#5353E9;--rosa:#F7B2F5;--azul:#93ADFC;
  --dark:#210B4E;--limao:#DFF44C;--menta:#AFF9E4;
  --bg:#F4F4F4;--white:#FFFFFF;--borda:#E4E4E4;--sub:#7B7B9A;
  --vermelho:#E74C3C;--laranja:#F39C12;--verde:#2ecc71;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;-webkit-font-smoothing:antialiased}

.header{background:linear-gradient(180deg,var(--dark) 0%,#1a0940 100%);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid rgba(83,83,233,.15);position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.logo-img{height:32px;width:32px;border-radius:9px;object-fit:cover;box-shadow:0 2px 8px rgba(83,83,233,.35);flex-shrink:0;transition:transform .3s}
.logo-img:hover{transform:scale(1.08)}
.header-div{width:1px;height:22px;background:rgba(255,255,255,.1);flex-shrink:0}
.header h1{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.01em}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.ts{font-size:10px;color:#7B8FA8;white-space:nowrap}
.btn-sm{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:rgba(255,255,255,.45);font-size:11px;padding:5px 10px;cursor:pointer;font-family:inherit;transition:all .25s;white-space:nowrap}
.btn-sm:hover{background:rgba(255,255,255,.14);color:#fff;transform:scale(1.04)}
.btn-sm:active{transform:scale(.96)}
select.mes-sel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:var(--azul);font-size:11px;padding:5px 8px;cursor:pointer;font-family:inherit}
.tog{display:flex;background:rgba(255,255,255,.08);border-radius:9px;padding:2px;gap:1px}
.tog-btn{padding:5px 14px;border-radius:7px;border:none;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .3s;color:rgba(255,255,255,.45);background:transparent;white-space:nowrap}
.tog-btn:hover:not(.on){color:rgba(255,255,255,.7)}
.tog-btn.on{background:rgba(255,255,255,.95);color:var(--dark);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.18)}
.tog-btn:active{transform:scale(.96)}

.page{max-width:1320px;margin:0 auto;padding:1.25rem 1.5rem 3rem}
.krow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem}
.krow4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.25rem}
.kpi{border-radius:16px;padding:1.25rem 1.5rem;position:relative;overflow:hidden;transition:transform .25s,box-shadow .25s}
.kpi:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(33,11,78,.12)}
.kd{background:var(--dark)}.kr{background:var(--roxo)}.km{background:var(--menta)}.kv{background:linear-gradient(135deg,#C0392B,#E74C3C)}.kg{background:linear-gradient(135deg,#0A6B54,#16A085)}
.klbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.kd .klbl{color:var(--azul)}.kr .klbl{color:var(--rosa)}.km .klbl{color:#0A6B54}.kv .klbl{color:#FADBD8}.kg .klbl{color:#AFF9E4}
.kval{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px}
.kd .kval{color:var(--limao)}.kr .kval{color:#fff}.km .kval{color:var(--dark)}.kv .kval{color:#fff}.kg .kval{color:#fff}
.ksub{font-size:11px}
.kd .ksub{color:#5a5a9a}.kr .ksub{color:rgba(255,255,255,.6)}.km .ksub{color:#0A6B54;opacity:.7}.kv .ksub{color:rgba(255,255,255,.7)}.kg .ksub{color:rgba(255,255,255,.7)}
.kdeco{position:absolute;right:-8px;bottom:-8px;font-size:64px;opacity:.07;line-height:1;pointer-events:none}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:var(--white);border-radius:16px;border:1px solid var(--borda);padding:1.25rem;transition:box-shadow .3s,transform .3s}
.card:hover{box-shadow:0 6px 24px rgba(33,11,78,.07);transform:translateY(-1px)}
.ctit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ctit::before{content:'';display:inline-block;width:3px;height:12px;background:var(--roxo);border-radius:2px}
.tendcard{background:var(--dark);border-radius:16px;padding:1.25rem;transition:transform .25s,box-shadow .25s}
.tendcard:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(33,11,78,.2)}
.rt{width:100%;border-collapse:collapse;font-size:12px}
.rt th{text-align:left;padding:6px 8px;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--sub);text-transform:uppercase;border-bottom:2px solid var(--borda);white-space:nowrap}
.rt td{padding:7px 8px;border-bottom:1px solid #F0F0F0;vertical-align:middle;transition:background .15s}
.rt tr:last-child td{border-bottom:none}
.rt tbody tr:hover td{background:#F5F5FF}
.tr{text-align:right}.fw{font-weight:700}

.expand-card{background:var(--white);border-radius:16px;border:1px solid var(--borda);overflow:hidden;margin-bottom:12px;transition:box-shadow .3s}
.expand-card:hover{box-shadow:0 4px 16px rgba(33,11,78,.05)}
.expand-card .ec-head{padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .2s}
.expand-card .ec-head:hover{background:#F8F8FC}
.ec-tit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);display:flex;align-items:center;gap:6px}
.ec-tit::before{content:'';display:inline-block;width:3px;height:12px;background:var(--roxo);border-radius:2px}
.ec-arr{font-size:12px;color:var(--sub);transition:transform .35s;display:inline-block}
.expand-card.open .ec-arr{transform:rotate(180deg)}
.ec-body{max-height:0;overflow:hidden;padding:0 1.25rem;opacity:0;transition:max-height .45s cubic-bezier(.4,0,.2,1),padding .35s ease,opacity .3s ease}
.expand-card.open .ec-body{max-height:8000px;padding:0 1.25rem 1.25rem;opacity:1}

.centro-item{display:flex;align-items:center;padding:10px 14px;border-radius:12px;gap:10px;transition:transform .2s,box-shadow .2s;cursor:default;margin-bottom:6px}
.centro-item:hover{transform:translateX(4px);box-shadow:0 2px 12px rgba(0,0,0,.06)}
.centro-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.centro-nome{font-size:13px;font-weight:600;flex:1}
.centro-val{text-align:right}
.centro-val .v{font-size:16px;font-weight:800}
.centro-val .p{font-size:10px;font-weight:500;opacity:.7}
.pbar-wrap{background:#E8E8EE;border-radius:6px;height:8px;overflow:hidden;margin-top:6px}
.pbar{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.cwrap{position:relative;width:100%}
.smsg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;color:var(--sub);gap:12px;font-size:14px;text-align:center}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.krow,.krow4,.g2,.card,.expand-card,.tendcard{animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both}
.krow,.krow4{animation-delay:.05s}.g2{animation-delay:.1s}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(83,83,233,.18);border-radius:3px}

@media(max-width:1024px){.krow,.krow4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.g2{grid-template-columns:1fr}}
@media(max-width:600px){
  .krow,.krow4{grid-template-columns:1fr}
  .page{padding:.75rem .75rem 3rem}
  .header{height:auto;padding:.5rem .75rem;gap:6px}
  .kval{font-size:20px!important}
  .card,.tendcard{padding:1rem}
  .rt td,.rt th{padding:5px 6px;font-size:11px}
  .tog-btn{padding:4px 10px;font-size:10px}
  .header h1{font-size:11px}
  .tog{flex-wrap:wrap}
}
</style>
</head>

// ── CLASSIFICAÇÃO RECEBIMENTOS ──
function classificarTipo(t){var s=(t||'').toLowerCase().trim();if(s.includes('pro rata')||s.includes('revistoria')||s==='mensalidade')return'Mensalidade';if(s==='adesão'||s.includes('adesao'))return'Adesão';return'Mensalidade';}
function normBanco(b){var s=(b||'').trim().toLowerCase();if(s.includes('mutualpay')&&s.includes('allsafe'))return'Mutualpay - AllSafe';if(s.includes('mutualpay'))return'MutualPay';if(s.includes('totalben'))return'Bradesco Totalben';if(s.includes('total safe'))return'Bradesco Total Safe';if(s.includes('pacta'))return'PACTA';if(s.includes('bradesco'))return'Bradesco';if(s.includes('blessing'))return'Blessing';var o=(b||'').trim();return o.length>30?o.substring(0,30)+'…':o;}

// ── FETCH RECEBIMENTOS ──
async function fetchRec(){
  var gid=GIDS_RECEBIMENTOS[MES];if(!gid)return null;
  try{
    var r=await fetch('https://docs.google.com/spreadsheets/d/'+SHEET_RECEBIMENTOS+'/export?format=csv&gid='+gid);
    if(!r.ok)throw new Error('HTTP '+r.status);
    var txt=await r.text();var ls=txt.split('\n');if(ls.length<2)return null;
    var hdr=parseCSVLine(ls[0]);var hi={};hdr.forEach(function(h,i){hi[h.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'')]=i;});
    var iCred=-1,iData=-1,iVal=-1,iTipo=-1,iBanco=-1;
    Object.keys(hi).forEach(function(k){
      if(k.includes('data')&&k.includes('credito'))iCred=hi[k];
      else if(k.includes('data')&&k.includes('pagamento'))iData=hi[k];
      if(k.includes('valor'))iVal=hi[k];
      if(k.includes('tipo')&&k.includes('cobranca'))iTipo=hi[k];
      if(k==='banco'||k.includes('banco'))iBanco=hi[k];
    });
    if(iVal<0)return null;
    var tG=0,tA=0,tM=0,qA=0,qM=0,pDia={},pBanco={},pDB={};
    for(var i=1;i<ls.length;i++){
      if(!ls[i].trim())continue;var c=parseCSVLine(ls[i]);
      var val=pv(c[iVal]);if(!val)continue;
      var tipo=classificarTipo(iTipo>=0?c[iTipo]:'');
      var banco=iBanco>=0?normBanco(c[iBanco]):'';
      var dc=iCred>=0?(c[iCred]||'').trim():'';
      var dk='';if(dc){var p=dc.split('/');if(p.length>=2)dk=p[0]+'/'+p[1];}
      tG+=val;if(tipo==='Adesão'){tA+=val;qA++;}else{tM+=val;qM++;}
      if(dk){if(!pDia[dk])pDia[dk]={total:0,adesao:0,mensalidade:0};pDia[dk].total+=val;pDia[dk][tipo==='Adesão'?'adesao':'mensalidade']+=val;}
      if(banco){if(!pBanco[banco])pBanco[banco]={total:0,adesao:0,mensalidade:0,qtd:0};pBanco[banco].total+=val;pBanco[banco][tipo==='Adesão'?'adesao':'mensalidade']+=val;pBanco[banco].qtd++;}
      if(dk&&banco){if(!pDB[banco])pDB[banco]={};if(!pDB[banco][dk])pDB[banco][dk]={total:0,adesao:0,mensalidade:0};pDB[banco][dk].total+=val;pDB[banco][dk][tipo==='Adesão'?'adesao':'mensalidade']+=val;}
    }
    return{totalGeral:tG,totalAdesao:tA,totalMensalidade:tM,qtdAdesao:qA,qtdMensalidade:qM,qtdTotal:qA+qM,porDia:pDia,porBanco:Object.entries(pBanco).sort(function(a,b){return b[1].total-a[1].total;}),porDiaBanco:pDB};
  }catch(e){console.warn('fetchRec:',e);return null;}
}

// ── SELETOR / NAV ──
function popularSel(){var s=document.getElementById('mes-sel');s.innerHTML='';MESES.forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=m;if(m===MES)o.selected=true;s.appendChild(o);});}
function setView(v){VIEW=v;document.querySelectorAll('.tog-btn').forEach(function(b){b.classList.toggle('on',b.dataset.view===v);});render();}
function trocarMes(v){MES=v;REC=null;render();}
function setTs(msg){var el=document.getElementById('ts');if(el)el.textContent=msg;}

async function atualizar(){
  setTs('Atualizando...');REC=null;
  await render();
  setTs('Atualizado '+new Date().toLocaleTimeString('pt-BR'));
}

// ── RENDER ──
async function render(){
  destroyCharts();
  var root=document.getElementById('root');
  if(VIEW==='recebidos')await renderRecebidos(root);
  else if(VIEW==='resumo')await renderResumo(root);
  else if(VIEW==='centros')renderCentros(root);
  else renderCategorias(root);
}

    '<div class="card" style="margin-bottom:12px"><div class="ctit">Distribuição por centro de custo</div><div class="cwrap" style="height:'+Math.max(300,d.porCentro.length*28)+'px"><canvas id="gcCentros"></canvas></div></div>';

  var ctx=document.getElementById('gcCentros');
  if(ctx)regChart('GC',new Chart(ctx,{type:'bar',data:{labels:d.porCentro.map(function(c){return c.nome;}),datasets:[{data:d.porCentro.map(function(c){return c.valor;}),backgroundColor:d.porCentro.map(function(_,i){return CORES[i%CORES.length]+'CC';}),borderRadius:4,borderSkipped:false}]},plugins:[{id:'vl',afterDatasetsDraw:function(ch){var c2=ch.ctx;c2.save();ch.getDatasetMeta(0).data.forEach(function(bar,i){var v=ch.data.datasets[0].data[i];if(v>0){c2.font='700 9px Inter,sans-serif';c2.textAlign='left';c2.textBaseline='middle';c2.fillStyle='#5353E9';c2.fillText(fR(v),bar.x+6,bar.y);}});c2.restore();}}],options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(i){return fR(i.raw)+' ('+pct(i.raw,d.total)+'%)';}}}},scales:{x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{display:false}},y:{grid:{display:false},ticks:{color:'#5353E9',font:{size:10,weight:'600'}}}},layout:{padding:{right:120}}}}));
}

// ── CENTROS ──
function renderCentros(root){
  var d=DESPESAS;var html='';
  d.porCentro.forEach(function(c,idx){
    var cor=CORES[idx%CORES.length];var p=pct(c.valor,d.total);
    var catRows=c.cats.map(function(cat){var cp=pct(cat.valor,c.valor);return'<tr><td class="fw" style="color:'+cor+'">'+esc(cat.nome)+'</td><td class="tr fw" style="color:var(--dark)">'+fR(cat.valor)+'</td><td class="tr">'+cat.qtd+'</td><td class="tr"><div style="display:flex;align-items:center;gap:6px;justify-content:flex-end"><span>'+cp+'%</span><div style="width:60px;height:6px;background:#E8E8EE;border-radius:3px"><div style="width:'+cp+'%;height:100%;background:'+cor+';border-radius:3px"></div></div></div></td></tr>';}).join('');
    var hdr='<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;padding:14px 18px;border-radius:14px;background:'+cor+'12;border-left:4px solid '+cor+'"><div style="flex:1"><div style="font-size:16px;font-weight:800;color:'+cor+'">'+esc(c.nome)+'</div><div style="font-size:11px;color:var(--sub);margin-top:2px">'+c.cats.length+' categoria'+(c.cats.length>1?'s':'')+'</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:800;color:'+cor+'">'+fR(c.valor)+'</div><div style="font-size:11px;color:var(--sub)">'+p+'% do total · '+c.qtd+' lanç.</div></div></div>';
    html+=expandCard(c.nome+' — '+fR(c.valor)+' ('+p+'%)',hdr+'<div style="overflow-x:auto"><table class="rt"><thead><tr><th>Categoria</th><th class="tr">Valor (R$)</th><th class="tr">Qtd</th><th class="tr">% do Centro</th></tr></thead><tbody>'+catRows+'</tbody></table></div>','c-'+idx,idx<3);
  });
  root.innerHTML=html;
}

// ── CATEGORIAS ──
function renderCategorias(root){
  var d=DESPESAS;var allCats={};
  d.porCentro.forEach(function(c){c.cats.forEach(function(cat){if(!allCats[cat.nome])allCats[cat.nome]={nome:cat.nome,valor:0,qtd:0,centros:[]};allCats[cat.nome].valor+=cat.valor;allCats[cat.nome].qtd+=cat.qtd;allCats[cat.nome].centros.push(c.nome);});});
  var sorted=Object.values(allCats).sort(function(a,b){return b.valor-a.valor;});
  var medals=['🥇','🥈','🥉'];
  var kpis='<div class="krow"><div class="kpi kd"><div class="klbl">Total categorias</div><div class="kval">'+sorted.length+'</div><div class="ksub">categorias únicas</div><div class="kdeco">🏷️</div></div>'+
    '<div class="kpi kr"><div class="klbl">Maior categoria</div><div class="kval" style="font-size:15px">'+esc(sorted[0].nome)+'</div><div class="ksub">'+fR(sorted[0].valor)+'</div><div class="kdeco">🥇</div></div>'+
    '<div class="kpi km"><div class="klbl">Top 5 concentram</div><div class="kval">'+pct(sorted.slice(0,5).reduce(function(s,c){return s+c.valor;},0),d.total)+'%</div><div class="ksub">do total de despesas</div><div class="kdeco">📊</div></div></div>';

  var rows=sorted.slice(0,40).map(function(cat,i){var pos=i<3?medals[i]:(i+1);return'<tr><td style="font-size:12px;font-weight:700;color:var(--sub);min-width:24px">'+pos+'</td><td class="fw">'+esc(cat.nome)+'</td><td class="tr fw" style="color:#5353E9">'+fR(cat.valor)+'</td><td class="tr">'+cat.qtd+'</td><td class="tr">'+pct(cat.valor,d.total)+'%</td><td style="font-size:10px;color:var(--sub);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(cat.centros.join(', '))+'">'+esc(cat.centros.join(', '))+'</td></tr>';}).join('');

  var top15=sorted.slice(0,15);
  root.innerHTML=kpis+
    '<div class="card" style="margin-bottom:12px"><div class="ctit">Top 15 categorias</div><div class="cwrap" style="height:420px"><canvas id="gcCats"></canvas></div></div>'+
    '<div class="card" style="margin-bottom:12px"><div class="ctit">Ranking de categorias</div><div style="overflow-x:auto"><table class="rt"><thead><tr><th>#</th><th>Categoria</th><th class="tr">Valor</th><th class="tr">Qtd</th><th class="tr">%</th><th>Centros</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';

  var ctx=document.getElementById('gcCats');
  if(ctx)regChart('GCat',new Chart(ctx,{type:'bar',data:{labels:top15.map(function(c){return c.nome;}),datasets:[{data:top15.map(function(c){return c.valor;}),backgroundColor:top15.map(function(_,i){return CORES[i%CORES.length]+'CC';}),borderRadius:4,borderSkipped:false}]},plugins:[{id:'vl2',afterDatasetsDraw:function(ch){var c2=ch.ctx;c2.save();ch.getDatasetMeta(0).data.forEach(function(bar,i){var v=ch.data.datasets[0].data[i];if(v>0){c2.font='700 9px Inter,sans-serif';c2.textAlign='left';c2.textBaseline='middle';c2.fillStyle='#5353E9';c2.fillText(fR(v),bar.x+6,bar.y);}});c2.restore();}}],options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(i){return fR(i.raw);}}}},scales:{x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{display:false}},y:{grid:{display:false},ticks:{color:'#210B4E',font:{size:10,weight:'600'}}}},layout:{padding:{right:140}}}}));
}

// ── INIT ──
popularSel();
setTs(MES);
render();
_interval=setInterval(function(){REC=null;render();setTs('Auto '+new Date().toLocaleTimeString('pt-BR'));},3600000);
</script>
</body>
</html>
