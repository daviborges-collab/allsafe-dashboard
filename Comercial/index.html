<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Allsafe — Painel de Vendas</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{

  --roxo:#5353E9;--rosa:#F7B2F5;--azul:#93ADFC;

  --dark:#210B4E;--limao:#DFF44C;--menta:#AFF9E4;

  --bg:#F4F4F4;--white:#FFFFFF;--borda:#E4E4E4;--sub:#7B7B9A;

}

body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

.header{background:linear-gradient(180deg,var(--dark) 0%,#1a0940 100%);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;gap:14px;border-bottom:1px solid rgba(83,83,233,.15);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}

.header-left{display:flex;align-items:center;gap:12px}

.logo-img{height:32px;width:32px;border-radius:9px;object-fit:cover;box-shadow:0 2px 8px rgba(83,83,233,.35);flex-shrink:0;transition:transform .3s cubic-bezier(.4,0,.2,1)}

.logo-img:hover{transform:scale(1.08)}

.header-div{width:1px;height:22px;background:rgba(255,255,255,.1);flex-shrink:0}

.header h1{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.01em}

.header-right{display:flex;align-items:center;gap:10px}

.live{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--menta)}

.live-dot{width:6px;height:6px;border-radius:50%;background:var(--menta);animation:blink 2s infinite}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.ts{font-size:11px;color:#7B8FA8;transition:opacity .3s}

.btn-sm{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:rgba(255,255,255,.45);font-size:11px;padding:5px 10px;cursor:pointer;font-family:inherit;transition:all .25s cubic-bezier(.4,0,.2,1)}

.btn-sm:hover{background:rgba(255,255,255,.14);color:#fff;transform:scale(1.04)}

.btn-sm:active{transform:scale(.97)}

select.mes-sel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:var(--azul);font-size:11px;padding:5px 8px;cursor:pointer;font-family:inherit;transition:all .2s}

select.mes-sel:hover{background:rgba(255,255,255,.12)}

.tog{display:flex;background:rgba(255,255,255,.08);border-radius:9px;padding:2px;gap:1px}

.tog-btn{padding:5px 16px;border-radius:7px;border:none;font-size:11.5px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .3s cubic-bezier(.4,0,.2,1);color:rgba(255,255,255,.45);background:transparent;position:relative;overflow:hidden}

.tog-btn:hover:not(.on){color:rgba(255,255,255,.7)}

.tog-btn.on{background:rgba(255,255,255,.95);color:var(--dark);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.18)}

.tog-btn:active{transform:scale(.96)}

.page{max-width:1320px;margin:0 auto;padding:1.25rem 1.5rem 3rem}

.krow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem}

.kpi{border-radius:16px;padding:1.25rem 1.5rem;position:relative;overflow:hidden;transition:transform .25s cubic-bezier(.4,0,.2,1),box-shadow .25s}

.kpi:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(33,11,78,.12)}

.kd{background:var(--dark)}.kr{background:var(--roxo)}.km{background:var(--menta)}

.klbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}

.kd .klbl{color:var(--azul)}.kr .klbl{color:var(--rosa)}.km .klbl{color:#0A6B54}

.kval{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}

.kd .kval{color:var(--limao)}.kr .kval{color:#fff;font-size:20px}.km .kval{color:var(--dark);font-size:20px}

.ksub{font-size:11px}

.kd .ksub{color:#5a5a9a}.kr .ksub{color:rgba(255,255,255,.6)}.km .ksub{color:#0A6B54;opacity:.7}

.kdeco{position:absolute;right:-8px;bottom:-8px;font-size:64px;opacity:.07;line-height:1;pointer-events:none}

.khoje{font-size:12px;margin-top:6px;color:var(--menta);font-weight:600}

.kpi-comp{font-size:10px;margin-top:3px;font-weight:600}

.kpi-comp.up{color:#2ecc71}.kpi-comp.dn{color:#e74c3c}.kpi-comp.eq{color:#7B8FA8}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}

.gmain{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}

.card{background:var(--white);border-radius:16px;border:1px solid var(--borda);padding:1.25rem;transition:box-shadow .3s cubic-bezier(.4,0,.2,1),transform .3s}

.card:hover{box-shadow:0 6px 24px rgba(33,11,78,.07);transform:translateY(-1px)}

.ctit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-bottom:12px;display:flex;align-items:center;gap:6px}

.ctit::before{content:'';display:inline-block;width:3px;height:12px;background:var(--roxo);border-radius:2px}

.eqi{display:flex;align-items:center;padding:10px 14px;border-radius:12px;gap:10px;transition:transform .2s cubic-bezier(.4,0,.2,1),box-shadow .2s;cursor:default}

.eqi:hover{transform:translateX(4px);box-shadow:0 2px 12px rgba(0,0,0,.06)}

.eqdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

.eqnom{font-size:13px;font-weight:600;flex:1}

.eqv{font-size:18px;font-weight:800}

.eqval{font-size:10px;font-weight:500;opacity:.7;text-align:right}

.cwrap{position:relative;width:100%}

.agpill{background:rgba(83,83,233,.2);border:1px solid rgba(83,83,233,.4);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--azul);display:flex;gap:5px;align-items:center;transition:transform .15s}

.agpill:hover{transform:scale(1.04)}

.agpill b{font-weight:700;color:#fff}

.rt{width:100%;border-collapse:collapse;font-size:12px}

.rt th{text-align:left;padding:5px 8px;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--sub);text-transform:uppercase;border-bottom:2px solid var(--borda);white-space:nowrap}

.rt td{padding:7px 8px;border-bottom:1px solid #F0F0F0;vertical-align:middle;transition:background .15s}

.rt tr:last-child td{border-bottom:none}

.rt tbody tr:hover td{background:#F5F5FF}

.pos{font-size:11px;font-weight:700;color:var(--sub);min-width:20px;display:inline-block}

.p1{color:#C8900A;font-size:14px}.p2{color:#888;font-size:14px}.p3{color:#8B5E3C;font-size:14px}

.bdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}

.tr{text-align:right}.fw{font-weight:700}

.lg{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}

.lgi{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--sub)}

.lgsq{width:9px;height:9px;border-radius:2px;flex-shrink:0}

.dest{background:linear-gradient(135deg,#3535C0,var(--roxo));border-radius:16px;padding:1.25rem;color:#fff;transition:transform .25s,box-shadow .25s}

.dest:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(53,53,192,.25)}

.destlbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rosa);margin-bottom:8px}

.destnom{font-size:22px;font-weight:800;margin-bottom:10px}

.destst{display:flex;gap:16px;flex-wrap:wrap}

.destsl{font-size:10px;color:rgba(255,255,255,.6);margin-bottom:2px}

.destsv{font-size:15px;font-weight:700;color:#fff}

.velcard{background:var(--dark);border-radius:16px;padding:1.25rem;display:flex;flex-direction:column;align-items:center;transition:transform .25s,box-shadow .25s}

.velcard:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(33,11,78,.2)}

.veltit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--azul);margin-bottom:8px;align-self:flex-start}

.velinfo{text-align:center;margin-top:4px}

.velat{font-size:26px;font-weight:800;color:var(--limao)}

.velm{font-size:11px;color:#5a5a9a}

.velp{font-size:12px;color:var(--menta);margin-top:3px;font-weight:600}

.tendcard{background:var(--dark);border-radius:16px;padding:1.25rem;display:flex;gap:0;transition:transform .25s,box-shadow .25s}

.tendcard:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(33,11,78,.2)}

.tendl{flex:1;border-right:1px solid rgba(255,255,255,.08);padding-right:16px;margin-right:16px}

.tendr{display:flex;flex-direction:column;justify-content:center;min-width:110px}

.tslbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}

.tslbl.az{color:var(--azul)}.tslbl.mn{color:var(--menta)}

.tsbig{font-size:28px;font-weight:800;color:var(--limao);line-height:1;margin-bottom:3px}

.tssub{font-size:11px;color:#5a5a9a;margin-bottom:8px}

.tsdet{font-size:11px;color:#7B8FA8;line-height:1.8}

.rval{font-size:24px;font-weight:800;color:var(--menta);line-height:1;margin-bottom:2px}

.rlbl{font-size:10px;color:#5a5a9a}

.objcard{background:#0d0d2e;border:1px solid rgba(83,83,233,.25);border-radius:16px;padding:1.25rem;transition:transform .25s,box-shadow .25s}

.objcard:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(13,13,46,.3)}

.objtit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rosa);margin-bottom:12px;display:flex;align-items:center;gap:6px}

.objtit::before{content:'🎯';font-size:12px}

.objmain{display:flex;align-items:flex-end;gap:8px;margin-bottom:4px}

.objval{font-size:40px;font-weight:800;color:var(--limao);line-height:1}

.objunit{font-size:12px;color:#5a5a9a;margin-bottom:6px}

.objlbl{font-size:11px;color:#7B8FA8;margin-bottom:10px}

.objalr{border-radius:10px;padding:8px 12px;font-size:12px;font-weight:600;line-height:1.5;transition:transform .2s}

.objalr:hover{transform:scale(1.01)}

.objalr.verm{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);color:#E74C3C}

.objalr.verd{background:rgba(10,107,84,.15);border:1px solid rgba(10,107,84,.3);color:#2ecc71}

.objdiff{font-size:14px;font-weight:800;display:block;margin-bottom:2px}

.sectit{font-size:13px;font-weight:700;color:var(--dark);margin:20px 0 8px;display:flex;align-items:center;gap:8px}

.sectit::before{content:'';display:inline-block;width:4px;height:16px;background:var(--roxo);border-radius:2px}

.it{width:100%;border-collapse:collapse;font-size:12px}

.it th{text-align:left;padding:6px 10px;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--sub);text-transform:uppercase;border-bottom:2px solid var(--borda);white-space:nowrap;background:#fff}

.it td{padding:7px 10px;border-bottom:1px solid #F0F0F0;vertical-align:middle;text-align:center;transition:background .15s}

.it td:first-child{text-align:left}

.it tr:last-child td{border-bottom:none}

.it tbody tr:hover td{background:#F5F5FF}

.it tfoot td{border-top:2px solid var(--borda);font-weight:700;background:#F8F8FC;padding:7px 10px}

.smsg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;color:var(--sub);gap:12px;font-size:14px;text-align:center}

.smsg .ico{font-size:32px}

.err{color:#C0392B}

.skeleton-wrap{padding:0}

.skel-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}

.skel-card{border-radius:16px;height:140px;background:linear-gradient(110deg,#E8E8EE 8%,#F5F5FA 18%,#E8E8EE 33%);background-size:200% 100%;animation:shimmer 1.6s linear infinite}

.skel-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}

.skel-wide{border-radius:16px;height:200px;background:linear-gradient(110deg,#E8E8EE 8%,#F5F5FA 18%,#E8E8EE 33%);background-size:200% 100%;animation:shimmer 1.6s linear infinite}

.skel-tall{border-radius:16px;height:300px;background:linear-gradient(110deg,#E8E8EE 8%,#F5F5FA 18%,#E8E8EE 33%);background-size:200% 100%;animation:shimmer 1.6s linear infinite}

@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.eq-hoje-badge{font-size:9px;font-weight:700;background:rgba(255,255,255,.2);border-radius:10px;padding:1px 6px;margin-left:6px}

.grafico-diario-wrap{height:150px;position:relative;width:100%}

.expand-card{background:var(--white);border-radius:16px;border:1px solid var(--borda);overflow:hidden;margin-bottom:12px;transition:box-shadow .3s}

.expand-card:hover{box-shadow:0 4px 16px rgba(33,11,78,.05)}

.expand-card .ec-head{padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .2s;border-radius:16px}

.expand-card .ec-head:hover{background:#F8F8FC}

.ec-tit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);display:flex;align-items:center;gap:6px}

.ec-tit::before{content:'';display:inline-block;width:3px;height:12px;background:var(--roxo);border-radius:2px}

.ec-arr{font-size:12px;color:var(--sub);transition:transform .35s cubic-bezier(.4,0,.2,1);display:inline-block}

.expand-card.open .ec-arr{transform:rotate(180deg)}

.ec-body{max-height:0;overflow:hidden;padding:0 1.25rem;opacity:0;transition:max-height .45s cubic-bezier(.4,0,.2,1),padding .35s ease,opacity .3s ease}

.expand-card.open .ec-body{max-height:4000px;padding:0 1.25rem 1.25rem;opacity:1}

.filtro-cor-bar{display:inline-flex;gap:0;margin-bottom:16px;align-items:center;background:rgba(120,120,130,.12);border-radius:11px;padding:3px;flex-wrap:wrap}

.filtro-cor-btn{padding:5px 14px;border-radius:8px;border:none;background:transparent;color:rgba(33,11,78,.4);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .3s cubic-bezier(.4,0,.2,1);white-space:nowrap}

.filtro-cor-btn:hover:not(.on){color:rgba(33,11,78,.75);background:rgba(0,0,0,.04)}

.filtro-cor-btn.on{background:var(--roxo);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(83,83,233,.3)}

.filtro-cor-btn:active{transform:scale(.95)}

.btn-salvar-rodape{display:flex;align-items:center;justify-content:center;gap:8px;margin:28px auto 0;padding:12px 28px;background:var(--dark);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#7B8FA8;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .3s cubic-bezier(.4,0,.2,1)}

.btn-salvar-rodape:hover{background:#2a2a5e;color:#fff;transform:translateY(-2px);box-shadow:0 6px 20px rgba(33,11,78,.15)}

.btn-salvar-rodape:active{transform:translateY(0);box-shadow:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.krow,.g2,.gmain,.card,.expand-card,.tendcard,.velcard,.objcard,.dest{animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both}

.krow{animation-delay:.05s}

.g2{animation-delay:.1s}

.gmain{animation-delay:.15s}

.krow .kpi:nth-child(1){animation:fadeUp .5s cubic-bezier(.4,0,.2,1) .05s both}

.krow .kpi:nth-child(2){animation:fadeUp .5s cubic-bezier(.4,0,.2,1) .1s both}

.krow .kpi:nth-child(3){animation:fadeUp .5s cubic-bezier(.4,0,.2,1) .15s both}

#root{transition:opacity .2s ease}

#root.fading{opacity:0}

::-webkit-scrollbar{width:6px;height:6px}

::-webkit-scrollbar-track{background:transparent}

::-webkit-scrollbar-thumb{background:rgba(83,83,233,.18);border-radius:3px}

::-webkit-scrollbar-thumb:hover{background:rgba(83,83,233,.3)}

.mobile-nav{display:contents}

.cad-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:6px}

.agger-bar{background:var(--dark);border-radius:16px;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}

.agger-bar-stats{display:flex;gap:32px;align-items:center}

@media(max-width:1024px){

  .gmain,.g2{grid-template-columns:1fr 1fr}

  .krow{grid-template-columns:repeat(3,1fr)}

}

@media(max-width:900px){

  .gmain,.g2{grid-template-columns:1fr}

  .krow{grid-template-columns:1fr 1fr}

  .tendcard{flex-direction:column}

  .tendl{border-right:none;padding-right:0;margin-right:0;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:12px;margin-bottom:12px}

  .skel-row2{grid-template-columns:1fr}

  .cad-grid{grid-template-columns:repeat(2,1fr)}

  .agger-bar{flex-direction:column;gap:12px;text-align:center;padding:1rem}

  .agger-bar-stats{gap:16px;justify-content:center;flex-wrap:wrap}

}

@media(max-width:600px){

  .krow{grid-template-columns:1fr}

  .skel-row{grid-template-columns:1fr}

  .page{padding:.75rem .75rem 5rem}

  .header{height:auto;padding:.5rem .75rem;gap:8px;backdrop-filter:none;-webkit-backdrop-filter:none}

  .ts{font-size:9px}

  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:100;background:linear-gradient(180deg,#1a0940,var(--dark));padding:10px 12px;border-top:1px solid rgba(83,83,233,.2);gap:8px;align-items:center;justify-content:center;box-shadow:0 -4px 20px rgba(0,0,0,.3)}

  .kval{font-size:24px!important}

  .card,.tendcard,.objcard,.velcard,.dest{padding:1rem}

  .rt td,.rt th,.it td,.it th{padding:5px 6px;font-size:11px}

  .filtro-cor-bar{display:inline-flex;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;scrollbar-width:none}

  .filtro-cor-bar::-webkit-scrollbar{display:none}

  .filtro-cor-btn{padding:4px 10px;font-size:10px;flex-shrink:0}

  .destnom{font-size:18px}

  .grafico-diario-wrap{height:200px}

  .objval{font-size:28px}

  .tsbig{font-size:22px}

  .rval{font-size:18px}

  .velat{font-size:20px}

  .eqi{padding:8px 10px}

  .eqv{font-size:16px}

  .tog-btn{padding:4px 12px;font-size:10.5px}

}

@media(max-width:380px){

  .tog-btn{padding:4px 10px;font-size:10.5px}

  .kval{font-size:20px!important}

  .header h1{font-size:11px}

  .cad-grid{grid-template-columns:1fr}

  .agger-bar-stats{flex-direction:column;gap:8px}

  .destst{flex-direction:column;gap:4px}

  .objmain{flex-wrap:wrap;gap:4px}

}

</style>

</head>

<body>

<div class="header">

  <div class="header-left">

    <img class="logo-img" src="https://daviborges-collab.github.io/allsafe-dashboard/logo.png" alt="Allsafe">

    <div class="header-div"></div>

    <h1>Painel de Vendas</h1>

  </div>

  <div class="header-right">

    <div class="mobile-nav">

      <div class="tog">

        <button class="tog-btn on" id="btn-ext" onclick="setView('ext')">Externo</button>

        <button class="tog-btn" id="btn-int" onclick="setView('int')">Interno</button>

        <button class="tog-btn" id="btn-total" onclick="setView('total')">Total</button>

      </div>

      <select class="mes-sel" id="mes-sel" onchange="trocarMes(this.value)"></select>

    </div>

    <div class="live"><div class="live-dot"></div>Ao vivo</div>

    <span class="ts" id="ts">—</span>

    <button class="btn-sm" onclick="atualizar()">↻</button>

  </div>

</div>

<div class="page">

  <div id="root"><div class="skeleton-wrap"><div class="skel-row"><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div></div><div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div><div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div><div class="skel-tall"></div></div></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script>

/*! Allsafe Dashboard v3.8 — Round 9c: header validation, network error propagation, carnaval */

function fetchComTimeout(url, ms) {

  var timer = setTimeout(function(){ ctrl.abort(); }, ms || 15000);

  return fetch(url, { signal: ctrl.signal }).finally(function(){ clearTimeout(timer); });

}

function parseCSVLine(line){

  var cols=[],inQ=false,cur='';

  for(var i=0;i<line.length;i++){

    var ch=line[i];

    if(ch==='"'){if(inQ&&i+1<line.length&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}

    else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}

    else cur+=ch;

  }

  cols.push(cur.trim());

  return cols;

}



function findCol(idx){

  for(var i=1;i<arguments.length;i++){

    var k=n(arguments[i]);

    if(idx[k]!==undefined)return idx[k];

  }

  var keys=Object.keys(idx);

  for(var i=1;i<arguments.length;i++){

    var k=n(arguments[i]);

    for(var j=0;j<keys.length;j++){

      if(keys[j].includes(k)){return idx[keys[j]];}

    }

  }

  return -1;

}



function parseCSV(txt){

  var linhas=txt.split('\n');

  if(linhas.length<2)return[];

  var cols=parseCSVLine(linhas[0]);

  var idx={};

  cols.forEach(function(c,i){idx[n(c)]=i;});



  var fc=function(){

    var args=Array.prototype.slice.call(arguments);

    var fallback=typeof args[args.length-1]==='number'?args.pop():-1;

    var result=findCol.apply(null,[idx].concat(args));

    return result>=0?result:fallback;

  };



  var COL={

    status:fc('Status Contrato','status contrato','status',0),

    equipe:fc('Equipe de Venda','equipe de venda','equipe',4),

    consultor:fc('Consultor','consultor','vendedor',5),

    valor:fc('Valor Adesão','valor adesao','valor adesão','valor',6),

    estado:fc('Estado','estado','uf',11),

    veiculo:fc('Tipo veículo','tipo veiculo','tipo de veiculo',15),

    uso:fc('Tipo de Uso','tipo de uso',16),

    tipoNeg:fc('Como conheceu','como conheceu',17),

    tipoNegociacao:fc('Tipo de negociação','tipo de negociacao',-1),

    data:fc('Data Finalização Vistoria','data finalizacao vistoria','data finalização vistoria','data',2),

  };



  var rows=[];

  for(var li=1;li<linhas.length;li++){

    if(!linhas[li].trim())continue;

    var c=parseCSVLine(linhas[li]);

    if(c.length<3)continue;

    var status=(c[COL.status]||'').trim();

    if(!status)continue;

    rows.push({

      status:status,

      equipe:(c[COL.equipe]||'').trim(),

      consultor:(c[COL.consultor]||'').trim(),

      valor:pv(c[COL.valor]),

      estado:(c[COL.estado]||'').trim().toUpperCase(),

      veiculo:COL.veiculo>=0&&COL.veiculo<c.length?(c[COL.veiculo]||'').trim().toUpperCase():'',

      uso:COL.uso>=0&&COL.uso<c.length?(c[COL.uso]||'').trim():'',

      tipoNeg:COL.tipoNeg>=0&&COL.tipoNeg<c.length?((c[COL.tipoNeg]||'').trim()||'Não informado'):'Não informado',

      _tipoNegociacao:COL.tipoNegociacao>=0&&COL.tipoNegociacao<c.length?(c[COL.tipoNegociacao]||'').trim():'',

      data:(c[COL.data]||'').trim(),

      raw:c

    });

  }

  /* FIX R9: excluir linhas sem data (rows template/pre-populados) */

  rows=rows.filter(function(r){

    if(!r.data||!r.data.trim())return false;

    return true;

  });

  var EXCLUIR_TIPO_NEG=['substituição','substituicao','troca de titularidade'];

  rows=rows.filter(function(r){

    var t=(r.tipoNeg||'').toLowerCase().trim();

    var tn=(r._tipoNegociacao||'').toLowerCase().trim();

    for(var ei=0;ei<EXCLUIR_TIPO_NEG.length;ei++){if(t===EXCLUIR_TIPO_NEG[ei]||tn===EXCLUIR_TIPO_NEG[ei])return false;}

    return true;

  });

  return rows;

}



async function fetchRows(aba){

  var baseUrl='https://docs.google.com/spreadsheets/d/'+SHEET+'/export?format=csv';

  var urlGid=GIDS[aba]?baseUrl+'&gid='+GIDS[aba]:null;

  var urlName=baseUrl+'&sheet='+encodeURIComponent(aba);

  var urls=urlGid?[urlGid]:[urlName];

  var lastErr=null;

  for(var i=0;i<urls.length;i++){

    try{

      var txt=await fetchCachedCSV(urls[i]);

      if(!txt||!txt.includes(','))continue;

      var linhas=txt.split('\n').filter(function(l){return l.trim();});

      if(linhas.length<2)return[];

      /* FIX R9c: validar que os headers pertencem a uma aba de vendas.

         Quando a aba está vazia, Google Sheets pode retornar CSV de outra aba

         (ex: Base Corretor). Verificamos se existe coluna "Status" — que toda

         aba de vendas tem mas a Base Corretor não. */

      var hdr=n(linhas[0]);

      if(hdr.indexOf('status')< 0)return[];

      var rows=parseCSV(txt);

      return rows;

    }catch(e){lastErr=e;continue;}

  }

  /* FIX BUG-1: se houve erro de rede, propagar para acionar backoff.

     Se simplesmente não achou dados, retorna [] (aba vazia). */

  if(lastErr)throw lastErr;

  return[];

}

  var pct=Math.round(((atual-anterior)/anterior)*100);

}

function setView(v){

  var root=document.getElementById('root');

  root.classList.add('fading');

  setTimeout(function(){

    VIEW=v;filtroInt=null;filtroExt=null;

    document.getElementById('btn-ext').classList.toggle('on',v==='ext');

    document.getElementById('btn-int').classList.toggle('on',v==='int');

    document.getElementById('btn-total').classList.toggle('on',v==='total');

    root.classList.remove('fading');

    renderFromCache();

  },200);

}

function trocarMes(v){

  var root=document.getElementById('root');

  root.classList.add('fading');

  setTimeout(function(){

    MES=v;filtroInt=null;filtroExt=null;mesAntData=null;_cachedRows=null;_cachedCad=null;_cachedEstado=null;_cachedNovos=null;

    showSkeleton();

    root.classList.remove('fading');

}

function reiniciarIntervalo(){

  _falhasConsecutivas=0;

  if(_intervaloAtualizar)clearInterval(_intervaloAtualizar);

async function atualizar(){

  var thisVersion=++_renderVersion;

  try{

    var tsEl=document.getElementById('ts');

    if(tsEl) tsEl.textContent='Atualizando...';

    var _r=await Promise.all([fetchMetas().catch(function(){}),fetchRows(MES)]);

    var rows=_r[1];

    _cachedRows=rows;_cachedMes=MES;

    if(thisVersion!==_renderVersion)return;



    if(VIEW==='ext'){

      var dExt=procExt(rows,MES);

      dadosExt=dExt;

      rendExt(dExt);

      fetchMesAnterior().then(function(ant){

        if(thisVersion!==_renderVersion)return;

        mesAntData=ant;

        if(ant){

          var el1=document.getElementById('comp-ext-tot');

          var el2=document.getElementById('comp-ext-val');

          var el3=document.getElementById('comp-ext-tick');

          if(!filtroExt){
            if(el1)el1.innerHTML=kpiComp(dExt.tot,ant.ext.tot);
            if(el2)el2.innerHTML=kpiComp(dExt.totV,ant.ext.totV);
            if(el3&&dExt.tot&&ant.ext.tot)el3.innerHTML=kpiComp(dExt.totV/dExt.tot,ant.ext.totV/ant.ext.tot);
          }

        }

      }).catch(function(e){console.warn('fetchMesAnterior:',e);});

      fetchCadastros().then(function(cad){if(thisVersion!==_renderVersion)return;_cachedCad=cad;if(cad)rendPainelCad(cad);}).catch(function(e){

        console.warn('fetchCadastros:',e);

        var el=document.getElementById('painel-cad');if(el)el.innerHTML='<div style="font-size:11px;color:var(--sub);padding:8px">⚠️ Falha ao carregar cadastros</div>';

      });

      fetchScriptManual().then(function(data){if(thisVersion!==_renderVersion)return;_cachedEstado=data;if(data)rendCorretoresEstado(data);}).catch(function(e){

        console.warn('fetchScriptManual:',e);

        var el=document.getElementById('painel-estado');if(el)el.innerHTML='<div style="font-size:11px;color:var(--sub);padding:8px">⚠️ Falha ao carregar corretores por estado</div>';

      });

      fetchBaseCorretor().then(function(data){if(thisVersion!==_renderVersion)return;dadosBase=data;if(data)rendBaseCorretor(data);}).catch(function(e){

        console.warn('fetchBaseCorretor:',e);

        var el=document.getElementById('painel-base');if(el)el.innerHTML='<div style="font-size:11px;color:var(--sub);padding:8px">⚠️ Falha ao carregar base de corretores</div>';

      });

      fetchNovosCorretores(MES).then(function(data){if(thisVersion!==_renderVersion)return;_cachedNovos=data;if(data)rendNovosCorretores(data);}).catch(function(e){

        console.warn('fetchNovosCorretores:',e);

        var el=document.getElementById('painel-novos');if(el)el.innerHTML='<div style="font-size:11px;color:var(--sub);padding:8px">⚠️ Falha ao carregar novos corretores</div>';

      });

    } else if(VIEW==='int'){

      rendInt(procInt(rows,MES));

    } else {

      var dTotal=procTotal(rows,MES);

      rendTotal(dTotal);

      fetchMesAnterior().then(function(ant){

        if(thisVersion!==_renderVersion)return;

        mesAntData=ant;

        if(ant){

          var aT=(ant.ext.tot||0)+(ant.int.tot||0);

          var aV=(ant.ext.totV||0)+(ant.int.totV||0);

          var el1=document.getElementById('comp-total-tot');

          var el2=document.getElementById('comp-total-val');

          var el3=document.getElementById('comp-total-tick');

          if(el1)el1.innerHTML=kpiComp(dTotal.tot,aT);

          if(el2)el2.innerHTML=kpiComp(dTotal.totV,aV);

          if(el3&&dTotal.tot&&aT)el3.innerHTML=kpiComp(dTotal.totV/dTotal.tot,aV/aT);

        }

      }).catch(function(e){console.warn('fetchMesAnterior:',e);});

    }

    if(thisVersion===_renderVersion){

      _falhasConsecutivas=0;

      var tsEl2=document.getElementById('ts');

      if(tsEl2) tsEl2.textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR');

    }

  }catch(e){

    if(thisVersion===_renderVersion){

      _falhasConsecutivas++;

      if(_falhasConsecutivas>=5){

        if(_intervaloAtualizar){clearInterval(_intervaloAtualizar);_intervaloAtualizar=null;}

        destroyAllCharts();

        var rootEl=document.getElementById('root');

        if(rootEl) rootEl.innerHTML='<div class="smsg err"><div class="ico">⚠️</div>Conexão instável. Múltiplas tentativas falharam.<br><br><button class="btn-sm" style="font-size:13px;padding:8px 20px;color:#fff;background:var(--roxo);border:none;border-radius:10px" onclick="reiniciarIntervalo()">Tentar novamente</button></div>';

        var tsEl3=document.getElementById('ts');

        if(tsEl3) tsEl3.textContent='Pausado — falhas consecutivas';

      }else{

        destroyAllCharts();

        var rootEl=document.getElementById('root');

        if(rootEl) rootEl.innerHTML='<div class="smsg err"><div class="ico">❌</div>'+e.message+'<br><br><small>Verifique se a aba existe e a planilha está pública. (Tentativa '+_falhasConsecutivas+'/5)</small></div>';

        var tsEl3=document.getElementById('ts');

        if(tsEl3) tsEl3.textContent='Erro';

      }

    }

  }

}



(async function(){

  try{MESES=await detectarMeses();}catch(e){MESES=[NOMES_MES[new Date().getMonth()]+'/'+new Date().getFullYear()];}

  MES=achaMes(nomeMes());

  popularSel();

  atualizar();

  _intervaloAtualizar=setInterval(atualizar,60000);

})();

</script>
