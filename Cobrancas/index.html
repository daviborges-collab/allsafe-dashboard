<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allsafe — Painel de Cobranças</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --roxo:#5353E9;--rosa:#F7B2F5;--azul:#93ADFC;
  --dark:#210B4E;--limao:#DFF44C;--menta:#AFF9E4;
  --bg:#F4F4F4;--white:#FFFFFF;--borda:#E4E4E4;--sub:#7B7B9A;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.header{background:linear-gradient(180deg,var(--dark) 0%,#1a0940 100%);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;gap:14px;border-bottom:1px solid rgba(83,83,233,.15);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.header-left{display:flex;align-items:center;gap:12px}
.logo-img{height:32px;width:32px;border-radius:9px;object-fit:cover;box-shadow:0 2px 8px rgba(83,83,233,.35);flex-shrink:0;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.logo-img:hover{transform:scale(1.08)}
.header-div{width:1px;height:22px;background:rgba(255,255,255,.1);flex-shrink:0}
.header h1{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.01em}
.header-right{display:flex;align-items:center;gap:10px}
.live{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--menta)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--menta);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ts{font-size:11px;color:#7B8FA8;transition:opacity .3s}
.btn-sm{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:rgba(255,255,255,.45);font-size:11px;padding:5px 10px;cursor:pointer;font-family:inherit;transition:all .25s cubic-bezier(.4,0,.2,1)}
.btn-sm:hover{background:rgba(255,255,255,.14);color:#fff;transform:scale(1.04)}
.btn-sm:active{transform:scale(.97)}
select.mes-sel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:var(--azul);font-size:11px;padding:5px 8px;cursor:pointer;font-family:inherit;transition:all .2s}
select.mes-sel:hover{background:rgba(255,255,255,.12)}
.page{max-width:1320px;margin:0 auto;padding:1.25rem 1.5rem 3rem}
.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.25rem}
.kpi{border-radius:16px;padding:1.25rem 1.5rem;position:relative;overflow:hidden;transition:transform .25s cubic-bezier(.4,0,.2,1),box-shadow .25s}
.kpi:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(33,11,78,.12)}
.kd{background:var(--dark)}.kr{background:var(--roxo)}.km{background:var(--menta)}.kw{background:var(--white);border:1px solid var(--borda)}
.klbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.kd .klbl{color:var(--azul)}.kr .klbl{color:var(--rosa)}.km .klbl{color:#0A6B54}.kw .klbl{color:var(--sub)}
.kval{font-size:26px;font-weight:800;line-height:1;margin-bottom:4px}
.kd .kval{color:var(--limao)}.kr .kval{color:#fff}.km .kval{color:var(--dark)}.kw .kval{color:var(--dark)}
.ksub{font-size:11px}
.kd .ksub{color:#5a5a9a}.kr .ksub{color:rgba(255,255,255,.6)}.km .ksub{color:#0A6B54;opacity:.7}.kw .ksub{color:var(--sub)}
.kdeco{position:absolute;right:-8px;bottom:-8px;font-size:64px;opacity:.07;line-height:1;pointer-events:none}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:var(--white);border-radius:16px;border:1px solid var(--borda);padding:1.25rem;transition:box-shadow .3s cubic-bezier(.4,0,.2,1),transform .3s}
.card:hover{box-shadow:0 6px 24px rgba(33,11,78,.07);transform:translateY(-1px)}
.ctit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ctit::before{content:'';display:inline-block;width:3px;height:12px;background:var(--roxo);border-radius:2px}
.velcard{background:var(--dark);border-radius:16px;padding:1.25rem;display:flex;flex-direction:column;align-items:center;transition:transform .25s,box-shadow .25s}
.velcard:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(33,11,78,.2)}
.veltit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--azul);margin-bottom:8px;align-self:flex-start}
.velinfo{text-align:center;margin-top:4px}
.velat{font-size:26px;font-weight:800;color:var(--limao)}
.velm{font-size:11px;color:#5a5a9a}
.objcard{background:#0d0d2e;border:1px solid rgba(83,83,233,.25);border-radius:16px;padding:1.25rem;transition:transform .25s,box-shadow .25s}
.objcard:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(13,13,46,.3)}
.objtit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rosa);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.objmain{display:flex;align-items:flex-end;gap:8px;margin-bottom:4px}
.objval{font-size:36px;font-weight:800;color:var(--limao);line-height:1}
.objunit{font-size:12px;color:#5a5a9a;margin-bottom:6px}
.objlbl{font-size:11px;color:#7B8FA8;margin-bottom:10px}
.objalr{border-radius:10px;padding:8px 12px;font-size:12px;font-weight:600;line-height:1.5;transition:transform .2s}
.objalr:hover{transform:scale(1.01)}
.objalr.verm{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);color:#E74C3C}
.objalr.verd{background:rgba(10,107,84,.15);border:1px solid rgba(10,107,84,.3);color:#2ecc71}
.objdiff{font-size:14px;font-weight:800;display:block;margin-bottom:2px}
.eqi{display:flex;align-items:center;padding:10px 14px;border-radius:12px;gap:10px;transition:transform .2s cubic-bezier(.4,0,.2,1),box-shadow .2s;cursor:default;margin-bottom:6px}
.eqi:hover{transform:translateX(4px);box-shadow:0 2px 12px rgba(0,0,0,.06)}
.eqdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.eqnom{font-size:13px;font-weight:600;flex:1}
.eqv{font-size:18px;font-weight:800}
.eqval{font-size:10px;font-weight:500;opacity:.7;text-align:right}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:12px;font-weight:600;min-width:32px;text-align:right}
.bar-track{flex:1;height:22px;background:#F0F0F4;border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.bar-count{font-size:10px;font-weight:700;color:var(--sub);min-width:30px;text-align:left;margin-left:6px}
.grafico-diario-wrap{height:150px;position:relative;width:100%}
.smsg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;color:var(--sub);gap:12px;font-size:14px;text-align:center}
.smsg .ico{font-size:32px}
.err{color:#C0392B}
.skeleton-wrap{padding:0}
.skel-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.skel-card{border-radius:16px;height:140px;background:linear-gradient(110deg,#E8E8EE 8%,#F5F5FA 18%,#E8E8EE 33%);background-size:200% 100%;animation:shimmer 1.6s linear infinite}
.skel-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.skel-wide{border-radius:16px;height:200px;background:linear-gradient(110deg,#E8E8EE 8%,#F5F5FA 18%,#E8E8EE 33%);background-size:200% 100%;animation:shimmer 1.6s linear infinite}
.skel-tall{border-radius:16px;height:300px;background:linear-gradient(110deg,#E8E8EE 8%,#F5F5FA 18%,#E8E8EE 33%);background-size:200% 100%;animation:shimmer 1.6s linear infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.krow,.g2,.g3,.card,.velcard,.objcard{animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both}
.krow{animation-delay:.05s}.g2{animation-delay:.1s}.g3{animation-delay:.12s}
.krow .kpi:nth-child(1){animation:fadeUp .5s cubic-bezier(.4,0,.2,1) .05s both}
.krow .kpi:nth-child(2){animation:fadeUp .5s cubic-bezier(.4,0,.2,1) .1s both}
.krow .kpi:nth-child(3){animation:fadeUp .5s cubic-bezier(.4,0,.2,1) .15s both}
.krow .kpi:nth-child(4){animation:fadeUp .5s cubic-bezier(.4,0,.2,1) .2s both}
#root{transition:opacity .2s ease}
#root.fading{opacity:0}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(83,83,233,.18);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(83,83,233,.3)}
.btn-salvar-rodape{display:flex;align-items:center;justify-content:center;gap:8px;margin:28px auto 0;padding:12px 28px;background:var(--dark);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#7B8FA8;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .3s cubic-bezier(.4,0,.2,1)}
.btn-salvar-rodape:hover{background:#2a2a5e;color:#fff;transform:translateY(-2px);box-shadow:0 6px 20px rgba(33,11,78,.15)}
.btn-salvar-rodape:active{transform:translateY(0);box-shadow:none}
.churn-gauge{position:relative;width:160px;height:90px;margin:0 auto 8px}
.churn-big{font-size:32px;font-weight:800;line-height:1}
.churn-meta{font-size:11px;color:#5a5a9a;margin-top:2px}
@media(max-width:1024px){
  .krow{grid-template-columns:repeat(2,1fr)}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr}
}
@media(max-width:900px){
  .g2{grid-template-columns:1fr}
  .krow{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .krow{grid-template-columns:1fr}
  .skel-row{grid-template-columns:1fr}
  .page{padding:.75rem .75rem 5rem}
  .header{height:auto;padding:.5rem .75rem;gap:8px;backdrop-filter:none;-webkit-backdrop-filter:none}
  .ts{font-size:9px}
  .kval{font-size:20px!important}
  .card,.velcard,.objcard{padding:1rem}
  .grafico-diario-wrap{height:200px}
  .objval{font-size:28px}
  .velat{font-size:20px}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <img class="logo-img" src="logo.png" alt="Allsafe">
    <div class="header-div"></div>
    <h1>Painel de Cobranças</h1>
  </div>
  <div class="header-right">
    <select class="mes-sel" id="mes-sel" onchange="trocarMes(this.value)"></select>
    <div class="live"><div class="live-dot"></div>Ao vivo</div>
    <span class="ts" id="ts">—</span>
    <button class="btn-sm" onclick="atualizar()">↻</button>
  </div>
</div>
<div class="page">
  <div id="root"><div class="skeleton-wrap"><div class="skel-row"><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div></div><div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div><div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div><div class="skel-tall"></div></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>

/* Allsafe Cobranças Dashboard v2.0 — fixed column mapping + cancelados */

/* ─── Helpers ─── */
function n(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}
function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML;}
function pv(v){if(!v)return 0;return parseFloat(String(v).replace(/R\$\s?/g,'').replace(/\./g,'').replace(',','.').trim())||0;}
function fR(v){return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fN(v){return Math.round(v).toLocaleString('pt-BR');}
function fPct(v){return v.toFixed(1).replace('.',',')+' %';}

/* ─── Skeleton ─── */
function showSkeleton(){
  var root=document.getElementById('root');
  if(root)root.innerHTML='<div class="skeleton-wrap"><div class="skel-row"><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div></div><div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div><div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div><div class="skel-tall"></div></div>';
}

/* ─── Fetch with timeout ─── */
function fetchComTimeout(url, ms){
  var ctrl=new AbortController();
  var timer=setTimeout(function(){ctrl.abort();}, ms||15000);
  return fetch(url,{signal:ctrl.signal}).finally(function(){clearTimeout(timer);});
}

/* ─── CSV cache ─── */
var _csvCache={}, _csvCacheVersion=-1;
function fetchCachedCSV(url){
  if(_csvCacheVersion!==MES){_csvCache={};_csvCacheVersion=MES;}
  if(_csvCache[url])return _csvCache[url];
  var p=fetchComTimeout(url,15000).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.text();
  }).then(function(txt){
    _csvCache[url]=Promise.resolve(txt);
    return txt;
  }).catch(function(err){
    delete _csvCache[url];
    throw err;
  });
  _csvCache[url]=p;
  return p;
}

/* ─── Meses ─── */
var NOMES_MES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var MESES=[];
var MES='';

/* ─── Sheet IDs ─── */
var SHEET_COBRANCAS='1UltiL5wdnslbMpsitPoPt4vZwJa1CH7xZwAZn6zxAxs';
var SHEET_CANCELADOS='1JhtvrGYPe5L67iPjFhMun4U3d71LKAbb2sfe0nehEZQ';

/* ─── GIDs por mês — cobranças ─── */
var GIDS_COB={
  'Janeiro/2026':'830932961',
  'Fevereiro/2026':'145498588',
  'Março/2026':'676498498',
  'Abril/2026':'363498574',
};

/* ─── GIDs por mês — cancelados ─── */
var GIDS_CAN={
  'Janeiro/2026':'220941909',
  'Fevereiro/2026':'1401840695',
  'Março/2026':'1816592445',
  'Abril/2026':'1159569049',
};

/* ─── Charts ─── */
var _charts={};
function destroyChart(key){if(_charts[key]){try{_charts[key].destroy();}catch(e){}delete _charts[key];}}
function destroyAllCharts(){Object.keys(_charts).forEach(destroyChart);}
function registerChart(key,chart){destroyChart(key);_charts[key]=chart;}

/* ─── CSV parsing ─── */
function parseCSVLine(line){
  var cols=[],inQ=false,cur='';
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch==='"'){if(inQ&&i+1<line.length&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
    else cur+=ch;
  }
  cols.push(cur.trim());
  return cols;
}

function findCol(idx){
  for(var i=1;i<arguments.length;i++){
    var k=n(arguments[i]);
    if(idx[k]!==undefined)return idx[k];
  }
  var keys=Object.keys(idx);
  for(var i=1;i<arguments.length;i++){
    var k=n(arguments[i]);
    for(var j=0;j<keys.length;j++){
      if(keys[j].includes(k))return idx[keys[j]];
    }
  }
  return -1;
}

/* ─── Parse cobranças CSV ───
   Headers reais confirmados:
   Estado, Data de Pagamento, Status, Data de vencimento original,
   Valor Original, Valor Pago, Id do contrato, Tipo veículo,
   Tipo de uso veículo, Regional, Consultor, Data Finalização Vistoria
*/
function parseCobrancas(txt){
  var linhas=txt.split('\n');
  if(linhas.length<2)return[];
  var cols=parseCSVLine(linhas[0]);
  var idx={};
  cols.forEach(function(c,i){idx[n(c)]=i;});

  var fc=function(){
    var args=Array.prototype.slice.call(arguments);
    var fallback=typeof args[args.length-1]==='number'?args.pop():-1;
    var result=findCol.apply(null,[idx].concat(args));
    return result>=0?result:fallback;
  };

  var COL={
    estado:        fc('estado','uf',0),
    dataPagamento: fc('data de pagamento','data pagamento',1),
    status:        fc('status','classificar boletos',2),
    dataVencimento:fc('data de vencimento original','data vencimento',3),
    valorOriginal: fc('valor original',4),
    valorPago:     fc('valor pago',5),
    idContrato:    fc('id do contrato','id contrato',6),
    tipoVeiculo:   fc('tipo veiculo','tipo veículo',7),
    tipoUso:       fc('tipo de uso veiculo','tipo de uso veículo','tipo de uso',8),
    regional:      fc('regional',9),
    consultor:     fc('consultor',10),
  };

  var rows=[];
  for(var li=1;li<linhas.length;li++){
    if(!linhas[li].trim())continue;
    var c=parseCSVLine(linhas[li]);
    if(c.length<3)continue;
    var status=(COL.status>=0&&COL.status<c.length)?(c[COL.status]||'').trim():'';
    if(!status)continue;
    rows.push({
      status:status,
      valorOriginal:COL.valorOriginal>=0?pv(c[COL.valorOriginal]):0,
      valorPago:COL.valorPago>=0?pv(c[COL.valorPago]):0,
      idContrato:COL.idContrato>=0?(c[COL.idContrato]||'').trim():'',
      tipoVeiculo:COL.tipoVeiculo>=0?(c[COL.tipoVeiculo]||'').trim().toUpperCase():'',
      tipoUso:COL.tipoUso>=0?(c[COL.tipoUso]||'').trim():'',
      estado:COL.estado>=0?(c[COL.estado]||'').trim().toUpperCase():'',
      dataPagamento:COL.dataPagamento>=0?(c[COL.dataPagamento]||'').trim():'',
      dataVencimento:COL.dataVencimento>=0?(c[COL.dataVencimento]||'').trim():'',
      regional:COL.regional>=0?(c[COL.regional]||'').trim():'',
      consultor:COL.consultor>=0?(c[COL.consultor]||'').trim():'',
    });
  }
  return rows;
}

/* ─── Parse cancelados CSV — inferir colunas automaticamente ─── */
function parseCancelados(txt){
  var linhas=txt.split('\n');
  if(linhas.length<2)return[];
  var cols=parseCSVLine(linhas[0]);
  var idx={};
  cols.forEach(function(c,i){idx[n(c)]=i;});
  var iId=findCol(idx,'id do contrato','id contrato','contrato','id');
  var rows=[];
  for(var li=1;li<linhas.length;li++){
    if(!linhas[li].trim())continue;
    var c=parseCSVLine(linhas[li]);
    if(c.length<1)continue;
    /* se tem pelo menos 1 campo preenchido, conta como cancelado */
    var algum=c.some(function(v){return v.trim();});
    if(!algum)continue;
    rows.push({
      idContrato:iId>=0?(c[iId]||'').trim():'row_'+li,
      raw:c,
    });
  }
  return rows;
}

/* ─── Date parser ─── */
function parseDataField(dataStr){
  if(!dataStr)return{dStr:'',dia:null};
  var s=dataStr.trim();
  var pts=s.split('/');
  if(pts.length>=3){
    var dayPart=pts[0].trim().padStart(2,'0');
    var monthPart=pts[1].trim().padStart(2,'0');
    var yearPart=pts[2].trim().split(/\s/)[0];
    return{dStr:yearPart+'-'+monthPart+'-'+dayPart,dia:dayPart+'/'+monthPart};
  }
  var iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso)return{dStr:iso[1]+'-'+iso[2]+'-'+iso[3],dia:iso[3]+'/'+iso[2]};
  return{dStr:'',dia:null};
}

/* ─── Fetch cobranças rows ─── */
async function fetchCobrancasRows(aba){
  var baseUrl='https://docs.google.com/spreadsheets/d/'+SHEET_COBRANCAS+'/export?format=csv';
  var gid=GIDS_COB[aba];
  var urls=[];
  if(gid)urls.push(baseUrl+'&gid='+gid);
  urls.push(baseUrl+'&sheet='+encodeURIComponent(aba));
  var lastErr=null;
  for(var i=0;i<urls.length;i++){
    try{
      var txt=await fetchCachedCSV(urls[i]);
      if(!txt||!txt.includes(','))continue;
      var rows=parseCobrancas(txt);
      if(rows.length>0)return rows;
    }catch(e){lastErr=e;continue;}
  }
  if(lastErr)throw lastErr;
  return[];
}

/* ─── Fetch cancelados rows — com fallback silencioso ─── */
async function fetchCanceladosRows(aba){
  var baseUrl='https://docs.google.com/spreadsheets/d/'+SHEET_CANCELADOS+'/export?format=csv';
  var gid=GIDS_CAN[aba];
  var urls=[];
  if(gid)urls.push(baseUrl+'&gid='+gid);
  urls.push(baseUrl+'&sheet='+encodeURIComponent(aba));
  for(var i=0;i<urls.length;i++){
    try{
      var txt=await fetchCachedCSV(urls[i]);
      if(!txt||!txt.includes(','))continue;
      var rows=parseCancelados(txt);
      return rows;
    }catch(e){
      console.warn('fetchCancelados tentativa '+(i+1)+':', e.message);
      continue;
    }
  }
  console.warn('fetchCancelados: planilha inacessível, retornando 0 cancelados');
  return[];
}

/* ─── Detectar meses disponíveis ─── */
function gerarCandidatosMeses(){
  var hoje=new Date();
  var limM=hoje.getMonth(),limA=hoje.getFullYear();
  var result=[],a=2025,m=0;
  while(a<limA||(a===limA&&m<=limM)){
    result.push(NOMES_MES[m]+'/'+a);
    m++;if(m>11){m=0;a++;}
  }
  return result;
}

async function detectarMeses(){
  var candidatos=gerarCandidatosMeses();
  try{
    var results=await Promise.allSettled(candidatos.map(function(aba){
      var gid=GIDS_COB[aba];
      var url=gid
        ?'https://docs.google.com/spreadsheets/d/'+SHEET_COBRANCAS+'/export?format=csv&gid='+gid
        :'https://docs.google.com/spreadsheets/d/'+SHEET_COBRANCAS+'/export?format=csv&sheet='+encodeURIComponent(aba);
      return fetchComTimeout(url,15000).then(function(r){return r.ok?aba:null;}).catch(function(){return null;});
    }));
    var found=results.map(function(r){return r.status==='fulfilled'?r.value:null;}).filter(Boolean);
    if(found.length)return found;
  }catch(e){console.warn('[detectarMeses] erro:',e);}
  return[NOMES_MES[new Date().getMonth()]+'/'+new Date().getFullYear()];
}

/* ─── Status classification ─── */
function isStatusPago(s){
  var ns=n(s);
  return ns==='sucesso'||ns.includes('baixado com pend')||ns.includes('baixado com duplic');
}
function isStatusVencido(s){return n(s)==='vencido';}
function isStatusAberto(s){var ns=n(s);return ns==='vencido'||ns==='a vencer'||ns==='à vencer'||ns.includes('a vencer');}
function isStatusAVencer(s){var ns=n(s);return ns==='a vencer'||ns==='à vencer'||ns.includes('a vencer');}

/* ─── Process data ─── */
function processar(rows, cancelados){
  var totalBoletoGerado=0, totalPago=0, totalAberto=0;
  var idsContrato=new Set();
  var totalDescontoVal=0, countDesconto=0, somaOrigDesconto=0;
  var countVencido=0, totalContratos=rows.length;
  var porDia={};
  var carros=0, motos=0, caminhoes=0;
  var usoParticular=0, usoTaxi=0, usoProfissional=0;
  var porEstado={};
  var porStatus={};

  rows.forEach(function(r){
    totalBoletoGerado+=r.valorOriginal;
    if(r.idContrato)idsContrato.add(r.idContrato);

    porStatus[r.status]=(porStatus[r.status]||0)+1;

    if(isStatusPago(r.status)){
      totalPago+=r.valorPago;
      var desc=r.valorOriginal-r.valorPago;
      if(desc>0.01){totalDescontoVal+=desc;somaOrigDesconto+=r.valorOriginal;countDesconto++;}
    }

    if(isStatusAberto(r.status)){
      totalAberto+=r.valorOriginal;
    }

    if(isStatusVencido(r.status)){
      countVencido++;
    }

    /* Pagamentos por dia — usa Data de Pagamento */
    if(isStatusPago(r.status)&&r.dataPagamento){
      var parsed=parseDataField(r.dataPagamento);
      if(parsed.dia)porDia[parsed.dia]=(porDia[parsed.dia]||0)+1;
    }

    /* Frota */
    var tv=r.tipoVeiculo;
    if(tv.includes('MOTO'))motos++;
    else if(tv.includes('CAMINHA')||tv.includes('CAMINHAO')||tv.includes('CAMINHÃO'))caminhoes++;
    else if(tv.includes('CARRO')||tv.includes('AUTO')||tv)carros++;

    /* Uso veículo — apenas para carros */
    var tu=n(r.tipoUso);
    if(tu.includes('taxi'))usoTaxi++;
    else if(tu.includes('profiss')||tu.includes('aplic'))usoProfissional++;
    else usoParticular++;

    /* Estado */
    if(r.estado){
      porEstado[r.estado]=(porEstado[r.estado]||0)+1;
    }
  });

  var qtdSegurados=idsContrato.size;
  var totalCancelados=cancelados.length;

  /* Inadimplência = vencidos / total contratos */
  var inadimplencia=totalContratos>0?(countVencido/totalContratos)*100:0;

  /* Churn = (vencidos + cancelados) / total contratos */
  var churn=totalContratos>0?((countVencido+totalCancelados)/totalContratos)*100:0;

  /* Meta churn 3%: quantos boletos vencidos precisam ser pagos? */
  var metaChurn=3;
  var vencidosMaxPermitidos=Math.floor(metaChurn/100*totalContratos)-totalCancelados;
  if(vencidosMaxPermitidos<0)vencidosMaxPermitidos=0;
  var boletosParaMeta=Math.max(0, countVencido-vencidosMaxPermitidos);

  var descontoPctMedio=somaOrigDesconto>0?(totalDescontoVal/somaOrigDesconto)*100:0;

  var estadosSorted=Object.entries(porEstado).sort(function(a,b){return b[1]-a[1];});

  return{
    totalBoletoGerado:totalBoletoGerado,
    totalPago:totalPago,
    totalAberto:totalAberto,
    qtdSegurados:qtdSegurados,
    totalDescontoVal:totalDescontoVal,
    descontoPctMedio:descontoPctMedio,
    countDesconto:countDesconto,
    totalCancelados:totalCancelados,
    totalCanceladosErr:cancelados._fetchFailed||false,
    countVencido:countVencido,
    totalContratos:totalContratos,
    inadimplencia:inadimplencia,
    churn:churn,
    metaChurn:metaChurn,
    boletosParaMeta:boletosParaMeta,
    carros:carros,
    motos:motos,
    caminhoes:caminhoes,
    usoParticular:usoParticular,
    usoTaxi:usoTaxi,
    usoProfissional:usoProfissional,
    porEstado:estadosSorted,
    porDia:porDia,
    porStatus:porStatus,
  };
}

/* ─── Render velocímetro churn ─── */
function rendVelocimetro(canvasId, pct, chartKey){
  var cv=document.getElementById(canvasId);if(!cv)return;
  var capped=Math.min(pct,100);
  var cor=pct<=3?'#2ecc71':pct<=5?'#f39c12':'#E74C3C';
  registerChart(chartKey,new Chart(cv,{type:'doughnut',data:{datasets:[{data:[capped,Math.max(0,100-capped)],backgroundColor:[cor,'#1a1a3e'],borderWidth:0,circumference:180,rotation:270},{data:[3,97],backgroundColor:['rgba(46,204,113,0.2)','transparent'],borderWidth:0,circumference:180,rotation:270}]},options:{responsive:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{enabled:false}}}}));
}

/* ─── Render gráfico diário ─── */
function rendGraficoDiario(canvasId, porDia, cor, chartKey, mesParam){
  var mN=['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  var partes=mesParam.split('/');var mIdx=mN.indexOf(n(partes[0]));
  var ano=parseInt(partes[1])||new Date().getFullYear();
  if(mIdx<0)return;
  var nDias=new Date(ano,mIdx+1,0).getDate();var hoje=new Date();
  var ultimoDia=(hoje.getMonth()===mIdx&&hoje.getFullYear()===ano)?hoje.getDate():nDias;
  var labels=[],data=[],bgColors=[];
  var DIAS_INIT=['D','S','T','Q','Q','S','S'];var daysOfWeek=[];
  for(var d=1;d<=nDias;d++){
    var key=String(d).padStart(2,'0')+'/'+String(mIdx+1).padStart(2,'0');
    labels.push(d);data.push(porDia[key]||0);
    bgColors.push(d<=ultimoDia?cor+'CC':'#E4E4E4');
    var dow=new Date(ano,mIdx,d).getDay();daysOfWeek.push({i:DIAS_INIT[dow],w:dow===0||dow===6});
  }
  var ctx=document.getElementById(canvasId);if(!ctx)return;
  registerChart(chartKey,new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{label:'Pagamentos',data:data,backgroundColor:bgColors,borderRadius:3,borderSkipped:false}]},plugins:[{id:'barLabels',afterDatasetsDraw:function(chart){var ctx2=chart.ctx;ctx2.save();chart.data.datasets.forEach(function(ds,di){var meta=chart.getDatasetMeta(di);meta.data.forEach(function(bar,i){var val=ds.data[i];if(val>0){ctx2.font='700 9px Inter,sans-serif';ctx2.textAlign='center';ctx2.textBaseline='middle';var y=bar.y,h=bar.base-bar.y;if(h>14){ctx2.fillStyle='#fff';ctx2.fillText(val,bar.x,y+h/2);}else{ctx2.fillStyle='#5353E9';ctx2.fillText(val,bar.x,y-8);}}});});ctx2.restore();}},{id:'dowLabels',afterDraw:function(chart){var c2=chart.ctx;var xA=chart.scales.x;c2.save();c2.textAlign='center';c2.textBaseline='top';for(var di=0;di<daysOfWeek.length;di++){var xp=xA.getPixelForTick(di);if(xp===undefined)continue;var dw=daysOfWeek[di];c2.font=dw.w?'600 8px Inter,sans-serif':'400 8px Inter,sans-serif';c2.fillStyle='#000';c2.fillText(dw.i,xp,xA.bottom+2);}c2.restore();}}],options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:function(i){var dd=parseInt(i[0].label);var dowN=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];var dw2=new Date(ano,mIdx,dd).getDay();return dowN[dw2]+', dia '+dd+' — '+partes[0];},label:function(i){return i.raw+' pagamento'+(i.raw!==1?'s':'');}}}},scales:{x:{grid:{display:false},ticks:{color:'#9090AA',font:{size:9}}},y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'#9090AA',font:{size:9},stepSize:1},beginAtZero:true}},layout:{padding:{top:16,bottom:14}}}}));
}

/* ─── Render principal ─── */
function render(d){
  destroyAllCharts();

  var stHtml='';

  stEntries.forEach(function(e){
    var pct=Math.round(e[1]/maxSt*100);
    var cor=isStatusPago(e[0])?'#2ecc71':isStatusVencido(e[0])?'#E74C3C':isStatusAVencer(e[0])?'#f39c12':'#7B7B9A';
    stHtml+='<div class="bar-row"><div class="bar-label" style="color:'+cor+'">'+esc(e[0])+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+cor+'"></div></div><div class="bar-count">'+fN(e[1])+'</div></div>';
  });

  var estHtml='';
  var maxEst=d.porEstado.length>0?d.porEstado[0][1]:1;

    estHtml+='<div class="bar-row"><div class="bar-label">'+esc(e[0])+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:var(--roxo)"></div></div><div class="bar-count">'+fN(e[1])+'</div></div>';

    /* Bloco 1 — KPIs principais */
    '<div class="krow">'+

      '<div class="kpi kr"><div class="klbl">Valor pago</div><div class="kval">'+fR(d.totalPago)+'</div><div class="ksub">Pagamentos confirmados</div><div class="kdeco">💰</div></div>'+
      '<div class="kpi km"><div class="klbl">Valor em aberto</div><div class="kval">'+fR(d.totalAberto)+'</div><div class="ksub">Vencidos + À vencer</div><div class="kdeco">⏳</div></div>'+
      '<div class="kpi kw"><div class="klbl">Segurados</div><div class="kval">'+fN(d.qtdSegurados)+'</div><div class="ksub">Contratos únicos</div><div class="kdeco">👤</div></div>'+
    '</div>'+

    /* Bloco 2 — Descontos + Cancelados + Status */
    '<div class="g3">'+
      '<div class="card"><div class="ctit">Descontos concedidos</div>'+
        '<div style="font-size:28px;font-weight:800;color:var(--roxo);margin-bottom:4px">'+fR(d.totalDescontoVal)+'</div>'+
        '<div style="font-size:12px;color:var(--sub);margin-bottom:8px">em '+fN(d.countDesconto)+' boletos com desconto</div>'+
        '<div style="display:inline-block;background:rgba(83,83,233,.08);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;color:var(--roxo)">'+fPct(d.descontoPctMedio)+' desconto médio</div>'+
      '</div>'+

      '<div class="card"><div class="ctit">Cancelados no mês</div>'+
        '<div style="font-size:42px;font-weight:800;color:#E74C3C;margin-bottom:4px">'+fN(d.totalCancelados)+'</div>'+
        canceladoLabel+
      '</div>'+

      '<div class="card"><div class="ctit">Status dos boletos</div>'+stHtml+'</div>'+
    '</div>'+

    /* Bloco 3 — Inadimplência e Churn */
    '<div class="g2">'+
      '<div class="velcard"><div class="veltit">Churn</div>'+
        '<canvas id="gcChurn" width="200" height="110"></canvas>'+
        '<div class="velinfo">'+
          '<div class="churn-big" style="color:'+churnCor+'">'+fPct(d.churn)+'</div>'+
          '<div class="churn-meta">Meta: '+d.metaChurn+'%</div>'+
        '</div>'+
      '</div>'+

        '<div class="objtit">Inadimplência & Meta Churn</div>'+

          '<div><div style="font-size:10px;color:#5a5a9a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Inadimplência</div><div style="font-size:28px;font-weight:800;color:'+inadCor+'">'+fPct(d.inadimplencia)+'</div><div style="font-size:11px;color:#5a5a9a">'+fN(d.countVencido)+' vencidos / '+fN(d.totalContratos)+' total</div></div>'+
          '<div><div style="font-size:10px;color:#5a5a9a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Cancelados</div><div style="font-size:28px;font-weight:800;color:#E74C3C">'+fN(d.totalCancelados)+'</div></div>'+
        '</div>'+
        (d.churn>d.metaChurn?

        (d.caminhoes>0?'<div class="eqi" style="background:#F6FBDA;margin-bottom:0"><span class="eqdot" style="background:#5C6200"></span><span class="eqnom" style="color:#5C6200">Caminhões</span><div style="text-align:right"><div class="eqv" style="color:#5C6200">'+fN(d.caminhoes)+'</div></div></div>':'')+
      '</div>'+

      '<div class="card"><div class="ctit">Carros — Tipo de uso</div>'+
        '<div class="eqi" style="background:#E0FDF6;margin-bottom:6px"><span class="eqdot" style="background:#0A6B54"></span><span class="eqnom" style="color:#0A6B54">Particular</span><div class="eqv" style="color:#0A6B54">'+fN(d.usoParticular)+'</div></div>'+
        '<div class="eqi" style="background:#FFF4E0;margin-bottom:6px"><span class="eqdot" style="background:#C08A00"></span><span class="eqnom" style="color:#C08A00">Táxi</span><div class="eqv" style="color:#C08A00">'+fN(d.usoTaxi)+'</div></div>'+
        '<div class="eqi" style="background:#EEEEFF"><span class="eqdot" style="background:var(--roxo)"></span><span class="eqnom" style="color:var(--roxo)">Uso Profissional</span><div class="eqv" style="color:var(--roxo)">'+fN(d.usoProfissional)+'</div></div>'+
      '</div>'+
    '</div>'+

    /* Gráfico diário */
    '<div class="card" style="margin-bottom:12px"><div class="ctit">Pagamentos por dia — '+MES+' <span style="font-weight:400;color:#aaa;margin-left:8px">('+fN(totalPagDia)+' pagamentos)</span></div><div class="grafico-diario-wrap"><canvas id="gcDiario"></canvas></div></div>'+

    /* Bloco 5 — Veículos por estado */
    '<div class="card" style="margin-bottom:12px"><div class="ctit">Veículos por estado</div>'+estHtml+'</div>'+

    '<button class="btn-salvar-rodape" onclick="exportarDashboard()">⬇ Salvar espelho do dia</button>';

  /* Render charts */

/* ─── Exportar PNG ─── */
async function exportarDashboard(){
  try{var canvas=await html2canvas(document.body,{scale:1.5,useCORS:true,backgroundColor:'#F4F4F4'});var link=document.createElement('a');link.download='allsafe-cobrancas-'+new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')+'.png';link.href=canvas.toDataURL('image/png');link.click();}catch(e){alert('Erro ao exportar: '+e.message);}

/* ─── Controle ─── */
var _renderVersion=0;
var _intervaloAtualizar=null;

function trocarMes(val){
  MES=val;
  _csvCache={};_csvCacheVersion=-1;
  showSkeleton();
  atualizar();
}

function setMesSel(){
  var sel=document.getElementById('mes-sel');
  sel.innerHTML='';
  MESES.forEach(function(m){
    var opt=document.createElement('option');
    opt.value=m;opt.textContent=m;
    if(m===MES)opt.selected=true;
    sel.appendChild(opt);
  });
}

async function atualizar(){
  var ver=++_renderVersion;
  try{
    var rowsP=fetchCobrancasRows(MES);
    var canP=fetchCanceladosRows(MES);
    var rows=await rowsP;
    var cancelados=await canP;
    if(ver!==_renderVersion)return;
    var d=processar(rows, cancelados);
    render(d);
    var tsEl=document.getElementById('ts');
    if(tsEl)tsEl.textContent=new Date().toLocaleTimeString('pt-BR');
  }catch(e){
    console.error('atualizar:',e);
    if(ver!==_renderVersion)return;
    document.getElementById('root').innerHTML='<div class="smsg"><div class="ico">⚠️</div><div class="err">Erro ao carregar dados</div><div>'+esc(e.message)+'</div><button class="btn-sm" style="margin-top:12px;background:var(--dark);color:var(--azul)" onclick="atualizar()">Tentar novamente</button></div>';
  }
}

async function init(){
  MESES=await detectarMeses();
  MES=MESES[MESES.length-1]||NOMES_MES[new Date().getMonth()]+'/'+new Date().getFullYear();
  setMesSel();
  atualizar();
  _intervaloAtualizar=setInterval(atualizar, 5*60*1000);
}

init();
