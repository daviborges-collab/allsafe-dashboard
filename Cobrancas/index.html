<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allsafe — Painel de Cobranças</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --roxo:#5353E9;--rosa:#F7B2F5;--azul:#93ADFC;
  --dark:#210B4E;--limao:#DFF44C;--menta:#AFF9E4;
  --bg:#F4F4F4;--white:#FFFFFF;--borda:#E4E4E4;--sub:#7B7B9A;
  --radius:16px;--shadow:0 2px 12px rgba(33,11,78,.06);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;-webkit-font-smoothing:antialiased}

/* Header */
.header{background:linear-gradient(180deg,var(--dark) 0%,#1a0940 100%);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;gap:14px;border-bottom:1px solid rgba(83,83,233,.15);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.header-left{display:flex;align-items:center;gap:12px}
.logo-img{height:32px;width:32px;border-radius:9px;object-fit:cover;box-shadow:0 2px 8px rgba(83,83,233,.35);flex-shrink:0;transition:transform .3s}
.logo-img:hover{transform:scale(1.08)}
.header-div{width:1px;height:22px;background:rgba(255,255,255,.1);flex-shrink:0}
.header h1{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.01em}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.live{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--menta)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--menta);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ts{font-size:11px;color:#7B8FA8}
.btn-sm{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:rgba(255,255,255,.45);font-size:11px;padding:5px 10px;cursor:pointer;font-family:inherit;transition:all .25s}
.btn-sm:hover{background:rgba(255,255,255,.14);color:#fff;transform:scale(1.04)}
select.mes-sel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:var(--azul);font-size:11px;padding:5px 8px;cursor:pointer;font-family:inherit}

/* Page */
.page{max-width:1320px;margin:0 auto;padding:1.25rem 1.5rem 3rem}
.ref-badge{background:rgba(83,83,233,.06);border:1px solid rgba(83,83,233,.12);border-radius:20px;padding:7px 18px;font-size:11.5px;color:var(--roxo);font-weight:600;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px;letter-spacing:.01em}
.ref-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--roxo);flex-shrink:0}

/* KPIs */
.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi{border-radius:var(--radius);padding:1.15rem 1.35rem;position:relative;overflow:hidden;transition:transform .25s cubic-bezier(.4,0,.2,1),box-shadow .25s}
.kpi:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(33,11,78,.12)}
.kd{background:var(--dark)}.kr{background:var(--roxo)}.km{background:var(--menta)}.kw{background:var(--white);border:1px solid var(--borda)}
.klbl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.kd .klbl{color:var(--azul)}.kr .klbl{color:var(--rosa)}.km .klbl{color:#0A6B54}.kw .klbl{color:var(--sub)}
.kval{font-size:24px;font-weight:800;line-height:1.1;margin-bottom:4px}
.kd .kval{color:var(--limao)}.kr .kval{color:#fff}.km .kval{color:var(--dark)}.kw .kval{color:var(--dark)}
.ksub{font-size:10.5px;opacity:.7}
.kd .ksub{color:#7B8FA8}.kr .ksub{color:rgba(255,255,255,.6)}.km .ksub{color:#0A6B54}.kw .ksub{color:var(--sub)}
.kdeco{position:absolute;right:-8px;bottom:-8px;font-size:56px;opacity:.06;line-height:1;pointer-events:none}

/* Grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;align-items:start}
.g2.stretch{align-items:stretch}

/* Cards */
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--borda);padding:1.25rem;transition:box-shadow .3s,transform .3s}
.card:hover{box-shadow:0 6px 24px rgba(33,11,78,.07);transform:translateY(-1px)}
.ctit{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ctit::before{content:'';display:inline-block;width:3px;height:12px;background:var(--roxo);border-radius:2px}

/* Objcard (churn) */
.objcard{background:linear-gradient(135deg,#0d0d2e 0%,#1a0940 100%);border:1px solid rgba(83,83,233,.2);border-radius:var(--radius);padding:1.25rem;transition:transform .25s,box-shadow .25s}
.objcard:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(13,13,46,.3)}
.objtit{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rosa);margin-bottom:14px}
.objalr{border-radius:10px;padding:8px 12px;font-size:12px;font-weight:600;line-height:1.5}
.objalr.verm{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.2);color:#E74C3C}
.objalr.verd{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.2);color:#2ecc71}
.objdiff{font-size:14px;font-weight:800;display:block;margin-bottom:2px}
.stat-item{text-align:center;flex:1;min-width:80px}
.stat-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:6px}
.stat-val{font-size:26px;font-weight:800;line-height:1}
.stat-sub{font-size:10px;color:#5a5a9a;margin-top:3px}
.stat-divider{width:1px;background:rgba(255,255,255,.08);align-self:stretch;margin:0 4px}

/* Frota items */
.eqi{display:flex;align-items:center;padding:10px 14px;border-radius:12px;gap:10px;transition:transform .2s;cursor:default;margin-bottom:6px}
.eqi:hover{transform:translateX(4px);box-shadow:0 2px 12px rgba(0,0,0,.06)}
.eqdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.eqnom{font-size:12.5px;font-weight:600;flex:1}
.eqv{font-size:17px;font-weight:800}
.eqval{font-size:10px;font-weight:500;opacity:.65;text-align:right}

/* Bars */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-label{font-size:11.5px;font-weight:600;min-width:32px;text-align:right;color:var(--dark)}
.bar-track{flex:1;height:20px;background:#F0F0F4;border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bar-count{font-size:10px;font-weight:700;color:var(--sub);min-width:36px;text-align:left;margin-left:4px}

/* Chart wraps */
.grafico-diario-wrap{height:220px;position:relative;width:100%}
.timing-wrap{height:240px;position:relative;width:100%}

/* Messages */
.smsg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;color:var(--sub);gap:12px;font-size:14px;text-align:center}
.smsg .ico{font-size:32px}
.err{color:#C0392B}

/* Skeleton */
.skeleton-wrap{padding:0}
.skel-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.skel-card{border-radius:var(--radius);height:120px;background:linear-gradient(110deg,#E8E8EE 8%,#F5F5FA 18%,#E8E8EE 33%);background-size:200% 100%;animation:shimmer 1.6s linear infinite}
.skel-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.skel-wide{border-radius:var(--radius);height:200px;background:linear-gradient(110deg,#E8E8EE 8%,#F5F5FA 18%,#E8E8EE 33%);background-size:200% 100%;animation:shimmer 1.6s linear infinite}
.skel-tall{border-radius:var(--radius);height:300px;background:linear-gradient(110deg,#E8E8EE 8%,#F5F5FA 18%,#E8E8EE 33%);background-size:200% 100%;animation:shimmer 1.6s linear infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.krow,.g2,.card,.objcard{animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both}
.krow{animation-delay:.05s}
#root{transition:opacity .2s ease}
#root.fading{opacity:0}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(83,83,233,.15);border-radius:3px}

/* Footer btn */
.btn-salvar-rodape{display:flex;align-items:center;justify-content:center;gap:8px;margin:32px auto 0;padding:12px 28px;background:var(--dark);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:#7B8FA8;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .3s}
.btn-salvar-rodape:hover{background:#2a2a5e;color:#fff;transform:translateY(-2px);box-shadow:0 6px 20px rgba(33,11,78,.15)}

/* Desc 50% */
.desc50-card{background:linear-gradient(135deg,#2c1565,#1a0940);border-radius:var(--radius);padding:1.25rem;border:1px solid rgba(83,83,233,.15)}
.desc50-lbl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rosa);margin-bottom:8px}
.desc50-val{font-size:26px;font-weight:800;color:var(--limao);margin-bottom:4px}
.desc50-sub{font-size:10.5px;color:#5a5a9a}

/* Legend */
.chart-legend{display:flex;gap:14px;font-size:10px;font-weight:600;flex-wrap:wrap;margin-bottom:10px}
.chart-legend span{display:flex;align-items:center;gap:4px}
.chart-legend span::before{content:'';width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* Responsive */
@media(max-width:1024px){
  .krow{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:900px){
  .g2{grid-template-columns:1fr}
  .krow{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .krow{grid-template-columns:1fr}
  .skel-row{grid-template-columns:1fr 1fr}
  .page{padding:.75rem .75rem 5rem}
  .header{height:auto;padding:.5rem .75rem;gap:6px;flex-wrap:wrap}
  .header-left{min-width:0}
  .header h1{font-size:11px}
  .header-right{justify-content:flex-end;flex:1}
  .ts{display:none}
  .kval{font-size:20px!important}
  .stat-val{font-size:20px!important}
  .card,.objcard,.desc50-card{padding:.9rem}
  .grafico-diario-wrap{height:200px}
  .timing-wrap{height:260px}
  .ref-badge{font-size:10px;padding:5px 12px}
  .eqi{padding:8px 10px}
  .eqv{font-size:15px}
}
@media(max-width:380px){
  .krow{grid-template-columns:1fr}
  .kval{font-size:18px!important}
  .stat-val{font-size:18px!important}
  .header h1{font-size:10px}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <img class="logo-img" src="../logo.png" alt="Allsafe">
    <div class="header-div"></div>
    <h1>Painel de Cobran&#231;as</h1>
  </div>
  <div class="header-right">
    <select class="mes-sel" id="mes-sel" onchange="trocarMes(this.value)"></select>
    <div class="live"><div class="live-dot"></div>Ao vivo</div>
    <span class="ts" id="ts">&mdash;</span>
    <button class="btn-sm" onclick="atualizar()">&#x21bb;</button>
  </div>
</div>
<div class="page">
  <div id="root"><div class="skeleton-wrap"><div class="skel-row"><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div></div><div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div><div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div><div class="skel-tall"></div></div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
/* Allsafe Cobrancas Dashboard v5.0 — design polish */

/* ====================================================================
   GIDs MANUAIS
   ==================================================================== */
var GIDS_COB = {
  'Fevereiro/2026': '830932961',
  'Marco/2026':     '1512089432'
  /* 'Abril/2026':  'COLE_O_GID_AQUI', */
};
var REFS = {
  'Fevereiro/2026': { ref: 'Fevereiro/2026', venc: 'Mar\u00E7o', prazoAte: '2026-04-15' },
  'Marco/2026':     { ref: 'Mar\u00E7o/2026', venc: 'Abril',     prazoAte: '2026-05-15' }
  /* 'Abril/2026':  { ref: 'Abril/2026',  venc: 'Maio',  prazoAte: '2026-06-15' }, */
};
var DISPLAY_MES = {
  'Fevereiro/2026': 'Fevereiro/2026',
  'Marco/2026':     'Mar\u00E7o/2026'
};
var SHEET_COBRANCAS = '1UltiL5wdnslbMpsitPoPt4vZwJa1CH7xZwAZn6zxAxs';
var SHEET_CANCELADOS = '1mNLAmjJTNTx_ofVWdKa1sC42ohVx5trm6_xYpukveZI';
var GIDS_CAN = {
  'Fevereiro/2026': '0',
  'Marco/2026':     '1221228455'
};
/* ==================================================================== */

var NOMES_MES=['Janeiro','Fevereiro','Mar\u00E7o','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var MESES=[],MES='',_charts={},_csvCache={},_csvCacheVersion=-1,_renderVersion=0,_intervaloAtualizar=null;

function n(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}
function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML;}
function pv(v){if(!v)return 0;return parseFloat(String(v).replace(/R\$\s?/g,'').replace(/\./g,'').replace(',','.').trim())||0;}
function fR(v){return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fN(v){return Math.round(v).toLocaleString('pt-BR');}
function fPct(v){return v.toFixed(1).replace('.',',')+' %';}
function showSkeleton(){var r=document.getElementById('root');if(r)r.innerHTML='<div class="skeleton-wrap"><div class="skel-row"><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div></div><div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div><div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div><div class="skel-tall"></div></div>';}
function fetchComTimeout(url,ms){var c=new AbortController();var t=setTimeout(function(){c.abort();},ms||15000);return fetch(url,{signal:c.signal}).finally(function(){clearTimeout(t);});}
function fetchCachedCSV(url){if(_csvCacheVersion!==MES){_csvCache={};_csvCacheVersion=MES;}if(_csvCache[url])return _csvCache[url];var p=fetchComTimeout(url,15000).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text();}).then(function(t){_csvCache[url]=Promise.resolve(t);return t;}).catch(function(e){delete _csvCache[url];throw e;});_csvCache[url]=p;return p;}
function destroyChart(k){if(_charts[k]){try{_charts[k].destroy();}catch(e){}delete _charts[k];}}
function destroyAllCharts(){Object.keys(_charts).forEach(destroyChart);}
function registerChart(k,c){destroyChart(k);_charts[k]=c;}
function parseCSVLine(line){var cols=[],inQ=false,cur='';for(var i=0;i<line.length;i++){var ch=line[i];if(ch==='"'){if(inQ&&i+1<line.length&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=ch;}cols.push(cur.trim());return cols;}
function findCol(idx){for(var i=1;i<arguments.length;i++){var k=n(arguments[i]);if(idx[k]!==undefined)return idx[k];}var keys=Object.keys(idx);for(var i=1;i<arguments.length;i++){var k=n(arguments[i]);for(var j=0;j<keys.length;j++){if(keys[j].includes(k))return idx[keys[j]];}}return -1;}

function parseCobrancas(txt){
  var linhas=txt.split('\n');if(linhas.length<2)return[];
  var cols=parseCSVLine(linhas[0]);var idx={};cols.forEach(function(c,i){idx[n(c)]=i;});
  var fc=function(){var a=Array.prototype.slice.call(arguments);var fb=typeof a[a.length-1]==='number'?a.pop():-1;var r=findCol.apply(null,[idx].concat(a));return r>=0?r:fb;};
  /* Headers confirmados (v6): Estado, Data de Pagamento, Status, Data de vencimento original,
     Valor Original, Valor Pago, Id do contrato, Data de vencimento, Tipo veiculo,
     Tipo de uso veiculo, Regional, Consultor, Data Finalizacao Vistoria, Dia vencimento */
  var C={estado:fc('estado',0),dataPag:fc('data de pagamento',1),status:fc('status',2),dataVenc:fc('data de vencimento original',3),valOrig:fc('valor original',4),valPago:fc('valor pago',5),idCont:fc('id do contrato',6),dataVenc2:fc('data de vencimento',-1),tipoVeic:fc('tipo veiculo','tipo ve\u00edculo',8),tipoUso:fc('tipo de uso veiculo','tipo de uso ve\u00edculo',9),regional:fc('regional',10),consultor:fc('consultor',11),diaVenc:fc('dia vencimento',13)};
  var rows=[];
  for(var li=1;li<linhas.length;li++){if(!linhas[li].trim())continue;var c=parseCSVLine(linhas[li]);if(c.length<3)continue;var st=(C.status>=0&&C.status<c.length)?(c[C.status]||'').trim():'';if(!st)continue;rows.push({status:st,valorOriginal:C.valOrig>=0?pv(c[C.valOrig]):0,valorPago:C.valPago>=0?pv(c[C.valPago]):0,idContrato:C.idCont>=0?(c[C.idCont]||'').trim():'',tipoVeiculo:C.tipoVeic>=0?(c[C.tipoVeic]||'').trim().toUpperCase():'',tipoUso:C.tipoUso>=0?(c[C.tipoUso]||'').trim():'',estado:C.estado>=0?(c[C.estado]||'').trim().toUpperCase():'',dataPag:C.dataPag>=0?(c[C.dataPag]||'').trim():'',dataVenc:C.dataVenc>=0?(c[C.dataVenc]||'').trim():'',regional:C.regional>=0?(c[C.regional]||'').trim():'',consultor:C.consultor>=0?(c[C.consultor]||'').trim():'',diaVenc:C.diaVenc>=0?parseInt(c[C.diaVenc])||0:0});}
  return rows;
}
function parseCancelados(txt){
  var linhas=txt.split('\n');if(linhas.length<2)return[];
  var cols=parseCSVLine(linhas[0]);var idx={};cols.forEach(function(c,i){idx[n(c)]=i;});
  var rows=[];for(var li=1;li<linhas.length;li++){if(!linhas[li].trim())continue;var c=parseCSVLine(linhas[li]);if(c.length<2)continue;var algum=c.some(function(v){return v.trim();});if(algum)rows.push({raw:c});}
  return rows;
}
function parseDate(s){if(!s)return null;s=s.trim();var pts=s.split('/');if(pts.length>=3)return new Date(parseInt(pts[2]),parseInt(pts[1])-1,parseInt(pts[0]));var iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(iso)return new Date(parseInt(iso[1]),parseInt(iso[2])-1,parseInt(iso[3]));return null;}
function diffDays(d1,d2){if(!d1||!d2)return null;return Math.round((d1.getTime()-d2.getTime())/(1000*60*60*24));}
function fetchCobrancasRows(aba){var base='https://docs.google.com/spreadsheets/d/'+SHEET_COBRANCAS+'/export?format=csv';var gid=GIDS_COB[aba];if(!gid)return Promise.resolve([]);return fetchCachedCSV(base+'&gid='+gid).then(function(t){return(t&&t.includes(','))?parseCobrancas(t):[];}).catch(function(e){throw e;});}
function fetchCanceladosRows(aba){var base='https://docs.google.com/spreadsheets/d/'+SHEET_CANCELADOS+'/export?format=csv';var gid=GIDS_CAN[aba];if(!gid)return Promise.resolve([]);return fetchCachedCSV(base+'&gid='+gid).then(function(t){return(t&&t.includes(','))?parseCancelados(t):[];}).catch(function(e){console.warn('fetchCan:',e);return[];});}

function isStatusPago(s){var ns=n(s);return ns==='sucesso'||ns.includes('baixado com pend')||ns.includes('baixado com duplic');}
function isStatusVencido(s){return n(s)==='vencido';}
function isStatusAberto(s){var ns=n(s);return ns==='vencido'||ns==='a vencer'||ns.includes('a vencer');}
function isStatusAVencer(s){var ns=n(s);return ns==='a vencer'||ns.includes('a vencer');}
function statusLabel(s){return isStatusPago(s)?'Pago':s;}

/* Regionais classificadas como INTERNO */
var REGIONAIS_INTERNAS=['matriz | rio de janeiro -rj','migracao - sindicato','migra\u00e7\u00e3o - sindicato','regional - robocop- sindicato','sindicato- rio de janeiro - taxistas','sindicato- rio de janeiro - t\u00e1xistas','taxi rio','totalben associacao de beneficios','totalben associa\u00e7\u00e3o de benef\u00edcios'];

function ehInterno(reg){var nr=n(reg);return REGIONAIS_INTERNAS.some(function(k){return nr===k||nr.includes(k);});}

function processar(rows,cancelados){
  var totBol=0,totPago=0,totAberto=0,ids=new Set();
  var totDescN=0,cntDescN=0,somaOrigDescN=0,totDesc50=0,cntDesc50=0,somaOrigDesc50=0;
  var cntVencido=0,total=rows.length,porDia={};
  var carros=0,motos=0,caminhoes=0,usoP=0,usoT=0,usoPr=0;
  var valP=0,valT=0,valPr=0,valMoto=0; /* para ticket medio */
  var porEstado={},porStatus={};
  var timing={antes:0,noDia:0,ate5:0,ate10:0,ate20:0,ate30:0,mais30:0},timingTotal=0;
  /* Regionais */
  var regInterno=0,regExterno=0,porRegional={};
  rows.forEach(function(r){
    totBol+=r.valorOriginal;if(r.idContrato)ids.add(r.idContrato);
    var lbl=statusLabel(r.status);porStatus[lbl]=(porStatus[lbl]||0)+1;
    if(isStatusPago(r.status)){totPago+=r.valorPago;var desc=r.valorOriginal-r.valorPago;var dp2=r.valorOriginal>0?(desc/r.valorOriginal)*100:0;if(desc>0.01){if(Math.abs(dp2-50)<2){totDesc50+=desc;somaOrigDesc50+=r.valorOriginal;cntDesc50++;}else{totDescN+=desc;somaOrigDescN+=r.valorOriginal;cntDescN++;}}}
    if(isStatusAberto(r.status))totAberto+=r.valorOriginal;
    if(isStatusVencido(r.status))cntVencido++;
    if(isStatusPago(r.status)&&r.dataPag){var dpObj=parseDate(r.dataPag);if(dpObj){var dk=dpObj.getFullYear()+'-'+String(dpObj.getMonth()+1).padStart(2,'0')+'-'+String(dpObj.getDate()).padStart(2,'0');porDia[dk]=(porDia[dk]||0)+1;}}
    if(isStatusPago(r.status)&&r.dataPag&&r.dataVenc){var dp=parseDate(r.dataPag);var dv=parseDate(r.dataVenc);if(dp&&dv){var diff=diffDays(dp,dv);timingTotal++;if(diff<0)timing.antes++;else if(diff===0)timing.noDia++;else if(diff<=5)timing.ate5++;else if(diff<=10)timing.ate10++;else if(diff<=20)timing.ate20++;else if(diff<=30)timing.ate30++;else timing.mais30++;}}
    /* Frota + ticket medio por tipo */
    var tv=r.tipoVeiculo;var tu=n(r.tipoUso);
    if(tv.includes('MOTO')){motos++;valMoto+=r.valorOriginal;}
    else if(tv.includes('CAMINHA')||tv.includes('CAMINHAO')){caminhoes++;}
    else{carros++;if(tu.includes('taxi')){usoT++;valT+=r.valorOriginal;}else if(tu.includes('profiss')||tu.includes('aplic')){usoPr++;valPr+=r.valorOriginal;}else{usoP++;valP+=r.valorOriginal;}}
    if(r.estado)porEstado[r.estado]=(porEstado[r.estado]||0)+1;
    /* Regional */
    if(r.regional){
      if(ehInterno(r.regional))regInterno++;else regExterno++;
      porRegional[r.regional]=(porRegional[r.regional]||0)+1;
    }
  });
  /* Vencimento: usar coluna diaVenc (nova) */
  var porVencimento={};rows.forEach(function(r){if(r.diaVenc>0){porVencimento[r.diaVenc]=(porVencimento[r.diaVenc]||0)+1;}else if(r.dataVenc){var dv=parseDate(r.dataVenc);if(dv){var dia=dv.getDate();porVencimento[dia]=(porVencimento[dia]||0)+1;}}});
  var qtdSeg=ids.size,totCan=cancelados.length;
  var inad=total>0?(cntVencido/total)*100:0;
  var churn=total>0?((cntVencido+totCan)/total)*100:0;
  var metaChurn=3,vMax=Math.floor(metaChurn/100*total)-totCan;if(vMax<0)vMax=0;
  var bolMeta=Math.max(0,cntVencido-vMax);
  var descPctN=somaOrigDescN>0?(totDescN/somaOrigDescN)*100:0;
  /* Ticket medio por tipo */
  var ticketP=usoP>0?valP/usoP:0;
  var ticketT=usoT>0?valT/usoT:0;
  var ticketPr=usoPr>0?valPr/usoPr:0;
  var ticketMoto=motos>0?valMoto/motos:0;
  /* Regionais sorted */
  var regSort=Object.entries(porRegional).sort(function(a,b){return b[1]-a[1];});
  return{totBol:totBol,totPago:totPago,totAberto:totAberto,qtdSeg:qtdSeg,totDescN:totDescN,descPctN:descPctN,cntDescN:cntDescN,totDesc50:totDesc50,cntDesc50:cntDesc50,somaOrigDesc50:somaOrigDesc50,totCan:totCan,cntVencido:cntVencido,total:total,inad:inad,churn:churn,metaChurn:metaChurn,bolMeta:bolMeta,carros:carros,motos:motos,caminhoes:caminhoes,usoP:usoP,usoT:usoT,usoPr:usoPr,ticketP:ticketP,ticketT:ticketT,ticketPr:ticketPr,ticketMoto:ticketMoto,regInterno:regInterno,regExterno:regExterno,porRegional:regSort,porEstado:Object.entries(porEstado).sort(function(a,b){return b[1]-a[1];}),porDia:porDia,porStatus:porStatus,timing:timing,timingTotal:timingTotal,porVencimento:porVencimento};
}

function rendGraficoDiario(id,porDia,key,mesP){
  var mN=['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  var partes=mesP.split('/');var refMIdx=mN.indexOf(n(partes[0]));var ano=parseInt(partes[1])||new Date().getFullYear();
  if(refMIdx<0)return;
  var mesVenc=refMIdx+1,anoVenc=ano;if(mesVenc>11){mesVenc-=12;anoVenc++;}
  var entries=Object.entries(porDia).filter(function(e){return e[1]>0;}).sort(function(a,b){return a[0].localeCompare(b[0]);});
  if(!entries.length)return;
  var labels=[],data=[],bgC=[],dayDates=[];
  var DI=['D','S','T','Q','Q','S','S'];var dwArr=[];
  for(var i=0;i<entries.length;i++){
    var dk=entries[i][0],val=entries[i][1];var pts=dk.split('-');var dt=new Date(parseInt(pts[0]),parseInt(pts[1])-1,parseInt(pts[2]));
    dayDates.push(dt);labels.push(String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0'));data.push(val);
    var c2;if(dt.getMonth()===refMIdx&&dt.getFullYear()===ano)c2='#93ADFCCC';else if(dt.getMonth()===mesVenc&&dt.getFullYear()===anoVenc)c2='#5353E9CC';else c2='#f39c12CC';
    bgC.push(c2);dwArr.push({i:DI[dt.getDay()],w:dt.getDay()===0||dt.getDay()===6});
  }
  var ctx=document.getElementById(id);if(!ctx)return;
  registerChart(key,new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{data:data,backgroundColor:bgC,borderRadius:4,borderSkipped:false,barPercentage:0.82,categoryPercentage:0.88}]},plugins:[{id:'bL',afterDatasetsDraw:function(ch){var c2=ch.ctx;c2.save();ch.data.datasets.forEach(function(ds,di){var m=ch.getDatasetMeta(di);m.data.forEach(function(bar,i){var v=ds.data[i];if(v>0){c2.font='700 8px Inter';c2.textAlign='center';var y=bar.y,h=bar.base-bar.y;if(h>14){c2.fillStyle='rgba(255,255,255,.9)';c2.fillText(v,bar.x,y+h/2);}else{c2.fillStyle='#5353E9';c2.fillText(v,bar.x,y-7);}}});});c2.restore();}},{id:'dL',afterDraw:function(ch){var c2=ch.ctx;var xA=ch.scales.x;c2.save();c2.textAlign='center';c2.textBaseline='top';for(var i=0;i<dwArr.length;i++){var xp=xA.getPixelForTick(i);if(xp===undefined)continue;c2.font=dwArr[i].w?'700 7px Inter':'400 7px Inter';c2.fillStyle=dwArr[i].w?'#c0392b':'#888';c2.fillText(dwArr[i].i,xp,xA.bottom+2);}c2.restore();}}],options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#210B4E',titleFont:{family:'Inter',size:12},bodyFont:{family:'Inter',size:11},cornerRadius:8,padding:10,callbacks:{title:function(it){var dt=dayDates[it[0].dataIndex];var dn=['Domingo','Segunda','Ter\u00E7a','Quarta','Quinta','Sexta','S\u00E1bado'];return dn[dt.getDay()]+', '+dt.getDate()+'/'+String(dt.getMonth()+1).padStart(2,'0');},label:function(it){return ' '+it.raw+' pagamento'+(it.raw!==1?'s':'');}}}},scales:{x:{grid:{display:false},ticks:{color:'#888',font:{size:8,family:'Inter'},maxRotation:45}},y:{grid:{color:'rgba(0,0,0,.03)',drawBorder:false},ticks:{color:'#aaa',font:{size:8}},beginAtZero:true,border:{display:false}}},layout:{padding:{top:14,bottom:12}}}}));
}

      '</div>'+
      '<div class="card"><div class="ctit">Itens por regional</div>'+
        (function(){var rh='';d.porRegional.slice(0,15).forEach(function(e){var maxR=d.porRegional[0][1]||1;var pct=Math.round(e[1]/maxR*100);var cor=ehInterno(e[0])?'var(--roxo)':'#0A6B54';rh+='<div class="bar-row"><div class="bar-label" style="font-size:10px;min-width:auto;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:'+cor+'">'+esc(e[0])+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+cor+'"></div></div><div class="bar-count">'+fN(e[1])+'</div></div>';});return rh;})()+
      '</div>'+
    '</div>'+
    '<div class="g2 stretch">'+
      '<div class="card"><div class="ctit">Descontos concedidos</div><div style="font-size:26px;font-weight:800;color:var(--roxo);margin-bottom:4px">'+fR(d.totDescN)+'</div><div style="font-size:11px;color:var(--sub);margin-bottom:10px">em '+fN(d.cntDescN)+' boletos</div><div style="display:inline-block;background:rgba(83,83,233,.06);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:600;color:var(--roxo)">'+fPct(d.descPctN)+' desconto m\u00E9dio</div></div>'+
      '<div class="desc50-card"><div class="desc50-lbl">Segurados com 50% de desconto</div><div class="desc50-val">'+fN(d.cntDesc50)+' segurados</div><div class="desc50-sub">Desconto total: '+fR(d.totDesc50)+'</div><div class="desc50-sub" style="margin-top:3px">Valor original: '+fR(d.somaOrigDesc50)+'</div></div>'+
    '</div>'+
    '<div class="g2 stretch">'+
      '<div class="card" style="display:flex;flex-direction:column"><div class="ctit">Segurados por data de vencimento</div><div style="flex:1;display:flex;align-items:center;justify-content:center"><div style="width:100%;max-width:340px"><canvas id="gcVenc"></canvas></div></div></div>'+
      '<div class="card"><div class="ctit">Ve\u00EDculos por estado</div>'+estHtml+'</div>'+
    '</div>'+
    '<button class="btn-salvar-rodape" onclick="exportarDashboard()">&#x2B07; Salvar espelho do dia</button>';

  /* inject legend colors via CSS — only once */
  if(!document.getElementById('lg-style')){var style=document.createElement('style');style.id='lg-style';style.textContent='.lg-ref::before{background:#93ADFC}.lg-venc::before{background:#5353E9}.lg-prazo::before{background:#f39c12}';document.head.appendChild(style);}

  rendGraficoDiario('gcDiario',d.porDia,'GDC',MES);
  rendTiming('gcTiming',d.timing,d.timingTotal,'GTIMING');
  rendVencimentos('gcVenc',d.porVencimento,'GVENC');
  rendStatusPizza('gcStatus',d.porStatus,'GSTATUS');
}

function exportarDashboard(){html2canvas(document.body,{scale:1.5,useCORS:true,backgroundColor:'#F4F4F4'}).then(function(c){var a=document.createElement('a');a.download='allsafe-cobrancas-'+new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')+'.png';a.href=c.toDataURL('image/png');a.click();}).catch(function(e){alert('Erro: '+e.message);});}
function trocarMes(val){MES=val;_csvCache={};_csvCacheVersion=-1;showSkeleton();atualizar();}
function setMesSel(){var sel=document.getElementById('mes-sel');sel.innerHTML='';MESES.forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=DISPLAY_MES[m]||m;if(m===MES)o.selected=true;sel.appendChild(o);});}
function atualizar(){
  var ver=++_renderVersion;
  Promise.all([fetchCobrancasRows(MES),fetchCanceladosRows(MES)]).then(function(res){
    if(ver!==_renderVersion)return;render(processar(res[0],res[1]));
    var ts=document.getElementById('ts');if(ts)ts.textContent=new Date().toLocaleTimeString('pt-BR');
  }).catch(function(e){
    if(ver!==_renderVersion)return;
    document.getElementById('root').innerHTML='<div class="smsg"><div class="ico">&#x26A0;&#xFE0F;</div><div class="err">Erro ao carregar dados</div><div>'+esc(e.message)+'</div><button class="btn-sm" style="margin-top:12px;background:var(--dark);color:var(--azul)" onclick="atualizar()">Tentar novamente</button></div>';
  });
}
function mesAtivoPorData(){
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var hojeStr=hoje.getFullYear()+'-'+String(hoje.getMonth()+1).padStart(2,'0')+'-'+String(hoje.getDate()).padStart(2,'0');
  for(var i=0;i<MESES.length;i++){var r=REFS[MESES[i]];if(r&&r.prazoAte&&hojeStr<=r.prazoAte)return MESES[i];}
  return MESES[MESES.length-1];
}
function init(){MESES=Object.keys(GIDS_COB);MES=mesAtivoPorData();setMesSel();atualizar();_intervaloAtualizar=setInterval(atualizar,5*60*1000);}
init();
</script>
</body>
