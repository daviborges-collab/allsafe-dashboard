<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allsafe — Painel de Cobranças</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --roxo:#5353E9;--rosa:#F7B2F5;--azul:#93ADFC;
  --dark:#210B4E;--limao:#DFF44C;--menta:#AFF9E4;
  --bg:#F4F4F4;--white:#FFFFFF;--borda:#E4E4E4;--sub:#7B7B9A;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(180deg,var(--dark) 0%,#1a0940 100%);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;gap:14px;border-bottom:1px solid rgba(83,83,233,.15);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.header-left{display:flex;align-items:center;gap:12px}
.logo-img{height:32px;width:32px;border-radius:9px;object-fit:cover;box-shadow:0 2px 8px rgba(83,83,233,.35);flex-shrink:0;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.logo-img:hover{transform:scale(1.08)}
.header-div{width:1px;height:22px;background:rgba(255,255,255,.1);flex-shrink:0}
.header h1{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.01em}
.header-right{display:flex;align-items:center;gap:10px}
.live{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--menta)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--menta);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ts{font-size:11px;color:#7B8FA8}
.btn-sm{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:rgba(255,255,255,.45);font-size:11px;padding:5px 10px;cursor:pointer;font-family:inherit;transition:all .25s}
.btn-sm:hover{background:rgba(255,255,255,.14);color:#fff;transform:scale(1.04)}
select.mes-sel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:var(--azul);font-size:11px;padding:5px 8px;cursor:pointer;font-family:inherit;transition:all .2s}
select.mes-sel:hover{background:rgba(255,255,255,.12)}
.page{max-width:1320px;margin:0 auto;padding:1.25rem 1.5rem 3rem}
.ref-badge{background:rgba(83,83,233,.08);border:1px solid rgba(83,83,233,.15);border-radius:10px;padding:6px 16px;font-size:12px;color:var(--roxo);font-weight:600;margin-bottom:14px;display:inline-block}
.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.25rem}
.kpi{border-radius:16px;padding:1.25rem 1.5rem;position:relative;overflow:hidden;transition:transform .25s,box-shadow .25s}
.kpi:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(33,11,78,.12)}
.kd{background:var(--dark)}.kr{background:var(--roxo)}.km{background:var(--menta)}.kw{background:var(--white);border:1px solid var(--borda)}
.klbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.kd .klbl{color:var(--azul)}.kr .klbl{color:var(--rosa)}.km .klbl{color:#0A6B54}.kw .klbl{color:var(--sub)}
.kval{font-size:26px;font-weight:800;line-height:1;margin-bottom:4px}
.kd .kval{color:var(--limao)}.kr .kval{color:#fff}.km .kval{color:var(--dark)}.kw .kval{color:var(--dark)}
.ksub{font-size:11px}
.kd .ksub{color:#5a5a9a}.kr .ksub{color:rgba(255,255,255,.6)}.km .ksub{color:#0A6B54;opacity:.7}.kw .ksub{color:var(--sub)}
.kdeco{position:absolute;right:-8px;bottom:-8px;font-size:64px;opacity:.07;line-height:1;pointer-events:none}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:var(--white);border-radius:16px;border:1px solid var(--borda);padding:1.25rem;transition:box-shadow .3s,transform .3s}
.card:hover{box-shadow:0 6px 24px rgba(33,11,78,.07);transform:translateY(-1px)}
.ctit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ctit::before{content:'';display:inline-block;width:3px;height:12px;background:var(--roxo);border-radius:2px}
.velcard{background:var(--dark);border-radius:16px;padding:1.25rem;display:flex;flex-direction:column;align-items:center;transition:transform .25s,box-shadow .25s}
.velcard:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(33,11,78,.2)}
.veltit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--azul);margin-bottom:8px;align-self:flex-start}
.velinfo{text-align:center;margin-top:4px}
.velat{font-size:26px;font-weight:800;color:var(--limao)}
.velm{font-size:11px;color:#5a5a9a}
.objcard{background:#0d0d2e;border:1px solid rgba(83,83,233,.25);border-radius:16px;padding:1.25rem;transition:transform .25s,box-shadow .25s}
.objcard:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(13,13,46,.3)}
.objtit{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rosa);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.objalr{border-radius:10px;padding:8px 12px;font-size:12px;font-weight:600;line-height:1.5}
.objalr.verm{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);color:#E74C3C}
.objalr.verd{background:rgba(10,107,84,.15);border:1px solid rgba(10,107,84,.3);color:#2ecc71}
.objdiff{font-size:14px;font-weight:800;display:block;margin-bottom:2px}
.eqi{display:flex;align-items:center;padding:10px 14px;border-radius:12px;gap:10px;transition:transform .2s;cursor:default;margin-bottom:6px}
.eqi:hover{transform:translateX(4px);box-shadow:0 2px 12px rgba(0,0,0,.06)}
.eqdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.eqnom{font-size:13px;font-weight:600;flex:1}
.eqv{font-size:18px;font-weight:800}
.eqval{font-size:10px;font-weight:500;opacity:.7;text-align:right}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:12px;font-weight:600;min-width:32px;text-align:right}
.bar-track{flex:1;height:22px;background:#F0F0F4;border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bar-count{font-size:10px;font-weight:700;color:var(--sub);min-width:30px;text-align:left;margin-left:6px}
.grafico-diario-wrap{height:180px;position:relative;width:100%}
.timing-wrap{height:220px;position:relative;width:100%}
.smsg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;color:var(--sub);gap:12px;font-size:14px;text-align:center}
.smsg .ico{font-size:32px}
.err{color:#C0392B}
.skeleton-wrap{padding:0}
.skel-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.skel-card{border-radius:16px;height:140px;background:linear-gradient(110deg,#E8E8EE 8%,#F5F5FA 18%,#E8E8EE 33%);background-size:200% 100%;animation:shimmer 1.6s linear infinite}
.skel-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.skel-wide{border-radius:16px;height:200px;background:linear-gradient(110deg,#E8E8EE 8%,#F5F5FA 18%,#E8E8EE 33%);background-size:200% 100%;animation:shimmer 1.6s linear infinite}
.skel-tall{border-radius:16px;height:300px;background:linear-gradient(110deg,#E8E8EE 8%,#F5F5FA 18%,#E8E8EE 33%);background-size:200% 100%;animation:shimmer 1.6s linear infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.krow,.g2,.g3,.card,.velcard,.objcard{animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both}
.krow{animation-delay:.05s}.g2{animation-delay:.1s}.g3{animation-delay:.12s}
#root{transition:opacity .2s ease}
#root.fading{opacity:0}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(83,83,233,.18);border-radius:3px}
.btn-salvar-rodape{display:flex;align-items:center;justify-content:center;gap:8px;margin:28px auto 0;padding:12px 28px;background:var(--dark);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#7B8FA8;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .3s}
.btn-salvar-rodape:hover{background:#2a2a5e;color:#fff;transform:translateY(-2px);box-shadow:0 6px 20px rgba(33,11,78,.15)}
.churn-big{font-size:32px;font-weight:800;line-height:1}
.churn-meta{font-size:11px;color:#5a5a9a;margin-top:2px}
@media(max-width:1024px){.krow{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}}
@media(max-width:900px){.g2{grid-template-columns:1fr}.krow{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.krow{grid-template-columns:1fr}.skel-row{grid-template-columns:1fr}.page{padding:.75rem .75rem 5rem}.header{height:auto;padding:.5rem .75rem;gap:8px}.kval{font-size:20px!important}.card,.velcard,.objcard{padding:1rem}.grafico-diario-wrap{height:200px}.timing-wrap{height:250px}}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <img class="logo-img" src="../logo.png" alt="Allsafe">
    <div class="header-div"></div>
    <h1>Painel de Cobranças</h1>
  </div>
  <div class="header-right">
    <select class="mes-sel" id="mes-sel" onchange="trocarMes(this.value)"></select>
    <div class="live"><div class="live-dot"></div>Ao vivo</div>
    <span class="ts" id="ts">&mdash;</span>
    <button class="btn-sm" onclick="atualizar()">&#x21bb;</button>
  </div>
</div>
<div class="page">
  <div id="root"><div class="skeleton-wrap"><div class="skel-row"><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div></div><div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div><div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div><div class="skel-tall"></div></div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
/* Allsafe Cobrancas Dashboard v3.0 */

/* ====================================================================
   GIDs MANUAIS — adicione novos meses aqui
   ==================================================================== */
var GIDS_COB = {
  'Fevereiro/2026': '830932961',
  'Marco/2026':     '1512089432'
  /* Abril/2026:  'COLE_O_GID_AQUI', */
  /* Maio/2026:   'COLE_O_GID_AQUI', */
};

/* Referencia do mes: o boleto e de qual referencia e vence em qual mes
   Padrao: Referencia MES/ANO = vencimento proximo mes                */
var REFS = {
  'Fevereiro/2026': { ref: 'Fevereiro/2026', venc: 'Marco' },
  'Marco/2026':     { ref: 'Marco/2026',     venc: 'Abril' }
  /* Abril/2026:  { ref: 'Abril/2026',  venc: 'Maio' }, */
  /* Maio/2026:   { ref: 'Maio/2026',   venc: 'Junho' }, */
};

var SHEET_COBRANCAS = '1UltiL5wdnslbMpsitPoPt4vZwJa1CH7xZwAZn6zxAxs';
var SHEET_CANCELADOS = '1JhtvrGYPe5L67iPjFhMun4U3d71LKAbb2sfe0nehEZQ';

var GIDS_CAN = {
  'Fevereiro/2026': '220941909',
  'Marco/2026':     '1401840695'
  /* Abril/2026:  'COLE_O_GID_AQUI', */
};
/* ==================================================================== */

var NOMES_MES = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var MESES = [];
var MES = '';
var _charts = {};
var _csvCache = {};
var _csvCacheVersion = -1;
var _renderVersion = 0;
var _intervaloAtualizar = null;

/* helpers */
function n(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}
function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML;}
function pv(v){if(!v)return 0;return parseFloat(String(v).replace(/R\$\s?/g,'').replace(/\./g,'').replace(',','.').trim())||0;}
function fR(v){return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fN(v){return Math.round(v).toLocaleString('pt-BR');}
function fPct(v){return v.toFixed(1).replace('.',',')+' %';}

/* skeleton */
function showSkeleton(){var r=document.getElementById('root');if(r)r.innerHTML='<div class="skeleton-wrap"><div class="skel-row"><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div><div class="skel-card"></div></div><div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div><div class="skel-row2"><div class="skel-wide"></div><div class="skel-wide"></div></div><div class="skel-tall"></div></div>';}

/* fetch */
function fetchComTimeout(url,ms){var c=new AbortController();var t=setTimeout(function(){c.abort();},ms||15000);return fetch(url,{signal:c.signal}).finally(function(){clearTimeout(t);});}
function fetchCachedCSV(url){if(_csvCacheVersion!==MES){_csvCache={};_csvCacheVersion=MES;}if(_csvCache[url])return _csvCache[url];var p=fetchComTimeout(url,15000).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text();}).then(function(t){_csvCache[url]=Promise.resolve(t);return t;}).catch(function(e){delete _csvCache[url];throw e;});_csvCache[url]=p;return p;}

/* charts */
function destroyChart(k){if(_charts[k]){try{_charts[k].destroy();}catch(e){}delete _charts[k];}}
function destroyAllCharts(){Object.keys(_charts).forEach(destroyChart);}
function registerChart(k,c){destroyChart(k);_charts[k]=c;}

/* csv parse */
function parseCSVLine(line){var cols=[],inQ=false,cur='';for(var i=0;i<line.length;i++){var ch=line[i];if(ch==='"'){if(inQ&&i+1<line.length&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=ch;}cols.push(cur.trim());return cols;}
function findCol(idx){for(var i=1;i<arguments.length;i++){var k=n(arguments[i]);if(idx[k]!==undefined)return idx[k];}var keys=Object.keys(idx);for(var i=1;i<arguments.length;i++){var k=n(arguments[i]);for(var j=0;j<keys.length;j++){if(keys[j].includes(k))return idx[keys[j]];}}return -1;}

/* parse cobrancas — headers confirmados:
   Estado, Data de Pagamento, Status, Data de vencimento original,
   Valor Original, Valor Pago, Id do contrato, Tipo veiculo,
   Tipo de uso veiculo, Regional, Consultor, Data Finalizacao Vistoria */
function parseCobrancas(txt){
  var linhas=txt.split('\n');if(linhas.length<2)return[];
  var cols=parseCSVLine(linhas[0]);var idx={};cols.forEach(function(c,i){idx[n(c)]=i;});
  var fc=function(){var a=Array.prototype.slice.call(arguments);var fb=typeof a[a.length-1]==='number'?a.pop():-1;var r=findCol.apply(null,[idx].concat(a));return r>=0?r:fb;};
  var C={
    estado:fc('estado','uf',0), dataPag:fc('data de pagamento','data pagamento',1),
    status:fc('status',2), dataVenc:fc('data de vencimento original','data vencimento',3),
    valOrig:fc('valor original',4), valPago:fc('valor pago',5),
    idCont:fc('id do contrato','id contrato',6), tipoVeic:fc('tipo veiculo','tipo veículo',7),
    tipoUso:fc('tipo de uso veiculo','tipo de uso veículo','tipo de uso',8),
    regional:fc('regional',9), consultor:fc('consultor',10)
  };
  var rows=[];
  for(var li=1;li<linhas.length;li++){
    if(!linhas[li].trim())continue;var c=parseCSVLine(linhas[li]);if(c.length<3)continue;
    var st=(C.status>=0&&C.status<c.length)?(c[C.status]||'').trim():'';if(!st)continue;
    rows.push({status:st,valorOriginal:C.valOrig>=0?pv(c[C.valOrig]):0,valorPago:C.valPago>=0?pv(c[C.valPago]):0,idContrato:C.idCont>=0?(c[C.idCont]||'').trim():'',tipoVeiculo:C.tipoVeic>=0?(c[C.tipoVeic]||'').trim().toUpperCase():'',tipoUso:C.tipoUso>=0?(c[C.tipoUso]||'').trim():'',estado:C.estado>=0?(c[C.estado]||'').trim().toUpperCase():'',dataPag:C.dataPag>=0?(c[C.dataPag]||'').trim():'',dataVenc:C.dataVenc>=0?(c[C.dataVenc]||'').trim():'',regional:C.regional>=0?(c[C.regional]||'').trim():'',consultor:C.consultor>=0?(c[C.consultor]||'').trim():''});
  }
  return rows;
}

/* parse cancelados */
function parseCancelados(txt){
  var linhas=txt.split('\n');if(linhas.length<2)return[];
  var rows=[];for(var li=1;li<linhas.length;li++){if(!linhas[li].trim())continue;var c=parseCSVLine(linhas[li]);if(c.length<1)continue;var algum=c.some(function(v){return v.trim();});if(algum)rows.push({raw:c});}
  return rows;
}

/* date helpers */
function parseDate(s){
  if(!s)return null;s=s.trim();
  var pts=s.split('/');
  if(pts.length>=3)return new Date(parseInt(pts[2]),parseInt(pts[1])-1,parseInt(pts[0]));
  var iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso)return new Date(parseInt(iso[1]),parseInt(iso[2])-1,parseInt(iso[3]));
  return null;
}
function parseDia(s){
  if(!s)return null;s=s.trim();var pts=s.split('/');
  if(pts.length>=3)return pts[0].trim().padStart(2,'0')+'/'+pts[1].trim().padStart(2,'0');
  var iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso)return iso[3]+'/'+iso[2];
  return null;
}
function diffDays(d1,d2){if(!d1||!d2)return null;return Math.round((d1.getTime()-d2.getTime())/(1000*60*60*24));}

/* fetch rows */
function fetchCobrancasRows(aba){
  var base='https://docs.google.com/spreadsheets/d/'+SHEET_COBRANCAS+'/export?format=csv';
  var gid=GIDS_COB[aba];if(!gid)return Promise.resolve([]);
  return fetchCachedCSV(base+'&gid='+gid).then(function(t){return(t&&t.includes(','))?parseCobrancas(t):[];}).catch(function(e){console.warn('fetchCob:',e);throw e;});
}
function fetchCanceladosRows(aba){
  var base='https://docs.google.com/spreadsheets/d/'+SHEET_CANCELADOS+'/export?format=csv';
  var gid=GIDS_CAN[aba];if(!gid)return Promise.resolve([]);
  return fetchCachedCSV(base+'&gid='+gid).then(function(t){return(t&&t.includes(','))?parseCancelados(t):[];}).catch(function(e){console.warn('fetchCan:',e);return[];});
}

/* status helpers */
function isStatusPago(s){var ns=n(s);return ns==='sucesso'||ns.includes('baixado com pend')||ns.includes('baixado com duplic');}
function isStatusVencido(s){return n(s)==='vencido';}
function isStatusAberto(s){var ns=n(s);return ns==='vencido'||ns==='a vencer'||ns.includes('a vencer');}
function isStatusAVencer(s){var ns=n(s);return ns==='a vencer'||ns.includes('a vencer');}

/* status display label — merge baixado* + sucesso into "Pago" */
function statusLabel(s){return isStatusPago(s)?'Pago':s;}

/* process */
function processar(rows,cancelados){
  var totBol=0,totPago=0,totAberto=0;
  var ids=new Set();var totDesc=0,cntDesc=0,somaOrigDesc=0;
  var cntVencido=0,total=rows.length;var porDia={};
  var carros=0,motos=0,caminhoes=0;var usoP=0,usoT=0,usoPr=0;
  var porEstado={};var porStatus={};
  var timingBuckets={antes:0,noDia:0,ate5:0,ate10:0,ate20:0,ate30:0,mais30:0};
  var timingTotal=0;
  rows.forEach(function(r){
    totBol+=r.valorOriginal;
    if(r.idContrato)ids.add(r.idContrato);
    var lbl=statusLabel(r.status);porStatus[lbl]=(porStatus[lbl]||0)+1;
    if(isStatusPago(r.status)){
      totPago+=r.valorPago;
      var desc=r.valorOriginal-r.valorPago;
      if(desc>0.01){totDesc+=desc;somaOrigDesc+=r.valorOriginal;cntDesc++;}
    }
    if(isStatusAberto(r.status))totAberto+=r.valorOriginal;
    if(isStatusVencido(r.status))cntVencido++;
    /* pagamentos por dia */
    if(isStatusPago(r.status)&&r.dataPag){var dia=parseDia(r.dataPag);if(dia)porDia[dia]=(porDia[dia]||0)+1;}
    /* timing: dias entre pagamento e vencimento */
    if(isStatusPago(r.status)&&r.dataPag&&r.dataVenc){
      var dp=parseDate(r.dataPag);var dv=parseDate(r.dataVenc);
      if(dp&&dv){
        var diff=diffDays(dp,dv);timingTotal++;
        if(diff<0)timingBuckets.antes++;
        else if(diff===0)timingBuckets.noDia++;
        else if(diff<=5)timingBuckets.ate5++;
        else if(diff<=10)timingBuckets.ate10++;
        else if(diff<=20)timingBuckets.ate20++;
        else if(diff<=30)timingBuckets.ate30++;
        else timingBuckets.mais30++;
      }
    }
    /* frota */
    var tv=r.tipoVeiculo;
    if(tv.includes('MOTO'))motos++;
    else if(tv.includes('CAMINHA')||tv.includes('CAMINHAO'))caminhoes++;
    else carros++;
    /* uso */
    var tu=n(r.tipoUso);
    if(tu.includes('taxi'))usoT++;
    else if(tu.includes('profiss')||tu.includes('aplic'))usoPr++;
    else usoP++;
    /* estado */
    if(r.estado)porEstado[r.estado]=(porEstado[r.estado]||0)+1;
  });
  var qtdSeg=ids.size;var totCan=cancelados.length;
  var inad=total>0?(cntVencido/total)*100:0;
  var churn=total>0?((cntVencido+totCan)/total)*100:0;
  var metaChurn=3;var vMax=Math.floor(metaChurn/100*total)-totCan;if(vMax<0)vMax=0;
  var bolMeta=Math.max(0,cntVencido-vMax);
  var descPct=somaOrigDesc>0?(totDesc/somaOrigDesc)*100:0;
  var estSort=Object.entries(porEstado).sort(function(a,b){return b[1]-a[1];});
  return{totBol:totBol,totPago:totPago,totAberto:totAberto,qtdSeg:qtdSeg,totDesc:totDesc,descPct:descPct,cntDesc:cntDesc,totCan:totCan,cntVencido:cntVencido,total:total,inad:inad,churn:churn,metaChurn:metaChurn,bolMeta:bolMeta,carros:carros,motos:motos,caminhoes:caminhoes,usoP:usoP,usoT:usoT,usoPr:usoPr,porEstado:estSort,porDia:porDia,porStatus:porStatus,timing:timingBuckets,timingTotal:timingTotal};
}

/* velocimetro churn */
function rendVelocimetro(id,pct,key){
  var cv=document.getElementById(id);if(!cv)return;
  var cap=Math.min(pct,100);var cor=pct<=3?'#2ecc71':pct<=5?'#f39c12':'#E74C3C';
  registerChart(key,new Chart(cv,{type:'doughnut',data:{datasets:[{data:[cap,Math.max(0,100-cap)],backgroundColor:[cor,'#1a1a3e'],borderWidth:0,circumference:180,rotation:270},{data:[3,97],backgroundColor:['rgba(46,204,113,0.2)','transparent'],borderWidth:0,circumference:180,rotation:270}]},options:{responsive:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{enabled:false}}}}));
}

/* grafico diario */
function rendGraficoDiario(id,porDia,cor,key,mesP){
  var mN=['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  var partes=mesP.split('/');var mIdx=mN.indexOf(n(partes[0]));var ano=parseInt(partes[1])||new Date().getFullYear();
  if(mIdx<0)return;
  var nDias=new Date(ano,mIdx+1,0).getDate();var hoje=new Date();
  var ult=(hoje.getMonth()===mIdx&&hoje.getFullYear()===ano)?hoje.getDate():nDias;
  var labels=[],data=[],bgC=[];var DI=['D','S','T','Q','Q','S','S'];var dw=[];
  for(var d=1;d<=nDias;d++){var k=String(d).padStart(2,'0')+'/'+String(mIdx+1).padStart(2,'0');labels.push(d);data.push(porDia[k]||0);bgC.push(d<=ult?cor+'CC':'#E4E4E4');var dd=new Date(ano,mIdx,d).getDay();dw.push({i:DI[dd],w:dd===0||dd===6});}
  var ctx=document.getElementById(id);if(!ctx)return;
  registerChart(key,new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[{label:'Pagamentos',data:data,backgroundColor:bgC,borderRadius:3,borderSkipped:false}]},plugins:[{id:'bL',afterDatasetsDraw:function(ch){var c2=ch.ctx;c2.save();ch.data.datasets.forEach(function(ds,di){var m=ch.getDatasetMeta(di);m.data.forEach(function(bar,i){var v=ds.data[i];if(v>0){c2.font='700 9px Inter,sans-serif';c2.textAlign='center';c2.textBaseline='middle';var y=bar.y,h=bar.base-bar.y;if(h>14){c2.fillStyle='#fff';c2.fillText(v,bar.x,y+h/2);}else{c2.fillStyle='#5353E9';c2.fillText(v,bar.x,y-8);}}});});c2.restore();}},{id:'dL',afterDraw:function(ch){var c2=ch.ctx;var xA=ch.scales.x;c2.save();c2.textAlign='center';c2.textBaseline='top';for(var i=0;i<dw.length;i++){var xp=xA.getPixelForTick(i);if(xp===undefined)continue;c2.font=dw[i].w?'600 8px Inter':'400 8px Inter';c2.fillStyle='#000';c2.fillText(dw[i].i,xp,xA.bottom+2);}c2.restore();}}],options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:function(it){var dd=parseInt(it[0].label);var dn=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];return dn[new Date(ano,mIdx,dd).getDay()]+', dia '+dd;},label:function(it){return it.raw+' pagamento'+(it.raw!==1?'s':'');}}}},scales:{x:{grid:{display:false},ticks:{color:'#9090AA',font:{size:9}}},y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'#9090AA',font:{size:9},stepSize:1},beginAtZero:true}},layout:{padding:{top:16,bottom:14}}}}));
}

/* grafico timing pagamento vs vencimento */
function rendTiming(id,t,total,key){
  var cv=document.getElementById(id);if(!cv||!total)return;
  var labels=['Antes do\nvencimento','No dia','Ate 5 dias','Ate 10 dias','Ate 20 dias','Ate 30 dias','Mais de 30'];
  var vals=[t.antes,t.noDia,t.ate5,t.ate10,t.ate20,t.ate30,t.mais30];
  var pcts=vals.map(function(v){return total>0?parseFloat((v/total*100).toFixed(1)):0;});
  var cores=['#2ecc71','#27ae60','#f39c12','#e67e22','#e74c3c','#c0392b','#8e44ad'];
  registerChart(key,new Chart(cv,{type:'bar',data:{labels:labels,datasets:[{label:'%',data:pcts,backgroundColor:cores,borderRadius:4,borderSkipped:false}]},plugins:[{id:'pL',afterDatasetsDraw:function(ch){var c2=ch.ctx;c2.save();ch.data.datasets.forEach(function(ds,di){var m=ch.getDatasetMeta(di);m.data.forEach(function(bar,i){var v=ds.data[i];if(v>0){c2.font='700 10px Inter,sans-serif';c2.textAlign='center';c2.fillStyle='#333';c2.fillText(v.toFixed(1)+'%',bar.x,bar.y-8);}});});c2.restore();}}],options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(it){return it.raw+'% ('+vals[it.dataIndex]+' boletos)';}}}},scales:{x:{grid:{display:false},ticks:{color:'#555',font:{size:10}}},y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'#9090AA',font:{size:9},callback:function(v){return v+'%';}},beginAtZero:true}},layout:{padding:{top:20}}}}));
}

/* render */
function render(d){
  destroyAllCharts();
  var refInfo=REFS[MES];
  var refHtml=refInfo?'<div class="ref-badge">Referencia '+esc(refInfo.ref)+' &mdash; vencimento '+esc(refInfo.venc)+'</div>':'';
  /* status breakdown (merged) */
  var stHtml='';var stE=Object.entries(d.porStatus).sort(function(a,b){return b[1]-a[1];});
  var maxSt=stE.length>0?stE[0][1]:1;
  stE.forEach(function(e){var pct=Math.round(e[1]/maxSt*100);var cor=e[0]==='Pago'?'#2ecc71':isStatusVencido(e[0])?'#E74C3C':isStatusAVencer(e[0])?'#f39c12':'#7B7B9A';stHtml+='<div class="bar-row"><div class="bar-label" style="color:'+cor+'">'+esc(e[0])+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+cor+'"></div></div><div class="bar-count">'+fN(e[1])+'</div></div>';});
  /* estados */
  var estHtml='';var maxE=d.porEstado.length>0?d.porEstado[0][1]:1;
  d.porEstado.slice(0,20).forEach(function(e){var pct=Math.round(e[1]/maxE*100);estHtml+='<div class="bar-row"><div class="bar-label">'+esc(e[0])+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:var(--roxo)"></div></div><div class="bar-count">'+fN(e[1])+'</div></div>';});
  var churnCor=d.churn<=3?'#2ecc71':d.churn<=5?'#f39c12':'#E74C3C';
  var inadCor=d.inad<=3?'#2ecc71':d.inad<=5?'#f39c12':'#E74C3C';
  var tF=d.carros+d.motos+d.caminhoes;
  var cPct=tF>0?Math.round(d.carros/tF*100):0;
  var mPct=tF>0?Math.round(d.motos/tF*100):0;
  var totalPgDia=Object.values(d.porDia).reduce(function(s,v){return s+v;},0);

  document.getElementById('root').innerHTML=
    refHtml+
    '<div class="krow">'+
      '<div class="kpi kd"><div class="klbl">Boletos gerados</div><div class="kval">'+fR(d.totBol)+'</div><div class="ksub">'+fN(d.total)+' boletos</div><div class="kdeco">&#x1F4CB;</div></div>'+
      '<div class="kpi kr"><div class="klbl">Valor pago</div><div class="kval">'+fR(d.totPago)+'</div><div class="ksub">Pagamentos confirmados</div><div class="kdeco">&#x1F4B0;</div></div>'+
      '<div class="kpi km"><div class="klbl">Valor em aberto</div><div class="kval">'+fR(d.totAberto)+'</div><div class="ksub">Vencidos + A vencer</div><div class="kdeco">&#x23F3;</div></div>'+
      '<div class="kpi kw"><div class="klbl">Segurados</div><div class="kval">'+fN(d.qtdSeg)+'</div><div class="ksub">Contratos unicos</div><div class="kdeco">&#x1F464;</div></div>'+
    '</div>'+
    '<div class="g3">'+
      '<div class="card"><div class="ctit">Descontos concedidos</div><div style="font-size:28px;font-weight:800;color:var(--roxo);margin-bottom:4px">'+fR(d.totDesc)+'</div><div style="font-size:12px;color:var(--sub);margin-bottom:8px">em '+fN(d.cntDesc)+' boletos com desconto</div><div style="display:inline-block;background:rgba(83,83,233,.08);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;color:var(--roxo)">'+fPct(d.descPct)+' desconto medio</div></div>'+
      '<div class="card"><div class="ctit">Cancelados no mes</div><div style="font-size:42px;font-weight:800;color:#E74C3C;margin-bottom:4px">'+fN(d.totCan)+'</div><div style="font-size:12px;color:var(--sub)">contratos cancelados</div></div>'+
      '<div class="card"><div class="ctit">Status dos boletos</div>'+stHtml+'</div>'+
    '</div>'+
    '<div class="g2">'+
      '<div class="velcard"><div class="veltit">Churn</div><canvas id="gcChurn" width="200" height="110"></canvas><div class="velinfo"><div class="churn-big" style="color:'+churnCor+'">'+fPct(d.churn)+'</div><div class="churn-meta">Meta: '+d.metaChurn+'%</div></div></div>'+
      '<div class="objcard"><div class="objtit">Inadimplencia &amp; Meta Churn</div><div style="display:flex;gap:24px;margin-bottom:14px"><div><div style="font-size:10px;color:#5a5a9a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Inadimplencia</div><div style="font-size:28px;font-weight:800;color:'+inadCor+'">'+fPct(d.inad)+'</div><div style="font-size:11px;color:#5a5a9a">'+fN(d.cntVencido)+' vencidos / '+fN(d.total)+' total</div></div><div><div style="font-size:10px;color:#5a5a9a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Cancelados</div><div style="font-size:28px;font-weight:800;color:#E74C3C">'+fN(d.totCan)+'</div></div></div>'+(d.churn>d.metaChurn?'<div class="objalr verm"><span class="objdiff">Faltam '+fN(d.bolMeta)+' pagamentos</span>Para churn cair de '+fPct(d.churn)+' para '+d.metaChurn+'%</div>':'<div class="objalr verd"><span class="objdiff">Churn dentro da meta</span>'+fPct(d.churn)+' &#x2264; '+d.metaChurn+'%</div>')+'</div>'+
    '</div>'+
    '<div class="g2">'+
      '<div class="card"><div class="ctit">Frota &mdash; Tipo de veiculo</div><div style="display:flex;gap:16px;margin-bottom:12px"><div class="eqi" style="background:#EEEEFF;flex:1"><span class="eqdot" style="background:var(--roxo)"></span><span class="eqnom" style="color:var(--roxo)">Carros</span><div style="text-align:right"><div class="eqv" style="color:var(--roxo)">'+fN(d.carros)+'</div><div class="eqval" style="color:var(--roxo)">'+cPct+'%</div></div></div><div class="eqi" style="background:#FDE8FD;flex:1"><span class="eqdot" style="background:#8B1A90"></span><span class="eqnom" style="color:#8B1A90">Motos</span><div style="text-align:right"><div class="eqv" style="color:#8B1A90">'+fN(d.motos)+'</div><div class="eqval" style="color:#8B1A90">'+mPct+'%</div></div></div></div>'+(d.caminhoes>0?'<div class="eqi" style="background:#F6FBDA"><span class="eqdot" style="background:#5C6200"></span><span class="eqnom" style="color:#5C6200">Caminhoes</span><div class="eqv" style="color:#5C6200">'+fN(d.caminhoes)+'</div></div>':'')+'</div>'+
      '<div class="card"><div class="ctit">Carros &mdash; Tipo de uso</div><div class="eqi" style="background:#E0FDF6;margin-bottom:6px"><span class="eqdot" style="background:#0A6B54"></span><span class="eqnom" style="color:#0A6B54">Particular</span><div class="eqv" style="color:#0A6B54">'+fN(d.usoP)+'</div></div><div class="eqi" style="background:#FFF4E0;margin-bottom:6px"><span class="eqdot" style="background:#C08A00"></span><span class="eqnom" style="color:#C08A00">Taxi</span><div class="eqv" style="color:#C08A00">'+fN(d.usoT)+'</div></div><div class="eqi" style="background:#EEEEFF"><span class="eqdot" style="background:var(--roxo)"></span><span class="eqnom" style="color:var(--roxo)">Uso Profissional</span><div class="eqv" style="color:var(--roxo)">'+fN(d.usoPr)+'</div></div></div>'+
    '</div>'+
    '<div class="card" style="margin-bottom:12px"><div class="ctit">Pagamentos por dia &mdash; '+esc(MES)+' <span style="font-weight:400;color:#aaa;margin-left:8px">('+fN(totalPgDia)+' pagamentos)</span></div><div class="grafico-diario-wrap"><canvas id="gcDiario"></canvas></div></div>'+
    '<div class="card" style="margin-bottom:12px"><div class="ctit">Prazo de pagamento vs vencimento'+(d.timingTotal>0?' <span style="font-weight:400;color:#aaa;margin-left:8px">('+fN(d.timingTotal)+' boletos analisados)</span>':'')+'</div><div class="timing-wrap"><canvas id="gcTiming"></canvas></div></div>'+
    '<div class="card" style="margin-bottom:12px"><div class="ctit">Veiculos por estado</div>'+estHtml+'</div>'+
    '<button class="btn-salvar-rodape" onclick="exportarDashboard()">&#x2B07; Salvar espelho do dia</button>';

  rendGraficoDiario('gcDiario',d.porDia,'#5353E9','GDC',MES);
  rendVelocimetro('gcChurn',d.churn,'VCHURN');
  rendTiming('gcTiming',d.timing,d.timingTotal,'GTIMING');
}

/* exportar */
function exportarDashboard(){html2canvas(document.body,{scale:1.5,useCORS:true,backgroundColor:'#F4F4F4'}).then(function(c){var a=document.createElement('a');a.download='allsafe-cobrancas-'+new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')+'.png';a.href=c.toDataURL('image/png');a.click();}).catch(function(e){alert('Erro: '+e.message);});}

/* controle */
function trocarMes(val){MES=val;_csvCache={};_csvCacheVersion=-1;showSkeleton();atualizar();}
function setMesSel(){var sel=document.getElementById('mes-sel');sel.innerHTML='';MESES.forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=m;if(m===MES)o.selected=true;sel.appendChild(o);});}

function atualizar(){
  var ver=++_renderVersion;
  var pR=fetchCobrancasRows(MES);
  var pC=fetchCanceladosRows(MES);
  Promise.all([pR,pC]).then(function(res){
    if(ver!==_renderVersion)return;
    var d=processar(res[0],res[1]);
    render(d);
    var ts=document.getElementById('ts');if(ts)ts.textContent=new Date().toLocaleTimeString('pt-BR');
  }).catch(function(e){
    if(ver!==_renderVersion)return;
    document.getElementById('root').innerHTML='<div class="smsg"><div class="ico">&#x26A0;&#xFE0F;</div><div class="err">Erro ao carregar dados</div><div>'+esc(e.message)+'</div><button class="btn-sm" style="margin-top:12px;background:var(--dark);color:var(--azul)" onclick="atualizar()">Tentar novamente</button></div>';
  });
}

function init(){
  /* meses = apenas os que tem GID configurado */
  MESES=Object.keys(GIDS_COB);
  MES=MESES[MESES.length-1]||'Marco/2026';
  setMesSel();
  atualizar();
  _intervaloAtualizar=setInterval(atualizar,5*60*1000);
}
init();
</script>
